<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Test</title>
<style>
body{background:#09090e;color:#e8e8f0;font-family:system-ui;padding:20px;}
canvas{border:1px solid #333;max-width:100%;display:block;margin:10px 0;}
#log{background:#1a1a28;padding:12px;border-radius:8px;font-size:.8rem;white-space:pre-wrap;margin-top:10px;max-height:300px;overflow:auto;}
input{margin:10px 0;}
button{background:#5b6cf9;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:1rem;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<h2>BG Removal Debug Test</h2>
<input type="file" id="fi" accept="image/*">
<br>
<canvas id="cv"></canvas>
<button onclick="doRemove()">Remove Background</button>
<div id="log">Logs will appear here...</div>
<script>
var log = document.getElementById('log');
function L(msg) { log.textContent += msg + '\n'; console.log(msg); }

var imgEl = null;
document.getElementById('fi').onchange = function(e) {
  var file = e.target.files[0];
  if (!file) return;
  L('File selected: ' + file.name + ' (' + file.type + ')');
  var url = URL.createObjectURL(file);
  var img = new Image();
  img.onload = function() {
    L('Image loaded: ' + img.naturalWidth + 'x' + img.naturalHeight);
    imgEl = img;
    var cv = document.getElementById('cv');
    cv.width = img.naturalWidth;
    cv.height = img.naturalHeight;
    var ctx = cv.getContext('2d');
    ctx.drawImage(img, 0, 0);
    L('Drawn to canvas OK');
  };
  img.onerror = function() { L('ERROR: Image load failed'); };
  img.src = url;
};

function doRemove() {
  if (!imgEl) { L('No image loaded!'); return; }
  L('Starting removal...');
  try {
    var W = imgEl.naturalWidth;
    var H = imgEl.naturalHeight;
    L('W=' + W + ' H=' + H);

    var cv = document.getElementById('cv');
    cv.width = W; cv.height = H;
    var ctx = cv.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(imgEl, 0, 0, W, H);
    L('Drew to canvas');

    var imgData = ctx.getImageData(0, 0, W, H);
    L('Got ImageData, length=' + imgData.data.length);

    var px = imgData.data;
    var total = W * H;
    L('Total pixels: ' + total);

    // Sample corner
    var c0 = px[0] + ',' + px[1] + ',' + px[2];
    L('Top-left pixel RGB: ' + c0);

    // Simple threshold test
    var bgR = px[0], bgG = px[1], bgB = px[2];
    var tol = 40;
    var removed = 0;
    for (var i = 0; i < total; i++) {
      var p = i*4;
      var dr = px[p]-bgR, dg = px[p+1]-bgG, db = px[p+2]-bgB;
      var dist = Math.sqrt(dr*dr+dg*dg+db*db);
      if (dist < tol) { px[p+3] = 0; removed++; }
    }
    L('Removed pixels: ' + removed + ' / ' + total);

    ctx.putImageData(imgData, 0, 0);
    L('Put ImageData back OK');
    L('SUCCESS');
  } catch(err) {
    L('CAUGHT ERROR: ' + err.message);
    L('Stack: ' + err.stack);
  }
}
</script>
</body>
</html>
