

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Blur Face — PixelPress</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="workspace">
    <header class="workspace-header">
      <a href="./index.html" class="brand">PIXEL<span>PRESS</span></a>
      <div class="header-actions">
        <button id="downloadBtn" class="btn btn-primary hidden">Download Image</button>
      </div>
    </header>

    <div class="workspace-body">
      <main class="canvas-area">
        <div class="upload-overlay" id="uploadOverlay">
          <div class="upload-card" id="dropZone">
            <span style="font-size: 48px;">👤</span>
            <h3>AI Face Blur Tool</h3>
            <p>Upload a photo to automatically detect and blur human faces</p>
            <button class="btn btn-primary">Select Photo</button>
            <input type="file" id="fileInput" class="hidden" accept="image/*">
          </div>
        </div>

        <div style="max-width: 100%; max-height: 100%; overflow: auto; display: flex; justify-content: center; align-items: center;">
          <canvas id="mainCanvas" style="max-width: 100%; height: auto; box-shadow: var(--shadow-md); display: block;"></canvas>
        </div>
      </main>

      <aside class="sidebar">
        <div class="sidebar-section">
          <h4 class="sidebar-title">Blur Options</h4>
          <div class="range-container">
            <label for="blurSlider"><span>Blur Amount</span><span id="blurValue">20px</span></label>
            <input type="range" id="blurSlider" min="5" max="50" value="20">
          </div>
        </div>
        <div class="sidebar-section" id="statusBox" style="color: var(--text-light); font-size: 0.9rem;">
          AI engine stands ready. Upload an image to start processing.
        </div>
      </aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <script src="js/blur-face.js"></script>
</body>
</html>
