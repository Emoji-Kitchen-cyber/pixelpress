<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compress PDF - PixelPress</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif; background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    [data-theme="dark"] body { background: #09090e; color: #e8e8f0; }
    nav {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      padding: 0 2rem; height: 64px; display: flex; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    [data-theme="dark"] nav { background: rgba(21,21,30,0.7); border-color: rgba(255,255,255,0.08); }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      text-transform: uppercase; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .container { max-width: 800px; margin: 2rem auto; padding: 2rem; flex: 1; }
    h1 {
      font-size: 2rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .upload-area {
      border: 2px dashed #ddd; border-radius: 16px; padding: 3rem;
      text-align: center; cursor: pointer; margin: 1.5rem 0;
    }
    [data-theme="dark"] .upload-area { border-color: #333; }
    .upload-area:hover { border-color: #ec4899; }
    input[type="file"] { display: none; }
    .stats {
      display: flex; gap: 20px; margin: 1rem 0; flex-wrap: wrap;
    }
    .stat-card {
      flex: 1; min-width: 150px; padding: 16px; background: white;
      border-radius: 12px; text-align: center;
    }
    [data-theme="dark"] .stat-card { background: #1e1e2e; }
    .stat-card strong { display: block; font-size: 1.5rem; color: #ec4899; }
    button {
      background: #ec4899; color: white; border: none;
      padding: 12px 24px; border-radius: 12px; font-weight: 600;
      cursor: pointer; margin-top: 1rem; transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link { display: inline-block; margin-top: 1rem; color: #ec4899; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <nav>
    <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
  </nav>

  <div class="container">
    <h1>Compress PDF</h1>
    <p>Reduce PDF file size while maintaining quality. All processing is done locally.</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <i class="fa-solid fa-cloud-upload" style="font-size:3rem;color:#ec4899;"></i>
      <p id="uploadText">Click to upload PDF</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(event)" />
    
    <div class="stats" id="stats" style="display:none;">
      <div class="stat-card">
        <span>Original Size</span>
        <strong id="originalSize">—</strong>
      </div>
      <div class="stat-card">
        <span>Compressed Size</span>
        <strong id="compressedSize">—</strong>
      </div>
      <div class="stat-card">
        <span>Savings</span>
        <strong id="savings">—</strong>
      </div>
    </div>
    
    <button id="compressBtn" onclick="compressPDF()" disabled>Compress PDF</button>
    <div id="progress" style="color:#6e6e73;margin-top:8px;"></div>
    <a href="./index.html" class="back-link">← Back to Tools</a>
  </div>

  <script>
    let pdfBytes = null;
    let originalFileName = '';

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file || file.type !== 'application/pdf') {
        alert('Please upload a PDF file');
        return;
      }
      originalFileName = file.name.replace('.pdf', '');
      document.getElementById('uploadText').textContent = `Selected: ${file.name}`;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        pdfBytes = new Uint8Array(e.target.result);
        document.getElementById('compressBtn').disabled = false;
        document.getElementById('stats').style.display = 'flex';
        document.getElementById('originalSize').textContent = formatBytes(pdfBytes.length);
      };
      reader.readAsArrayBuffer(file);
    }

    async function compressPDF() {
      if (!pdfBytes) return;
      
      const btn = document.getElementById('compressBtn');
      btn.disabled = true;
      btn.textContent = 'Compressing...';
      
      try {
        const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes, {
          ignoreEncryption: true,
        });
        
        // Remove metadata to reduce size
        pdfDoc.setTitle('');
        pdfDoc.setAuthor('');
        pdfDoc.setSubject('');
        pdfDoc.setKeywords([]);
        pdfDoc.setProducer('PixelPress');
        pdfDoc.setCreator('PixelPress Compressor');
        
        const compressedBytes = await pdfDoc.save({
          useObjectStreams: true,
          addDefaultPage: false,
        });
        
        const originalSize = pdfBytes.length;
        const newSize = compressedBytes.length;
        const savingsPercent = ((originalSize - newSize) / originalSize * 100).toFixed(1);
        
        document.getElementById('compressedSize').textContent = formatBytes(newSize);
        document.getElementById('savings').textContent = savingsPercent + '%';
        
        const blob = new Blob([compressedBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `${originalFileName}_compressed.pdf`;
        a.click();
        
        document.getElementById('progress').textContent = 
          `✓ PDF compressed! ${savingsPercent}% size reduction.`;
      } catch (error) {
        alert('Error compressing PDF: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Compress PDF';
      }
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(2) + ' MB';
    }

    const theme = localStorage.getItem('pixelpress-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
