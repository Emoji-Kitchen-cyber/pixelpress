<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convert Image – PixelPress</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="main-header">
    <a href="/" class="logo">🎨 PixelPress</a>
    <nav><a href="/" class="btn-outline">← All Tools</a></nav>
  </header>
  <div class="tool-page">
    <h1>🔄 Convert Image Format</h1>
    <div class="workflow-step" id="upload-step">
      <h2>1. Upload Image</h2>
      <div class="upload-zone" id="convertUploadZone">
        <div class="icon">📁</div>
        <p>Drop image here</p>
      </div>
      <input type="file" id="convertFileInput" accept="image/*" hidden>
    </div>
    <div class="workflow-step" id="settings-step" style="display:none">
      <h2>2. Choose Output Format</h2>
      <div class="settings-grid">
        <div class="form-group">
          <label>Convert to</label>
          <select id="formatSelect">
            <option value="png">PNG</option>
            <option value="jpeg">JPEG</option>
            <option value="webp">WebP</option>
            <option value="bmp">BMP</option>
          </select>
        </div>
        <button id="convertBtn" class="btn-primary">Convert Now</button>
      </div>
    </div>
    <div class="workflow-step" id="result-step" style="display:none">
      <h2>3. Converted Image</h2>
      <div class="preview-container">
        <div class="preview-box"><img id="originalPreview"></div>
        <div class="preview-box"><img id="convertedPreview"></div>
      </div>
      <div class="download-section">
        <button id="downloadBtn" class="btn-primary">📥 Download Converted Image</button>
      </div>
    </div>
  </div>
  <script src="/js/common.js"></script>
  <script src="/js/convert.js"></script>
</body>
</html>
