<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Image – PixelPress</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {font-family:'Segoe UI',sans-serif; background:#f9fafb; margin:0; padding:20px;}
        .container {max-width:1100px; margin:auto; background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1);}
        .header {background:linear-gradient(135deg, #14b8a6, #0f766e); color:white; padding:25px; text-align:center;}
        .step {display:none; padding:30px;}
        .step.active {display:block;}
        .upload-zone {border:4px dashed #cbd5e1; border-radius:16px; padding:80px 20px; text-align:center; cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🔄 Convert Image Format</h1></div>

        <div id="upload-step" class="step active">
            <h2 style="text-align:center;">Upload Image</h2>
            <div id="convertUploadZone" class="upload-zone">Drop or Click Here to Upload</div>
            <input type="file" id="convertFileInput" accept="image/*" style="display:none;">
        </div>

        <div id="settings-step" class="step">
            <h2>Choose Output Format</h2>
            <select id="formatSelect" style="width:100%; padding:14px; font-size:18px; border-radius:10px;">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPG</option>
                <option value="image/webp">WEBP</option>
            </select><br><br>
            <button id="convertBtn" style="width:100%; padding:16px; background:#14b8a6; color:white; border:none; border-radius:12px; font-size:18px; cursor:pointer; font-weight:bold;">Convert Now</button>
        </div>

        <div id="processing-step" class="step"><h2 style="text-align:center;">⏳ Converting...</h2></div>

        <div id="result-step" class="step">
            <h2 style="text-align:center; color:#10b981;">✅ Conversion Complete!</h2>
            <center><img id="convertedPreview" style="max-width:100%; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top:15px;"></center>
            <div style="text-align:center; margin-top:25px;">
                <button id="downloadConvertBtn" style="background:#10b981; color:white; padding:16px 40px; border:none; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer;">Download Converted Image</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const uploadZone = document.getElementById('convertUploadZone');
            const fileInput = document.getElementById('convertFileInput');
            const convertBtn = document.getElementById('convertBtn');
            const formatSelect = document.getElementById('formatSelect');
            const convertedPreview = document.getElementById('convertedPreview');
            const downloadConvertBtn = document.getElementById('downloadConvertBtn');

            const uploadStep = document.getElementById('upload-step');
            const settingsStep = document.getElementById('settings-step');
            const processingStep = document.getElementById('processing-step');
            const resultStep = document.getElementById('result-step');

            let imgDataUrl = '';
            let originalFileName = 'image';

            function changeStep(stepId) {
                uploadStep.classList.remove('active');
                settingsStep.classList.remove('active');
                processingStep.classList.remove('active');
                resultStep.classList.remove('active');
                document.getElementById(stepId).classList.add('active');
            }

            uploadZone.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                if (e.target.files.length > 0) handleFile(e.target.files);
            };

            uploadZone.ondragover = (e) => { e.preventDefault(); uploadZone.style.borderColor = '#14b8a6'; };
            uploadZone.ondragleave = () => { uploadZone.style.borderColor = '#cbd5e1'; };
            uploadZone.ondrop = (e) => {
                e.preventDefault();
                uploadZone.style.borderColor = '#cbd5e1';
                if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files);
            };

            function handleFile(file) {
                if (!file.type.startsWith('image/')) {
                    alert('Please upload a valid image file!');
                    return;
                }
                originalFileName = file.name.substring(0, file.name.lastIndexOf('.')) || 'image';
                const reader = new FileReader();
                reader.onload = (event) => {
                    imgDataUrl = event.target.result;
                    changeStep('settings-step');
                };
                reader.readAsDataURL(file);
            }

            convertBtn.onclick = () => {
                changeStep('processing-step');
                
                const img = new Image();
                img.src = imgDataUrl;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    const ctx = canvas.getContext('2d');

                    const format = formatSelect.value;
                    if (format === 'image/jpeg') {
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                    ctx.drawImage(img, 0, 0);

                    convertedPreview.src = canvas.toDataURL(format, 0.92);
                    
                    setTimeout(() => {
                        changeStep('result-step');
                    }, 400);
                };
            };

            downloadConvertBtn.onclick = () => {
                if (!convertedPreview.src) return;
                const format = formatSelect.value;
                const ext = format === 'image/jpeg' ? 'jpg' : format.split('/');
                const link = document.createElement('a');
                link.download = `${originalFileName}_pixelpress.${ext}`;
                link.href = convertedPreview.src;
                link.click();
            };
        });
