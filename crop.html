<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Crop Image</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
</head>
<body>
  <div class="tool-page">
    <h1>Advanced Crop</h1>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">Click to Upload</div>
    <input type="file" id="fileInput" class="hidden">
    <div id="editor" style="display:none;">
      <img id="img" style="max-width:100%">
      <button class="btn-primary" id="save">Download Crop</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="js/crop.js"></script>
</body>
</html>
