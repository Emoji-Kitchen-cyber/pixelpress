<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Crop — PixelPress</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
</head>
<body>

  <div class="workspace">
    <header class="workspace-header">
      <a href="./index.html" class="brand">PIXEL<span>PRESS</span></a>
      <div class="header-actions">
        <button id="downloadBtn" class="btn btn-primary hidden">Download Crop</button>
      </div>
    </header>

    <div class="workspace-body">
      <main class="canvas-area">
        <div class="upload-overlay" id="uploadOverlay">
          <div class="upload-card" id="dropZone">
            <span style="font-size: 48px;">✂️</span>
            <h3>Advanced Crop Tool</h3>
            <p>Drag and drop your image here or click to browse</p>
            <button class="btn btn-primary">Choose Image</button>
            <input type="file" id="fileInput" class="hidden" accept="image/*">
          </div>
        </div>

        <div style="max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center;">
          <img id="imageToCrop" style="max-width: 100%; display: block;">
        </div>
      </main>

      <aside class="sidebar">
        <div class="sidebar-section">
          <h4 class="sidebar-title">Aspect Ratios</h4>
          <div class="ratio-grid">
            <button class="ratio-btn active" data-ratio="NaN">Free Style</button>
            <button class="ratio-btn" data-ratio="1">1:1 (Square)</button>
            <button class="ratio-btn" data-ratio="1.777">16:9 (Video)</button>
            <button class="ratio-btn" data-ratio="0.75">3:4 (Portrait)</button>
            <button class="ratio-btn" data-ratio="0.5625">9:16 (Story)</button>
            <button class="ratio-btn" data-ratio="1.5">3:2 (Standard)</button>
          </div>
        </div>

        <div class="sidebar-section">
          <h4 class="sidebar-title">Flip & Rotate</h4>
          <div class="control-row">
            <button class="btn btn-outline" id="rotateLeftBtn" style="flex: 1;">↺ Rotate Left</button>
            <button class="btn btn-outline" id="rotateRightBtn" style="flex: 1;">↻ Rotate Right</button>
          </div>
          <div class="control-row">
            <button class="btn btn-outline" id="flipXBtn" style="flex: 1;">↔ Flip X</button>
            <button class="btn btn-outline" id="flipYBtn" style="flex: 1;">↕ Flip Y</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="js/crop.js"></script>
</body>
</html>
