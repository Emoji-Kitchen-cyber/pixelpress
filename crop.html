<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Crop — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .crop-container { max-width: 100%; max-height: 500px; margin: 0 auto; }
    .crop-container img { max-width: 100%; display: block; }
    .aspect-ratios { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .aspect-btn { padding: 8px 16px; border: 1px solid #d1d5db; background: #fff; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.2s; }
    .aspect-btn:hover { background: #f3f4f6; }
    .aspect-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 8px; display: none; z-index: 999; }
  </style>
</head>
<body>
  <header class="main-header">
    <a href="./index.html" class="logo">PIXEL<span style="color:#ec4899;">PRESS</span></a>
    <button class="btn-outline" onclick="history.back()">← Back</button>
  </header>

  <main class="tool-page">
    <h1>✂️ Advanced Crop</h1>
    <p style="color:#6b7280; margin-bottom:24px;">Precise cropping with preset aspect ratios. Drag to adjust, scroll to zoom.</p>

    <!-- Upload Step -->
    <div class="workflow-step" id="upload-step">
      <h2>1. Upload Image</h2>
      <div class="upload-zone" id="upload-zone">
        <div class="icon">📤</div>
        <p>Click or drag & drop an image here</p>
      </div>
      <input type="file" id="file-input" accept="image/*" hidden>
    </div>

    <!-- Crop Step -->
    <div class="workflow-step hidden" id="crop-step">
      <h2>2. Crop Your Image</h2>
      <div class="aspect-ratios" id="aspect-ratios">
        <button class="aspect-btn active" data-ratio="free">Free</button>
        <button class="aspect-btn" data-ratio="1:1">1:1</button>
        <button class="aspect-btn" data-ratio="4:5">4:5</button>
        <button class="aspect-btn" data-ratio="16:9">16:9</button>
        <button class="aspect-btn" data-ratio="9:16">9:16</button>
        <button class="aspect-btn" data-ratio="3:2">3:2</button>
      </div>
      <div class="crop-container" id="crop-container">
        <img id="crop-image" alt="Crop preview">
      </div>
      <div class="action-row">
        <button class="btn-primary" id="crop-btn">✂️ Apply Crop</button>
        <button class="btn-outline" id="reset-btn">↺ Reset</button>
        <button class="btn-outline" id="new-crop-btn">🔄 New Image</button>
      </div>
    </div>

    <!-- Result Step -->
    <div class="workflow-step hidden" id="result-step">
      <h2>3. Download Cropped Image</h2>
      <div class="preview-box" style="text-align:center;">
        <img id="result-preview" alt="Cropped result" style="max-width:100%; max-height:350px; border-radius:8px; border:1px solid #e5e7eb;">
      </div>
      <div class="download-section" style="margin-top:20px;">
        <button class="btn-primary" id="download-btn">⬇ Download</button>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="js/common.js"></script>
  <script>
    (function() {
      let cropper = null;
      let currentFile = null;

      const uploadStep = $('upload-step');
      const cropStep = $('crop-step');
      const resultStep = $('result-step');
      const cropContainer = $('crop-container');
      const cropImage = $('crop-image');
      const cropBtn = $('crop-btn');
      const resetBtn = $('reset-btn');
      const newCropBtn = $('new-crop-btn');
      const downloadBtn = $('download-btn');
      const resultPreview = $('result-preview');
      const aspectBtns = document.querySelectorAll('.aspect-btn');
      const toast = $('toast');

      // ---- Toast ----
      function showToast(msg) {
        toast.textContent = msg;
        toast.style.display = 'block';
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
      }

      // ---- Upload ----
      setupUpload('upload-zone', 'file-input', (img, file) => {
        currentFile = file;
        cropImage.src = img.src;
        uploadStep.classList.add('hidden');
        cropStep.classList.remove('hidden');
        resultStep.classList.add('hidden');

        // Destroy previous cropper if exists
        if (cropper) cropper.destroy();

        // Initialize Cropper.js
        cropper = new Cropper(cropImage, {
          viewMode: 1,
          dragMode: 'move',
          autoCropArea: 0.8,
          responsive: true,
          restore: false,
          guides: true,
          center: true,
          highlight: false,
          cropBoxMovable: true,
          cropBoxResizable: true,
          toggleDragModeOnDblclick: false,
        });
      });

      // ---- Aspect Ratio Buttons ----
      aspectBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          aspectBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const ratio = btn.dataset.ratio;
          if (!cropper) return;
          if (ratio === 'free') {
            cropper.setAspectRatio(NaN);
          } else {
            const [w, h] = ratio.split(':').map(Number);
            cropper.setAspectRatio(w / h);
          }
        });
      });

      // ---- Crop ----
      cropBtn.addEventListener('click', () => {
        if (!cropper) return;
        const canvas = cropper.getCroppedCanvas({
          maxWidth: 4096,
          maxHeight: 4096,
          imageSmoothingEnabled: true,
          imageSmoothingQuality: 'high',
        });
        if (!canvas) {
          showToast('Could not generate crop. Please try again.');
          return;
        }
        resultPreview.src = canvas.toDataURL('image/png');
        cropStep.classList.add('hidden');
        resultStep.classList.remove('hidden');
        showToast('✅ Image cropped!');
      });

      // ---- Reset ----
      resetBtn.addEventListener('click', () => {
        if (cropper) cropper.reset();
      });

      // ---- New Image ----
      newCropBtn.addEventListener('click', () => {
        if (cropper) cropper.destroy();
        cropper = null;
        cropImage.src = '';
        cropStep.classList.add('hidden');
        resultStep.classList.add('hidden');
        uploadStep.classList.remove('hidden');
        $('file-input').value = '';
      });

      // ---- Download ----
      downloadBtn.addEventListener('click', () => {
        const img = resultPreview;
        if (!img.src || img.src === '') {
          showToast('Nothing to download.');
          return;
        }
        const filename = (currentFile?.name || 'image').replace(/\.\w+$/, '') + '-cropped.png';
        // Convert dataURL to blob for download
        fetch(img.src)
          .then(res => res.blob())
          .then(blob => downloadBlob(blob, filename))
          .catch(() => showToast('Download failed.'));
      });
    })();
  </script>
</body>
</html>
