<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Image – PixelPress</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {font-family: 'Segoe UI', sans-serif; background:#f9fafb; margin:0; padding:20px;}
        .container {max-width:1100px; margin:auto; background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1);}
        .header {background:linear-gradient(135deg, #ec4899, #db2777); color:white; padding:25px; text-align:center;}
        .step {display:none; padding:30px;}
        .step.active {display:block;}
        .upload-zone {border:4px dashed #cbd5e1; border-radius:16px; padding:80px 20px; text-align:center; cursor:pointer;}
        .preview-container {position:relative; display:inline-block;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>✂️ Crop Image</h1></div>

        <div id="upload-step" class="step active">
            <h2 style="text-align:center;">Upload Image to Crop</h2>
            <div id="cropUploadZone" class="upload-zone">Drop Image Here or Click</div>
            <input type="file" id="cropFileInput" accept="image/*" style="display:none;">
        </div>

        <div id="settings-step" class="step">
            <h2>Crop Your Image</h2>
            <div class="preview-container">
                <img id="cropPreview" style="max-width:100%; max-height:500px;">
            </div>
            <div style="margin:20px 0;">
                <label>X: <input type="number" id="cropX" value="0"></label>
                <label>Y: <input type="number" id="cropY" value="0"></label>
                <label>Width: <input type="number" id="cropWidth"></label>
                <label>Height: <input type="number" id="cropHeight"></label>
            </div>
            <button id="cropBtn" style="width:100%; padding:16px; background:#ec4899; color:white; border:none; border-radius:12px; font-size:18px;">Crop Image</button>
        </div>

        <div id="processing-step" class="step"><h2 style="text-align:center;">⏳ Cropping...</h2></div>

        <div id="result-step" class="step">
            <h2 style="text-align:center; color:#10b981;">✅ Cropped!</h2>
            <img id="croppedResult" style="max-width:100%; border-radius:12px;">
            <div style="text-align:center; margin-top:25px;">
                <button id="downloadCropBtn" style="background:#10b981; color:white; padding:16px 40px; border:none; border-radius:12px;">Download Cropped Image</button>
            </div>
        </div>
    </div>

    <script src="../js/crop.js"></script>
</body>
</html>
