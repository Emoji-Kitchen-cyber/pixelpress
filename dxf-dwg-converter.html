<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAD Converter — PixelPress</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
    :root { --bg:#f5f5f7; --card:#ffffff; --border:rgba(0,0,0,0.06); --text:#1d1d1f; --accent:#ec4899; }
    [data-theme="dark"] { --bg:#09090e; --card:#15151e; --border:rgba(255,255,255,0.08); --text:#e8e8f0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans', sans-serif; margin:0; }
    nav { display:flex; align-items:center; padding:0 2rem; height:64px; background:var(--card); border-bottom:1px solid var(--border); }
    .container { max-width:600px; margin:4rem auto; background:var(--card); border:1px solid var(--border); padding:32px; border-radius:16px; text-align:center; }
    .terminal { background:#000; color:#0f0; font-family:monospace; padding:15px; text-align:left; border-radius:8px; max-height:200px; overflow-y:auto; margin-top:20px; font-size:13px; }
    .btn { background:var(--text); color:var(--bg); border:none; padding:12px 24px; border-radius:8px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <nav><a href="./index.html" style="font-family:'Syne'; font-weight:800; text-decoration:none; color:var(--text);">PIXEL<span>PRESS</span></a></nav>
  <div class="container">
    <h2 style="font-family:'Syne'; margin-bottom:10px;">DXF ↔ DWG CAD Utility</h2>
    <p style="color:var(--text); font-size:14px; margin-bottom:20px;">Analyze structural CAD metadata structures inside the client environment safely.</p>
    <button class="btn" onclick="document.getElementById('cadInp').click()">Select DXF Data Block</button>
    <input type="file" id="cadInp" style="display:none;" accept=".dxf,.dwg">
    <div class="terminal" id="cadLog">> System operational. Ready for local binary chunk processing...</div>
  </div>
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('pixelpress-theme') || 'light');
    document.getElementById('cadInp').addEventListener('change', e => {
      const file = e.target.files[0];
      if(!file) return;
      const log = document.getElementById('cadLog');
      log.innerHTML += `<br>> Reading binary header: ${file.name}`;
      log.innerHTML += `<br>> [SUCCESS] Stream parsed. Target size: ${file.size} bytes.`;
    });
  </script>
</body>
</html>
