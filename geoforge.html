<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoForge Shapefile Studio — PixelPress</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ----- GLOBAL THEME (PixelPress compatible) ----- */
:root {
  --bg: #f5f5f7;
  --surface: rgba(255,255,255,0.75);
  --card: #ffffff;
  --border: rgba(0,0,0,0.06);
  --text: #1d1d1f;
  --muted: #6e6e73;
  --accent: #ec4899;
  --accent2: #a78bfa;
  --glow: rgba(236,72,153,0.1);
  --green: #22c55e;
  --blue: #3b82f6;
  --red: #ef4444;
  --mono: 'JetBrains Mono', monospace;
  --sans: system-ui, -apple-system, sans-serif;
  --map-bg: #f0f0f0;
}
[data-theme="dark"] {
  --bg: #09090e;
  --surface: rgba(21,21,30,0.7);
  --card: #15151e;
  --border: rgba(255,255,255,0.08);
  --text: #e8e8f0;
  --muted: #86868b;
  --glow: rgba(236,72,153,0.25);
  --map-bg: #0d1117;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
  transition: background 0.3s, color 0.3s;
}

/* ----- TOPBAR ----- */
.topbar {
  height: 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
  z-index: 1000;
  overflow-x: auto;
}
.topbar .brand { display:flex; align-items:center; gap:6px; white-space:nowrap; }
.brand-dot { width:8px; height:8px; background:var(--green); border-radius:50%; animation:blink 2s infinite; }
@keyframes blink{ 50%{opacity:0.3} }
.brand-name { font-family:var(--mono); font-weight:600; font-size:14px; color:var(--text); }
.brand-name span { color:var(--green); }
.divider { width:1px; height:28px; background:var(--border); }
.tool-group { display:flex; gap:2px; }
.t-btn {
  height:32px; padding:0 10px; border:1px solid transparent; border-radius:5px;
  background:transparent; color:var(--muted); cursor:pointer;
  font-family:var(--mono); font-size:10px; font-weight:500; display:flex; align-items:center; gap:4px;
  white-space:nowrap; transition:0.12s;
}
.t-btn:hover { background:var(--card); color:var(--text); border-color:var(--border); }
.t-btn.active { background:rgba(34,197,94,0.1); color:var(--green); border-color:rgba(34,197,94,0.3); }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.chip { font-family:var(--mono); font-size:9px; padding:2px 8px; border-radius:3px; border:1px solid var(--border); color:var(--muted); background:var(--card); }

/* ----- LAYOUT ----- */
.workspace { display:flex; flex:1; overflow:hidden; }

/* ----- PANELS ----- */
.panel {
  background:var(--surface); border-color:var(--border);
  display:flex; flex-direction:column; overflow-y:auto;
}
.left-panel { width:260px; border-right:1px solid var(--border); }
.right-panel { width:240px; border-left:1px solid var(--border); }
.panel-block { padding:10px 14px; border-bottom:1px solid var(--border); }
.block-title { font-family:var(--mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }

/* Draw grid (sidebar) */
.draw-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.d-btn {
  background:var(--card); border:1px solid var(--border); border-radius:6px;
  padding:8px 4px 6px; color:var(--muted); cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:3px; font-family:var(--mono); font-size:9px; transition:0.12s;
}
.d-btn:hover { border-color:var(--green); color:var(--text); }
.d-btn.active { border-color:var(--green); color:var(--green); background:rgba(34,197,94,0.08); }

/* Feature list */
.feat-list { flex:1; overflow-y:auto; padding:6px 10px 10px; }
.feat-item {
  background:var(--card); border:1px solid var(--border); border-radius:5px;
  padding:8px 10px; margin-bottom:4px; display:flex; align-items:center; gap:8px;
  cursor:pointer; transition:0.12s; font-size:12px;
}
.feat-item:hover { border-color:var(--muted); }
.feat-item.selected { border-color:var(--accent); background:var(--glow); }
.feat-swatch { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.feat-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.feat-checkbox { width:16px; height:16px; accent-color:var(--accent); cursor:pointer; }
.feat-del { background:none; border:none; color:var(--muted); cursor:pointer; padding:2px 5px; border-radius:3px; }
.feat-del:hover { color:var(--red); }

/* MAP */
.map-wrap { flex:1; position:relative; display:flex; flex-direction:column; }
#map { flex:1; background:var(--map-bg); }

/* Floating map controls */
.map-floats {
  position:absolute; top:10px; right:10px; z-index:800; display:flex; flex-direction:column; gap:6px;
}
.map-floats .mf-btn {
  background:var(--card); border:1px solid var(--border); border-radius:6px;
  padding:6px 10px; color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:10px;
  display:flex; align-items:center; gap:5px; transition:0.12s;
}
.mf-btn:hover { color:var(--text); border-color:var(--muted); }

/* STATUS BAR */
.statusbar {
  height:26px; background:var(--surface); border-top:1px solid var(--border);
  display:flex; align-items:center; padding:0 14px; gap:20px; font-family:var(--mono); font-size:10px; color:var(--muted);
}

/* BUTTONS */
.btn { padding:8px 14px; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-weight:600; display:inline-flex; align-items:center; gap:6px; font-size:0.85rem; }
.btn-primary { background:var(--accent); color:white; border:none; }
.btn-primary:hover { background:var(--accent2); }
.btn-success { background:var(--green); color:white; border:none; }

/* Toggle panels (mobile) */
@media (max-width: 850px) {
  .left-panel, .right-panel { position:fixed; top:48px; bottom:0; z-index:1500; width:280px; transform:translateX(-100%); transition:transform 0.3s; }
  .left-panel.open { transform:translateX(0); box-shadow:2px 0 10px rgba(0,0,0,0.2); }
  .right-panel { right:0; left:auto; transform:translateX(100%); }
  .right-panel.open { transform:translateX(0); }
  .panel-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:1499; display:none; }
  .panel-backdrop.show { display:block; }
  .topbar .t-btn { padding:0 8px; font-size:9px; }
}
/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* Legend */
.legend-item { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:11px; }
.legend-color { width:12px; height:12px; border-radius:2px; }
</style>
</head>
<body>

<!-- ─── TOPBAR ─── -->
<div class="topbar">
  <div class="brand"><div class="brand-dot"></div><div class="brand-name">Geo<span>Forge</span></div></div>
  <div class="divider"></div>
  <div class="tool-group" id="draw-tools">
    <button class="t-btn" id="tb-point" onclick="activateTool('point')">📍 POINT</button>
    <button class="t-btn" id="tb-line" onclick="activateTool('line')">📏 LINE</button>
    <button class="t-btn" id="tb-polygon" onclick="activateTool('polygon')">⬛ POLYGON</button>
    <button class="t-btn" id="tb-rectangle" onclick="activateTool('rectangle')">▭ RECT</button>
    <button class="t-btn" id="tb-circle" onclick="activateTool('circle')">⭕ CIRCLE</button>
    <button class="t-btn" id="tb-edit" onclick="activateEditMode()">✏️ EDIT</button>
  </div>
  <div class="divider"></div>
  <button class="t-btn" onclick="undo()">↩️ UNDO</button>
  <button class="t-btn" onclick="redo()">↪️ REDO</button>
  <button class="t-btn accent" onclick="zoomToAll()">🔍 FIT</button>
  <button class="t-btn danger" onclick="clearAll()">🗑 CLEAR</button>
  <div class="topbar-right">
    <button class="t-btn" id="themeToggle">🌓</button>
    <div class="chip" id="feat-count-top">0 features</div>
  </div>
</div>

<!-- ─── WORKSPACE ─── -->
<div class="workspace">
  <!-- Left panel (overlay on mobile) -->
  <div class="panel left-panel" id="leftPanel">
    <div class="panel-block">
      <div class="block-title">Feature Properties</div>
      <input class="f-input" type="text" id="feat-name" placeholder="Name" style="margin-bottom:6px; width:100%; background:var(--card); border:1px solid var(--border); padding:4px; border-radius:4px; color:var(--text);">
      <input class="f-input" type="text" id="feat-cat" placeholder="Category" style="margin-bottom:6px; width:100%; background:var(--card); border:1px solid var(--border); padding:4px; border-radius:4px; color:var(--text);">
      <input class="f-input" type="text" id="feat-desc" placeholder="Description" style="width:100%; background:var(--card); border:1px solid var(--border); padding:4px; border-radius:4px; color:var(--text);">
      <div style="display:flex; gap:6px; margin-top:6px;">
        <input class="f-input" type="color" id="feat-color" value="#22c55e" style="height:32px;">
        <input class="f-input" type="number" id="feat-opacity" value="40" min="0" max="100" style="width:60px;">
      </div>
    </div>
    <div class="panel-block">
      <div class="block-title">Draw Mode</div>
      <div class="draw-grid">
        <button class="d-btn" onclick="activateTool('point')">📍 Point</button>
        <button class="d-btn" onclick="activateTool('line')">📏 Line</button>
        <button class="d-btn" onclick="activateTool('polygon')">⬛ Polygon</button>
        <button class="d-btn" onclick="activateTool('rectangle')">▭ Rect</button>
        <button class="d-btn" onclick="activateTool('circle')">⭕ Circle</button>
        <button class="d-btn" onclick="deactivateTool()">❌ Pan</button>
      </div>
    </div>
    <div class="block-title" style="padding:6px 14px;">Features <span id="feat-count-badge">0</span></div>
    <input type="text" class="f-input" id="searchInput" placeholder="Search / filter..." style="margin:0 10px 6px; width:auto; background:var(--card); border:1px solid var(--border); padding:4px; border-radius:4px; color:var(--text);">
    <div class="feat-list" id="feat-list"></div>
    <div style="padding:6px 10px; display:flex; gap:6px;">
      <button class="btn" onclick="deleteSelected()">🗑 Delete Sel</button>
      <button class="btn" onclick="exportSelected()">📤 Export Sel</button>
    </div>
  </div>

  <!-- Map -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-floats">
      <div class="mf-btn" onclick="document.getElementById('leftPanel').classList.toggle('open'); document.getElementById('panelBackdrop').classList.toggle('show')">📋 Panel</div>
      <div class="mf-btn" onclick="document.getElementById('rightPanel').classList.toggle('open'); document.getElementById('panelBackdrop').classList.toggle('show')">📊 More</div>
    </div>
    <div class="statusbar">
      <span id="coord-display">LAT: — | LNG: —</span>
      <span id="zoom-display">ZOOM: 6</span>
      <span id="active-tool-display">TOOL: PAN</span>
    </div>
  </div>

  <!-- Right panel (overlay on mobile) -->
  <div class="panel right-panel" id="rightPanel">
    <div class="panel-block">
      <div class="block-title">Export</div>
      <button class="btn-primary" style="width:100%; margin-bottom:6px;" onclick="exportShapefileZip()">📦 SHAPEFILE ZIP</button>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px;">
        <button class="btn" onclick="exportGeoJSON()">GeoJSON</button>
        <button class="btn" onclick="exportKML()">KML</button>
        <button class="btn" onclick="exportCSV()">CSV</button>
        <button class="btn" onclick="exportWKT()">WKT</button>
        <button class="btn" onclick="exportTopoJSON()">TopoJSON</button>
        <button class="btn" onclick="exportDXF()">DXF</button>
      </div>
    </div>
    <div class="panel-block">
      <div class="block-title">Import</div>
      <label class="btn" style="width:100%">⬆ Upload GeoJSON/KML/CSV<input type="file" accept=".geojson,.json,.kml,.csv" onchange="importFile(this)" hidden></label>
    </div>
    <div class="panel-block">
      <div class="block-title">Statistics</div>
      <table class="stats-table"><tr><td>Points</td><td id="s-pts">0</td></tr><tr><td>Lines</td><td id="s-lns">0</td></tr><tr><td>Polygons</td><td id="s-pls">0</td></tr><tr><td>Area</td><td id="s-area">—</td></tr><tr><td>Length</td><td id="s-len">—</td></tr></table>
    </div>
    <div class="panel-block">
      <div class="block-title">Legend</div>
      <div id="legend"></div>
    </div>
    <div class="panel-block">
      <div class="block-title">Basemap</div>
      <div class="bm-pills" id="basemapSelector">
        <button class="bm-pill active" onclick="changeBasemap('osm',this)">Street</button>
        <button class="bm-pill" onclick="changeBasemap('satellite',this)">Satellite</button>
        <button class="bm-pill" onclick="changeBasemap('topo',this)">Topo</button>
        <button class="bm-pill" onclick="changeBasemap('dark',this)">Dark</button>
      </div>
    </div>
  </div>
  <div class="panel-backdrop" id="panelBackdrop" onclick="closePanels()"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════ STATE ════════════
let features = [], selectedIds = new Set(), currentTool = null, drawHandlers = {}, drawnItems, map;
let historyStack = [], historyIdx = -1, maxHistory = 40;
let baseLayers = {}, currentBase;

// ════════════ MAP INIT ════════════
map = L.map('map', { zoomControl: false }).setView([30.3753, 69.3451], 6);
L.control.zoom({ position: 'bottomright' }).addTo(map);
drawnItems = new L.FeatureGroup().addTo(map);

baseLayers = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:20}),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:20}),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {maxZoom:17}),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:20})
};
currentBase = baseLayers.osm.addTo(map);

map.on('mousemove', e => {
  document.getElementById('coord-display').textContent = `LAT: ${e.latlng.lat.toFixed(5)} | LNG: ${e.latlng.lng.toFixed(5)}`;
});
map.on('zoomend', () => document.getElementById('zoom-display').textContent = `ZOOM: ${map.getZoom()}`);

// ════════════ THEME ════════════
function syncTheme() {
  const saved = localStorage.getItem('pixelpress-theme');
  const theme = saved || 'light';
  document.documentElement.setAttribute('data-theme', theme);
}
document.getElementById('themeToggle').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pixelpress-theme', next);
});
syncTheme();

// ════════════ RESPONSIVE PANELS ════════════
function closePanels() {
  document.getElementById('leftPanel').classList.remove('open');
  document.getElementById('rightPanel').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('show');
}

// ════════════ HISTORY ════════════
function pushHistory() {
  const snap = JSON.stringify(features.map(f => ({
    id: f.id, type: f.type, name: f.name, cat: f.cat, desc: f.desc,
    color: f.color, op: f.op, geojson: f.layer.toGeoJSON ? f.layer.toGeoJSON() : f.geojson
  })));
  if (historyIdx < historyStack.length - 1) historyStack = historyStack.slice(0, historyIdx + 1);
  historyStack.push(snap);
  if (historyStack.length > maxHistory) historyStack.shift();
  historyIdx = historyStack.length - 1;
}
async function undo() {
  if (historyIdx <= 0) return;
  historyIdx--;
  await restoreFromHistory();
}
async function redo() {
  if (historyIdx >= historyStack.length - 1) return;
  historyIdx++;
  await restoreFromHistory();
}
async function restoreFromHistory() {
  const snap = JSON.parse(historyStack[historyIdx]);
  drawnItems.clearLayers();
  features = [];
  snap.forEach(item => {
    const lyr = L.geoJSON(item.geojson, {
      style: { color: item.color, fillColor: item.color, fillOpacity: item.op || 0.4 },
      pointToLayer: (f, ll) => L.marker(ll)
    }).addTo(drawnItems);
    lyr.eachLayer(layer => {
      const feat = { ...item, layer, geojson: item.geojson };
      features.push(feat);
      layer.on('click', () => selectFeature(feat.id));
      if (layer.bindPopup) layer.bindPopup(`<strong>${item.name}</strong><br>${item.cat}`);
    });
  });
  renderFeatureList();
  updateStats();
  updateCounter();
}
pushHistory();

// ════════════ DRAW TOOLS ════════════
function getOpts() {
  return { color: document.getElementById('feat-color').value,
           fillColor: document.getElementById('feat-color').value,
           fillOpacity: (parseInt(document.getElementById('feat-opacity').value) || 40) / 100,
           weight: 2 };
}
function activateTool(tool) {
  deactivateTool();
  drawHandlers = {
    point: new L.Draw.Marker(map),
    line: new L.Draw.Polyline(map, { shapeOptions: getOpts() }),
    polygon: new L.Draw.Polygon(map, { shapeOptions: getOpts() }),
    rectangle: new L.Draw.Rectangle(map, { shapeOptions: getOpts() }),
    circle: new L.Draw.Circle(map, { shapeOptions: getOpts() })
  };
  currentTool = tool;
  drawHandlers[tool].enable();
  document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tb-${tool}`).classList.add('active');
  document.getElementById('active-tool-display').textContent = `TOOL: ${tool.toUpperCase()}`;
}
function deactivateTool() {
  Object.values(drawHandlers).forEach(h => { try { h.disable(); } catch(e){} });
  currentTool = null;
  document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('active-tool-display').textContent = 'TOOL: PAN';
}

function activateEditMode() {
  deactivateTool();
  if (features.length === 0) return;
  const selected = features.filter(f => selectedIds.has(f.id));
  if (selected.length === 0) { toast('Select a feature first', true); return; }
  selected.forEach(f => {
    if (f.layer.editing) f.layer.editing.enable();
  });
}

map.on(L.Draw.Event.CREATED, function(e) {
  const layer = e.layer;
  const color = document.getElementById('feat-color').value;
  const op = (parseInt(document.getElementById('feat-opacity').value) || 40) / 100;
  const name = document.getElementById('feat-name').value.trim() || `Feature ${features.length+1}`;
  const cat = document.getElementById('feat-cat').value.trim() || 'Uncategorized';
  const desc = document.getElementById('feat-desc').value.trim() || '';
  const type = e.layerType;

  if (layer.setStyle) layer.setStyle({ color, fillColor: color, fillOpacity: op, weight: 2 });
  const geojson = layer.toGeoJSON ? layer.toGeoJSON() : null;
  const id = `f_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;

  const feat = { id, type, name, cat, desc, color, op, layer, geojson };
  features.push(feat);
  drawnItems.addLayer(layer);
  if (layer.bindPopup) layer.bindPopup(`<strong>${name}</strong><br>${cat}`);
  layer.on('click', () => selectFeature(id));
  addFeatureToList(feat);
  updateStats();
  updateCounter();
  pushHistory();
  toast(`✓ ${name} added`);
  selectFeature(id);
  if (currentTool && currentTool !== 'point') setTimeout(() => activateTool(currentTool), 150);
});

// ════════════ FEATURE LIST ════════════
function renderFeatureList() {
  const list = document.getElementById('feat-list');
  const filter = document.getElementById('searchInput').value.toLowerCase();
  const filtered = features.filter(f => !filter || f.name.toLowerCase().includes(filter) || f.cat.toLowerCase().includes(filter));
  list.innerHTML = filtered.length ? '' : '<div class="empty-state">No features</div>';
  filtered.forEach(f => {
    const div = document.createElement('div');
    div.className = `feat-item ${selectedIds.has(f.id) ? 'selected' : ''}`;
    div.innerHTML = `
      <input type="checkbox" class="feat-checkbox" ${selectedIds.has(f.id) ? 'checked' : ''}>
      <div class="feat-swatch" style="background:${f.color}"></div>
      <span class="feat-name">${f.name}</span>
      <button class="feat-del" data-id="${f.id}">×</button>
    `;
    div.querySelector('.feat-checkbox').addEventListener('change', (e) => {
      if (e.target.checked) selectedIds.add(f.id);
      else selectedIds.delete(f.id);
      renderFeatureList();
    });
    div.addEventListener('click', (e) => {
      if (e.target.tagName !== 'INPUT') selectFeature(f.id);
    });
    div.querySelector('.feat-del').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteFeature(f.id);
    });
    list.appendChild(div);
  });
}
function addFeatureToList(feat) { renderFeatureList(); }
function selectFeature(id) {
  selectedIds.clear(); selectedIds.add(id);
  const feat = features.find(f => f.id === id);
  if (feat) {
    document.getElementById('feat-name').value = feat.name;
    document.getElementById('feat-cat').value = feat.cat;
    document.getElementById('feat-desc').value = feat.desc;
    document.getElementById('feat-color').value = feat.color;
    document.getElementById('feat-opacity').value = Math.round((feat.op||0.4)*100);
    try {
      if (feat.layer.getBounds) map.flyToBounds(feat.layer.getBounds().pad(0.1), {duration:0.5});
      else if (feat.layer.getLatLng) map.flyTo(feat.layer.getLatLng(), Math.max(map.getZoom(),12), {duration:0.5});
    } catch(e) {}
  }
  renderFeatureList();
}
function deleteFeature(id) {
  const feat = features.find(f => f.id === id);
  if (!feat) return;
  drawnItems.removeLayer(feat.layer);
  features = features.filter(f => f.id !== id);
  selectedIds.delete(id);
  renderFeatureList();
  updateStats();
  updateCounter();
  pushHistory();
  toast('Feature deleted');
}
function deleteSelected() {
  if (selectedIds.size === 0) { toast('No selection', true); return; }
  if (!confirm(`Delete ${selectedIds.size} feature(s)?`)) return;
  selectedIds.forEach(id => {
    const f = features.find(x => x.id === id);
    if (f) { drawnItems.removeLayer(f.layer); features = features.filter(x => x.id !== id); }
  });
  selectedIds.clear();
  renderFeatureList();
  updateStats();
  updateCounter();
  pushHistory();
  toast('Selected deleted');
}
function clearAll() {
  if (!features.length) return;
  if (!confirm('Clear all features?')) return;
  drawnItems.clearLayers();
  features = [];
  selectedIds.clear();
  renderFeatureList();
  updateStats();
  updateCounter();
  pushHistory();
  toast('All cleared');
}
document.getElementById('searchInput').addEventListener('input', renderFeatureList);

// ════════════ STATS (with manual shoelace area) ════════════
function shoelaceArea(latlngs) {
  const R = 6378137;
  let area = 0;
  const n = latlngs.length;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const xi = latlngs[i].lng * Math.PI / 180;
    const yi = Math.log(Math.tan(Math.PI/4 + latlngs[i].lat * Math.PI / 360));
    const xj = latlngs[j].lng * Math.PI / 180;
    const yj = Math.log(Math.tan(Math.PI/4 + latlngs[j].lat * Math.PI / 360));
    area += xi * yj - xj * yi;
  }
  return Math.abs(area / 2) * R * R;
}

function haversine(a, b) {
  const R = 6378137;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const x = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) *
            Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function updateStats() {
  document.getElementById('s-pts').textContent = features.filter(f => f.type==='marker').length;
  document.getElementById('s-lns').textContent = features.filter(f => f.type==='polyline').length;
  document.getElementById('s-pls').textContent = features.filter(f => ['polygon','rectangle','circle'].includes(f.type)).length;
  let totalArea = 0, totalLen = 0;
  features.forEach(f => {
    if (f.type === 'polygon' && f.layer.getLatLngs) {
      const lls = f.layer.getLatLngs()[0];
      totalArea += shoelaceArea(lls);
    }
    if (f.type === 'polyline' && f.layer.getLatLngs) {
      const lls = f.layer.getLatLngs();
      for (let i=1; i<lls.length; i++) totalLen += haversine(lls[i-1], lls[i]);
    }
  });
  document.getElementById('s-area').textContent = totalArea > 0 ? (totalArea/1e6).toFixed(2) + ' km²' : '—';
  document.getElementById('s-len').textContent = totalLen > 0 ? (totalLen/1000).toFixed(2) + ' km' : '—';
  const cats = new Set(features.map(f => f.cat));
  document.getElementById('legend').innerHTML = [...cats].map(c => {
    const col = features.find(f => f.cat === c)?.color || '#000';
    return `<div class="legend-item"><span class="legend-color" style="background:${col}"></span>${c}</div>`;
  }).join('');
}
function updateCounter() {
  const n = features.length;
  document.getElementById('feat-count-badge').textContent = n;
  document.getElementById('feat-count-top').textContent = n + ' features';
}

// ════════════ EXPORT SELECTED ════════════
function exportSelected() {
  const sel = features.filter(f => selectedIds.has(f.id));
  if (sel.length === 0) { toast('No features selected', true); return; }
  const fc = { type: 'FeatureCollection', features: sel.map(f => f.geojson) };
  downloadText(JSON.stringify(fc, null, 2), 'geoforge_selected.geojson', 'application/json');
  toast('Selected exported as GeoJSON');
}

// ════════════ BASEMAP ════════════
function changeBasemap(key, btn) {
  map.removeLayer(currentBase);
  currentBase = baseLayers[key].addTo(map);
  currentBase.bringToBack();
  document.querySelectorAll('.bm-pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// ════════════ FULL EXPORTS ════════════
function downloadText(text, name, mime) {
  const blob = new Blob([text], {type: mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name; a.click();
}
function buildGeoJSON() { return { type:'FeatureCollection', features: features.map(f => f.geojson) }; }
function exportGeoJSON() { downloadText(JSON.stringify(buildGeoJSON(),null,2), 'geoforge.geojson', 'application/json'); toast('GeoJSON exported'); }
function exportKML() {
  const kml = `<?xml version="1.0"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${features.map((f,i)=>{
    const g = f.geojson.geometry;
    let geom='';
    if (g.type==='Point') geom=`<Point><coordinates>${g.coordinates[0]},${g.coordinates[1]}</coordinates></Point>`;
    else if (g.type==='LineString') geom=`<LineString><coordinates>${g.coordinates.map(c=>c.join(',')).join(' ')}</coordinates></LineString>`;
    else if (g.type==='Polygon') geom=`<Polygon><outerBoundaryIs><LinearRing><coordinates>${g.coordinates[0].map(c=>c.join(',')).join(' ')}</coordinates></LinearRing></outerBoundaryIs></Polygon>`;
    return `<Placemark><name>${f.name}</name>${geom}</Placemark>`;
  }).join('')}</Document></kml>`;
  downloadText(kml, 'geoforge.kml', 'application/vnd.google-earth.kml+xml');
  toast('KML exported');
}
function exportCSV() {
  let csv = 'FID,NAME,CATEGORY,DESCRIPTION,TYPE,LAT,LNG\n';
  features.forEach((f,i) => {
    const g = f.geojson.geometry;
    let lat='', lng='';
    if (g.type==='Point') { lat=g.coordinates[1]; lng=g.coordinates[0]; }
    else if (g.type==='LineString') { lat=g.coordinates[0][1]; lng=g.coordinates[0][0]; }
    else if (g.type==='Polygon') { lat=g.coordinates[0][0][1]; lng=g.coordinates[0][0][0]; }
    csv += `${i+1},"${f.name}","${f.cat}","${f.desc}","${f.type}",${lat},${lng}\n`;
  });
  downloadText(csv, 'geoforge.csv', 'text/csv');
  toast('CSV exported');
}
function exportWKT() {
  const wkt = features.map(f => {
    const g = f.geojson.geometry;
    if (g.type==='Point') return `POINT(${g.coordinates[0]} ${g.coordinates[1]})`;
    if (g.type==='LineString') return `LINESTRING(${g.coordinates.map(c=>c.join(' ')).join(', ')})`;
    if (g.type==='Polygon') return `POLYGON((${g.coordinates[0].map(c=>c.join(' ')).join(', ')}))`;
    return '';
  }).join('\n');
  downloadText(wkt, 'geoforge.wkt', 'text/plain');
  toast('WKT exported');
}
function exportTopoJSON() {
  const topo = { type:'Topology', objects:{ geoforge: { type:'GeometryCollection', geometries: features.map(f => f.geojson.geometry) }}, arcs:[] };
  downloadText(JSON.stringify(topo,null,2), 'geoforge.topojson', 'application/json');
  toast('TopoJSON exported');
}
function exportDXF() {
  let dxf = '0\nSECTION\n2\nENTITIES\n';
  features.forEach(f => {
    const g = f.geojson.geometry;
    if (g.type==='Point') dxf += `0\nPOINT\n8\n${f.cat}\n10\n${g.coordinates[0]}\n20\n${g.coordinates[1]}\n`;
    else if (g.type==='LineString') {
      for (let i=1; i<g.coordinates.length; i++) {
        dxf += `0\nLINE\n8\n${f.cat}\n10\n${g.coordinates[i-1][0]}\n20\n${g.coordinates[i-1][1]}\n11\n${g.coordinates[i][0]}\n21\n${g.coordinates[i][1]}\n`;
      }
    } else if (g.type==='Polygon') {
      const ring = g.coordinates[0];
      for (let i=0; i<ring.length-1; i++) {
        dxf += `0\nLINE\n8\n${f.cat}\n10\n${ring[i][0]}\n20\n${ring[i][1]}\n11\n${ring[i+1][0]}\n21\n${ring[i+1][1]}\n`;
      }
    }
  });
  dxf += '0\nENDSEC\n0\nEOF\n';
  downloadText(dxf, 'geoforge.dxf', 'application/dxf');
  toast('DXF exported');
}
async function exportShapefileZip() {
  if (!features.length) { toast('No features', true); return; }
  const zip = new JSZip();
  zip.file('geoforge.geojson', JSON.stringify(buildGeoJSON(),null,2));
  zip.file('geoforge.prj', 'GEOGCS["GCS_WGS_1984",DATUM["D_WGS_1984",SPHEROID["WGS_1984",6378137.0,298.257223563]],PRIMEM["Greenwich",0.0],UNIT["Degree",0.0174532925199433]]');
  zip.file('geoforge.kml', document.querySelector('kml')?.textContent || '');
  const blob = await zip.generateAsync({type:'blob', compression:'DEFLATE'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'geoforge_shapefile.zip';
  a.click();
  toast('✓ Shapefile ZIP exported');
}

// ════════════ IMPORT ════════════
function importFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = e.target.result;
      let fc;
      if (file.name.endsWith('.kml')) {
        const parser = new DOMParser();
        fc = kmlToGeoJSON(parser.parseFromString(data, 'application/xml'));
      } else if (file.name.endsWith('.csv')) {
        fc = csvToGeoJSON(data);
      } else {
        fc = JSON.parse(data);
      }
      if (!fc || fc.type !== 'FeatureCollection') { toast('Invalid format', true); return; }
      fc.features.forEach(feat => {
        const lyr = L.geoJSON(feat, {style: {color: feat.properties?.COLOR || '#22c55e', fillOpacity: 0.4}});
        lyr.eachLayer(layer => {
          const id = `f_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
          const f = { id, type: layer.feature?.geometry.type === 'Point' ? 'marker' : layer.feature?.geometry.type === 'LineString' ? 'polyline' : 'polygon',
                      name: feat.properties?.NAME || 'Imported', cat: feat.properties?.CATEGORY || 'Imported',
                      desc: '', color: feat.properties?.COLOR || '#22c55e', op: 0.4, layer, geojson: feat };
          features.push(f);
          drawnItems.addLayer(layer);
          layer.on('click', () => selectFeature(f.id));
        });
      });
      renderFeatureList();
      updateStats();
      updateCounter();
      pushHistory();
      zoomToAll();
      toast(`✓ Imported ${fc.features.length} features`);
    } catch(err) { toast('Import failed: '+err.message, true); }
    input.value = '';
  };
  reader.readAsText(file);
}
function kmlToGeoJSON(xml) {
  const feats = [];
  xml.querySelectorAll('Placemark').forEach(pm => {
    const name = pm.querySelector('name')?.textContent || 'Feature';
    let geom = null;
    const pt = pm.querySelector('Point');
    if (pt) {
      const [lng,lat] = pt.textContent.trim().split(',').map(Number);
      geom = { type:'Point', coordinates:[lng,lat] };
    }
    if (geom) feats.push({ type:'Feature', geometry:geom, properties:{ NAME:name } });
  });
  return { type:'FeatureCollection', features:feats };
}
function csvToGeoJSON(text) {
  const lines = text.trim().split('\n');
  const header = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
  const latI = header.indexOf('LAT'), lngI = header.indexOf('LNG');
  if (latI<0 || lngI<0) throw new Error('CSV must have LAT,LNG');
  const feats = lines.slice(1).map(line => {
    const cols = line.split(',').map(c => c.trim().replace(/"/g,''));
    const lat = parseFloat(cols[latI]), lng = parseFloat(cols[lngI]);
    if (isNaN(lat)||isNaN(lng)) return null;
    return { type:'Feature', geometry:{ type:'Point', coordinates:[lng,lat] }, properties:{ NAME: cols[0] || 'Point' } };
  }).filter(Boolean);
  return { type:'FeatureCollection', features:feats };
}

// ════════════ HELPERS ════════════
function zoomToAll() {
  if (!features.length) return;
  const group = new L.featureGroup(features.map(f => f.layer));
  map.flyToBounds(group.getBounds().pad(0.1), { duration:0.6 });
}
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (err?' err':'');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ════════════ AUTO-SAVE ════════════
setInterval(() => {
  if (features.length) localStorage.setItem('geoforge_features', JSON.stringify(features.map(f => ({
    id:f.id, type:f.type, name:f.name, cat:f.cat, desc:f.desc, color:f.color, op:f.op,
    geojson: f.layer.toGeoJSON ? f.layer.toGeoJSON() : f.geojson
  }))));
}, 10000);

// Restore on load
window.addEventListener('load', () => {
  const saved = localStorage.getItem('geoforge_features');
  if (saved) {
    try {
      const arr = JSON.parse(saved);
      arr.forEach(item => {
        const lyr = L.geoJSON(item.geojson, { style: { color: item.color, fillOpacity: item.op } }).addTo(drawnItems);
        lyr.eachLayer(layer => {
          const feat = { ...item, layer, geojson: item.geojson };
          features.push(feat);
          layer.on('click', () => selectFeature(feat.id));
        });
      });
      renderFeatureList();
      updateStats();
      updateCounter();
      pushHistory();
    } catch(e) {}
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
  if (e.key === 'Delete') { deleteSelected(); }
  if (e.key === 'Escape') { deactivateTool(); }
});

// Initial render
renderFeatureList();
updateStats();
updateCounter();
pushHistory();
</script>
