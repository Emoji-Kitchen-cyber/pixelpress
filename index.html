  <script>
    // CDN Fallback Loader
    window.cdnFallback = function(primaryUrl, backupUrl, callback) {
      var script = document.createElement('script');
      script.src = primaryUrl;
      script.onerror = function() {
        console.warn('Primary CDN failed for', primaryUrl, '- loading backup');
        var fallback = document.createElement('script');
        fallback.src = backupUrl;
        fallback.onload = callback || function(){};
        document.head.appendChild(fallback);
      };
      script.onload = callback || function(){};
      document.head.appendChild(script);
    };

    // Global error logger
    window.onerror = function(message, source, lineno, colno, error) {
      var errors = [];
      try { errors = JSON.parse(localStorage.getItem('pixelpress_errors') || '[]'); } catch(e) {}
      errors.push({
        message: message,
        source: source || 'unknown',
        line: lineno,
        time: new Date().toISOString(),
        userAgent: navigator.userAgent.substring(0, 100)
      });
      if (errors.length > 30) errors.shift();
      try { localStorage.setItem('pixelpress_errors', JSON.stringify(errors)); } catch(e) {}
      return false; // Let default handler run too
    };

    // localStorage expiry helper
    window.storeWithExpiry = function(key, value, days) {
      days = days || 30;
      var item = { value: value, expiry: Date.now() + (days * 86400000) };
      try { localStorage.setItem(key, JSON.stringify(item)); } catch(e) { clearOldStorage(key, item); }
    };

    function clearOldStorage(key, item) {
      var keys = Object.keys(localStorage);
      for (var i = 0; i < keys.length; i++) {
        try {
          var data = JSON.parse(localStorage.getItem(keys[i]));
          if (data && data.expiry && Date.now() > data.expiry) {
            localStorage.removeItem(keys[i]);
          }
        } catch(e) { /* skip non-JSON items */ }
      }
      try { localStorage.setItem(key, JSON.stringify(item)); } catch(e) {}
    }

    window.getWithExpiry = function(key) {
      var item = localStorage.getItem(key);
      if (!item) return null;
      try {
        var parsed = JSON.parse(item);
        if (Date.now() > parsed.expiry) { localStorage.removeItem(key); return null; }
        return parsed.value;
      } catch(e) { return null; }
    };

    // Weekly cleanup
    setInterval(function() {
      var keys = Object.keys(localStorage);
      for (var i = 0; i < keys.length; i++) {
        try {
          var data = JSON.parse(localStorage.getItem(keys[i]));
          if (data && data.expiry && Date.now() > data.expiry) {
            localStorage.removeItem(keys[i]);
          }
        } catch(e) {}
      }
    }, 604800000);

    // Performance observer for LCP
    if ('PerformanceObserver' in window) {
      try {
        var lcpObserver = new PerformanceObserver(function(list) {
          var entries = list.getEntries();
          if (entries.length > 0) {
            var lcp = entries[entries.length - 1];
            if (lcp.startTime > 2500) {
              console.warn('LCP warning:', Math.round(lcp.startTime) + 'ms');
            }
          }
        });
        lcpObserver.observe({ type: 'largest-contentful-paint', buffered: true });
      } catch(e) {}
    }
  </script>

    let currentLang = 'en';

    function renderUI() {
      const data = languageData[currentLang];
      
      document.getElementById('siteTitle').innerText = data.title;
      document.getElementById('langText').innerText = data.labelText;
      document.getElementById('heroTitle').innerHTML = data.heroTitle;
      document.getElementById('heroDesc').innerText = data.heroDesc;
      document.getElementById('footerCopyright').innerText = data.copyright;
      document.getElementById('noResults').innerText = data.noResultsText;
      
      const searchBox = document.getElementById('toolSearch');
      searchBox.placeholder = data.searchPlaceholder;

      const filterBox = document.getElementById('filterContainer');
      filterBox.innerHTML = '';
      data.filters.forEach((f, i) => {
        const btn = document.createElement('button');
        btn.className = `filter-pill ${i === 0 ? 'active' : ''}`;
        btn.innerText = f.text;
        btn.setAttribute('data-target', f.id);
        btn.onclick = function() { filterCategory(f.id, this); };
        filterBox.appendChild(btn);
      });

      const toolsGrid = document.getElementById('toolsList');
      toolsGrid.innerHTML = '';
      const gridItems = data.toolsRegistry.filter(item => item.isUtilityCard);
      gridItems.forEach(t => {
        toolsGrid.innerHTML += `
          <a href="${t.href}" class="tool-link" data-category="${t.cat}">
            <div class="tool-card">
              <div class="tool-icon-wrapper">${t.emoji}</div>
              <div class="tool-info-pane">
                <h2>${t.title}</h2>
                <p>${t.desc}</p>
              </div>
            </div>
          </a>`;
      });

      const fLinks = document.getElementById('footerLinks');
      fLinks.innerHTML = '';
      data.footer.forEach(item => { fLinks.innerHTML += `<a href="${item.href}">${item.text}</a>`; });

      const sidebarBox = document.getElementById('sidebarLinks');
      sidebarBox.innerHTML = '';
      const homeLink = data.toolsRegistry.find(item => item.section === 'home');
      if (homeLink) sidebarBox.innerHTML += `<a href="${homeLink.href}"><i class="fa-solid ${homeLink.icon}"></i> ${homeLink.text}</a>`;

      sidebarBox.innerHTML += `<div class="menu-section-title">${data.sidebarTitles.image}</div>`;
      data.toolsRegistry.forEach(item => { if (item.section === 'image') sidebarBox.innerHTML += `<a href="${item.href}"><i class="fa-solid ${item.icon}"></i> ${item.text}</a>`; });

      sidebarBox.innerHTML += `<div class="menu-section-title">${data.sidebarTitles.doc}</div>`;
      data.toolsRegistry.forEach(item => { if (item.section === 'doc') sidebarBox.innerHTML += `<a href="${item.href}"><i class="fa-solid ${item.icon}"></i> ${item.text}</a>`; });

      sidebarBox.innerHTML += `<div class="menu-section-title">${data.sidebarTitles.utility}</div>`;
      data.toolsRegistry.forEach(item => { if (item.section === 'utility') sidebarBox.innerHTML += `<a href="${item.href}"><i class="fa-solid ${item.icon}"></i> ${item.text}</a>`; });

      sidebarBox.innerHTML += `<div class="menu-section-title">${data.sidebarTitles.gis}</div>`;
      data.toolsRegistry.forEach(item => { if (item.section === 'gis') sidebarBox.innerHTML += `<a href="${item.href}"><i class="fa-solid ${item.icon}"></i> ${item.text}</a>`; });

      sidebarBox.innerHTML += `<div style="height:1px;background:var(--border);margin:10px 0;"></div><div class="menu-section-title">${data.sidebarTitles.info}</div>`;
      data.toolsRegistry.forEach(item => { if (item.section === 'info') sidebarBox.innerHTML += `<a href="${item.href}"><i class="fa-solid ${item.icon}"></i> ${item.text}</a>`; });

      evaluateLiveSearchFilters();
    }

    function toggleLanguage() {
      const toggleBtn = document.getElementById('langToggleBtn');
      if (currentLang === 'en') {
        currentLang = 'ar';
        document.body.classList.add('rtl');
        toggleBtn.classList.remove('active');
      } else {
        currentLang = 'en';
        document.body.classList.remove('rtl');
        toggleBtn.classList.add('active');
      }
      renderUI();
    }

    const searchInput = document.getElementById('toolSearch');
    function evaluateLiveSearchFilters() {
      const query = searchInput.value.toLowerCase().trim();
      const activePill = document.querySelector('.filter-pill.active');
      const targetCategory = activePill ? activePill.getAttribute('data-target') : 'all';
      let aggregateMatchCount = 0;
      const links = document.querySelectorAll('.tool-link');
      links.forEach(link => {
        const title = link.querySelector('h2').textContent.toLowerCase();
        const description = link.querySelector('p').textContent.toLowerCase();
        const categories = link.getAttribute('data-category').split(' ');
        const queryMatch = title.includes(query) || description.includes(query);
        const categoryMatch = targetCategory === 'all' || categories.includes(targetCategory);
        if(queryMatch && categoryMatch) { link.classList.remove('hidden'); aggregateMatchCount++; }
        else { link.classList.add('hidden'); }
      });
      document.getElementById('noResults').style.display = aggregateMatchCount === 0 ? 'block' : 'none';
    }

    function filterCategory(category, element) {
      const buttons = document.querySelectorAll('.filter-pill');
      buttons.forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      evaluateLiveSearchFilters();
    }

    searchInput.addEventListener('input', evaluateLiveSearchFilters);

    function toggleMenu(show) {
      const menu = document.getElementById('sideMenu');
      const overlay = document.getElementById('menuOverlay');
      if (show) { menu.classList.add('open'); overlay.classList.add('show'); }
      else { menu.classList.remove('open'); overlay.classList.remove('show'); }
    }

    const themeToggle = document.getElementById('themeToggle');
    const getSystemThemeSetting = () => localStorage.getItem('pixelpress-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', getSystemThemeSetting());
    themeToggle.addEventListener('click', () => {
      const currentSetting = document.documentElement.getAttribute('data-theme');
      const targetSetting = currentSetting === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', targetSetting);
      localStorage.setItem('pixelpress-theme', targetSetting);
    });

    window.addEventListener('keydown', e => {
      if((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
    });

    renderUI();
  </script>

  <!-- ==================== HASH-BASED URL SHORTENER REDIRECT ==================== -->
  <script>
    (function() {
      const hash = window.location.hash;
      if (hash.startsWith('#/s/')) {
        const shortId = hash.replace('#/s/', '').split('?')[0];
        const stored = localStorage.getItem(`redirect_${shortId}`);
        if (stored) {
          const entry = JSON.parse(stored);
          if (entry.expiry && Date.now() > entry.expiry) {
            document.body.innerHTML = '<div style="text-align:center;padding:4rem;font-family:system-ui;"><h2>⏰ Link Expired</h2><p>This shortened URL has expired.</p><a href="./index.html" style="color:#ec4899;">Go Home</a></div>';
          } else {
            entry.clicks = (entry.clicks || 0) + 1;
            localStorage.setItem(`redirect_${shortId}`, JSON.stringify(entry));
            window.location.replace(entry.long);
          }
        } else {
          document.body.innerHTML = '<div style="text-align:center;padding:4rem;font-family:system-ui;"><h2>🔗 URL Not Found</h2><p>The shortened link does not exist.</p><a href="./index.html" style="color:#ec4899;">Go Home</a></div>';
        }
      }
    })();
  </script>
