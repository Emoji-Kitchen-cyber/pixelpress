<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelPress - Advanced Image Compressor</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.box{
border:2px dashed #64748b;
padding:30px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.box:hover{
background:#1e293b;
}

input{display:none;}

img{
max-width:100%;
margin-top:15px;
border-radius:10px;
}

.controls{
margin-top:15px;
}

button{
padding:12px;
margin-top:10px;
width:100%;
border:none;
border-radius:10px;
background:#38bdf8;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0ea5e9;
}

.dark{
background:#0b0f1a;
}

.toggle{
margin:10px;
cursor:pointer;
color:#38bdf8;
}
</style>
</head>
<body>

<div class="container">

<h1>PixelPress Pro</h1>
<p>Advanced Free Image Compressor</p>

<div class="toggle" onclick="toggleDark()">🌙 Toggle Dark Mode</div>

<label class="box" for="file">
Drop or Click Images
</label>
<input type="file" id="file" multiple accept="image/*">

<div class="controls">
<label>Quality: <span id="qv">70</span>%</label>
<input type="range" id="quality" min="10" max="100" value="70">
</div>

<button onclick="compressAll()">Compress Images</button>

<div id="output"></div>

</div>

<script src="script.js"></script>
</body>
</html>
