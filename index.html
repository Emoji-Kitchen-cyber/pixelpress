<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="PixelPress - Create stunning pixel art and digital designs">
  
  <title>PixelPress - Digital Art Studio</title>
  
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  
  <style>
    /* Critical inline styles to prevent FOUC */
    body { margin:0; padding:0; background:#000; color:#fff; font-family:system-ui, sans-serif; }
    .loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; }
    .loading-spinner { width:48px; height:48px; border:4px solid #333; border-top:4px solid #fff; border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .app-hidden { display:none; }
  </style>
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="loading-spinner"></div>
  </div>
  
  <div id="app" class="app-hidden">
    <header id="header">
      <h1>PixelPress</h1>
      <nav id="nav">
        <button data-page="editor">Editor</button>
        <button data-page="gallery">Gallery</button>
        <button data-page="settings">Settings</button>
        <button id="loginBtn">Login</button>
      </nav>
    </header>
    
    <main id="main-content">
      <div id="editor-page" class="page active">
        <canvas id="pixelCanvas"></canvas>
        <div id="tools">
          <button id="toolPencil">✏️</button>
          <button id="toolEraser">🧹</button>
          <button id="toolFill">🪣</button>
          <input type="color" id="colorPicker" value="#ffffff">
          <input type="range" id="brushSize" min="1" max="50" value="10">
        </div>
      </div>
      
      <div id="gallery-page" class="page">
        <div id="galleryGrid"></div>
      </div>
      
      <div id="settings-page" class="page">
        <h2>Settings</h2>
        <button id="saveToCloud">Save to Cloud</button>
        <button id="exportPNG">Export PNG</button>
        <button id="clearCanvas">Clear Canvas</button>
      </div>
    </main>
    
    <footer>
      <p>PixelPress © 2025</p>
    </footer>
  </div>

  <!-- Load Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <!-- Firebase Config -->
  <script src="/firebase-config.js"></script>
  
  <!-- Main App Script - NOT module to avoid Vercel issues -->
  <script src="/app.js"></script>
  
  <script>
    // Hide loading screen when app is ready
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').classList.remove('app-hidden');
      }, 500);
    });
  </script>
</body>
</html>
