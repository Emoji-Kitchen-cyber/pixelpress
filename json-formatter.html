<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter - PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    [data-theme="dark"] body { background: #09090e; color: #e8e8f0; }
    nav {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      padding: 0 2rem; height: 64px; display: flex; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    [data-theme="dark"] nav { background: rgba(21,21,30,0.7); border-color: rgba(255,255,255,0.08); }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      text-transform: uppercase; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .container {
      max-width: 1000px; margin: 2rem auto; padding: 1.5rem; flex: 1;
    }
    h1 {
      font-size: 2rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .editor-panel {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    }
    @media (max-width: 768px) {
      .editor-panel { grid-template-columns: 1fr; }
    }
    textarea {
      width: 100%; height: 400px; padding: 16px; border: 1px solid #ddd;
      border-radius: 12px; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; resize: vertical; background: white;
    }
    [data-theme="dark"] textarea { background: #1e1e2e; color: #e8e8f0; border-color: #333; }
    .btn-group {
      display: flex; gap: 10px; margin: 1rem 0;
    }
    button {
      background: #ec4899; color: white; border: none;
      padding: 10px 20px; border-radius: 10px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button.secondary { background: #a78bfa; }
    .error-msg { color: #ef4444; margin-top: 8px; font-size: 14px; }
    .success-msg { color: #10b981; }
    .back-link {
      display: inline-block; margin-top: 1rem; color: #ec4899;
      text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <nav>
    <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
  </nav>

  <div class="container">
    <h1>JSON Formatter & Validator</h1>
    <div class="editor-panel">
      <div>
        <h3 style="margin-bottom:8px;">Input JSON</h3>
        <textarea id="inputJson" placeholder='{"example": "Paste your JSON here"}'>{"name":"John","age":30,"city":"New York"}</textarea>
      </div>
      <div>
        <h3 style="margin-bottom:8px;">Formatted Output</h3>
        <textarea id="outputJson" readonly placeholder="Formatted JSON will appear here..."></textarea>
      </div>
    </div>
    <div class="btn-group">
      <button onclick="formatJSON()">Format / Prettify</button>
      <button class="secondary" onclick="minifyJSON()">Minify</button>
      <button class="secondary" onclick="validateJSON()">Validate</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
    <div id="message"></div>
    <a href="./index.html" class="back-link">← Back to Tools</a>
  </div>

  <script>
    function formatJSON() {
      try {
        const input = document.getElementById('inputJson').value.trim();
        if (!input) return showMessage('Please enter JSON data', 'error');
        const parsed = JSON.parse(input);
        document.getElementById('outputJson').value = JSON.stringify(parsed, null, 2);
        showMessage('✓ JSON formatted successfully', 'success');
      } catch (e) {
        showMessage('✗ Invalid JSON: ' + e.message, 'error');
      }
    }

    function minifyJSON() {
      try {
        const input = document.getElementById('inputJson').value.trim();
        if (!input) return showMessage('Please enter JSON data', 'error');
        const parsed = JSON.parse(input);
        document.getElementById('outputJson').value = JSON.stringify(parsed);
        showMessage('✓ JSON minified successfully', 'success');
      } catch (e) {
        showMessage('✗ Invalid JSON: ' + e.message, 'error');
      }
    }

    function validateJSON() {
      try {
        const input = document.getElementById('inputJson').value.trim();
        if (!input) return showMessage('Please enter JSON data', 'error');
        JSON.parse(input);
        showMessage('✓ Valid JSON structure', 'success');
      } catch (e) {
        showMessage('✗ Invalid JSON: ' + e.message, 'error');
      }
    }

    function clearAll() {
      document.getElementById('inputJson').value = '';
      document.getElementById('outputJson').value = '';
      document.getElementById('message').innerHTML = '';
    }

    function showMessage(msg, type) {
      const msgDiv = document.getElementById('message');
      msgDiv.innerHTML = msg;
      msgDiv.className = type === 'error' ? 'error-msg' : 'success-msg';
    }

    const theme = localStorage.getItem('pixelpress-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
