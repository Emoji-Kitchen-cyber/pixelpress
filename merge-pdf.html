  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merge PDF - PixelPress</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif; background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    [data-theme="dark"] body { background: #09090e; color: #e8e8f0; }
    nav {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      padding: 0 2rem; height: 64px; display: flex; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    [data-theme="dark"] nav { background: rgba(21,21,30,0.7); border-color: rgba(255,255,255,0.08); }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      text-transform: uppercase; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .container { max-width: 800px; margin: 2rem auto; padding: 2rem; flex: 1; }
    h1 {
      font-size: 2rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .upload-area {
      border: 2px dashed #ddd; border-radius: 16px; padding: 3rem;
      text-align: center; cursor: pointer; margin: 1.5rem 0;
    }
    [data-theme="dark"] .upload-area { border-color: #333; }
    .upload-area:hover { border-color: #ec4899; }
    input[type="file"] { display: none; }
    .file-list { margin: 1rem 0; }
    .file-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; background: white; margin-bottom: 6px;
      border-radius: 8px;
    }
    [data-theme="dark"] .file-item { background: #1e1e2e; }
    .remove-btn { color: #ef4444; cursor: pointer; background: none; border: none; font-size: 1.2rem; }
    button {
      background: #ec4899; color: white; border: none;
      padding: 12px 24px; border-radius: 12px; font-weight: 600;
      cursor: pointer; margin-top: 1rem; transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link { display: inline-block; margin-top: 1rem; color: #ec4899; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <nav>
    <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
  </nav>

  <div class="container">
    <h1>Merge PDF</h1>
    <p>Combine multiple PDF files into a single document. Drag to reorder.</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <i class="fa-solid fa-cloud-upload" style="font-size:3rem;color:#ec4899;"></i>
      <p>Click to upload PDFs or drag & drop</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf" multiple onchange="addFiles(event)" />
    
    <div class="file-list" id="fileList"></div>
    <button id="mergeBtn" onclick="mergePDFs()" disabled>Merge PDFs</button>
    <div id="progress" style="color:#6e6e73;margin-top:8px;"></div>
    <a href="./index.html" class="back-link">← Back to Tools</a>
  </div>

  <script>
    let pdfFiles = [];

    function addFiles(event) {
      const files = Array.from(event.target.files);
      files.forEach(file => {
        if (file.type === 'application/pdf') {
          pdfFiles.push(file);
        }
      });
      renderFileList();
      document.getElementById('mergeBtn').disabled = pdfFiles.length < 2;
    }

    function renderFileList() {
      const list = document.getElementById('fileList');
      list.innerHTML = pdfFiles.map((file, i) => `
        <div class="file-item">
          <span>📄 ${file.name}</span>
          <button class="remove-btn" onclick="removeFile(${i})">✕</button>
        </div>
      `).join('');
    }

    function removeFile(index) {
      pdfFiles.splice(index, 1);
      renderFileList();
      document.getElementById('mergeBtn').disabled = pdfFiles.length < 2;
    }

    async function mergePDFs() {
      if (pdfFiles.length < 2) return;
      
      const btn = document.getElementById('mergeBtn');
      btn.disabled = true;
      btn.textContent = 'Merging...';
      
      try {
        const mergedDoc = await PDFLib.PDFDocument.create();
        
        for (let i = 0; i < pdfFiles.length; i++) {
          const arrayBuffer = await pdfFiles[i].arrayBuffer();
          const doc = await PDFLib.PDFDocument.load(arrayBuffer);
          const pages = await mergedDoc.copyPages(doc, doc.getPageIndices());
          pages.forEach(page => mergedDoc.addPage(page));
          document.getElementById('progress').textContent = 
            `Processed ${i + 1} of ${pdfFiles.length} files...`;
        }
        
        const mergedPdf = await mergedDoc.save();
        const blob = new Blob([mergedPdf], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged_document.pdf';
        a.click();
        
        document.getElementById('progress').textContent = 
          '✓ PDFs merged successfully! Download started.';
      } catch (error) {
        alert('Error merging PDFs: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Merge PDFs';
      }
    }

    const theme = localStorage.getItem('pixelpress-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
