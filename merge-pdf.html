<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch PDF Merge Pipeline — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght=700;800&family=DM+Sans:wght@400;500;600&display=swap');
    :root {
      --bg: #f5f5f7; --card: #ffffff; --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f; --muted: #6e6e73; --accent: #ec4899; --accent2: #a78bfa;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 40px 20px; display: flex; justify-content: center; }
    .container { max-width: 600px; width: 100%; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 16px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
    h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .dropzone { border: 2px dashed var(--border); padding: 40px 20px; text-align: center; border-radius: 12px; background: var(--bg); cursor: pointer; margin-bottom: 20px; }
    .file-queue { margin-bottom: 20px; font-size: 14px; color: var(--muted); }
    .btn { width: 100%; padding: 14px; background: var(--text); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <a href="./index.html" style="color: var(--muted); font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 15px;"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
    <h1><span>Merge</span> PDF Array</h1>

    <div class="dropzone" onclick="document.getElementById('pdfFiles').click()">
      <i class="fa-solid fa-layer-group" style="font-size: 40px; color: var(--accent); margin-bottom: 10px;"></i>
      <p>Select multiple files to merge dynamically</p>
      <input type="file" id="pdfFiles" accept="application/pdf" multiple style="display: none;" onchange="renderQueue()">
    </div>

    <div class="file-queue" id="queueBox">No documents mapped inside the workspace pipeline.</div>
    <button class="btn" onclick="executeCombinePDFs()">Consolidate & Download</button>
  </div>

  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script>
    function renderQueue() {
      const files = document.getElementById('pdfFiles').files;
      const box = document.getElementById('queueBox');
      if(files.length === 0) return;
      box.innerHTML = "<strong>File Sequence Target Queue:</strong><br>";
      for(let i=0; i<files.length; i++) {
        box.innerHTML += `${i+1}. ${files[i].name} (${Math.round(files[i].size/1024)} KB)<br>`;
      }
    }

    async function executeCombinePDFs() {
      const files = document.getElementById('pdfFiles').files;
      if(files.length < 2) return alert("Select at least 2 system files to consolidate.");

      try {
        const outDoc = await PDFLib.PDFDocument.create();
        for (let file of files) {
          const arrBuffer = await file.arrayBuffer();
          const srcDoc = await PDFLib.PDFDocument.load(arrBuffer);
          const ranges = await outDoc.copyPages(srcDoc, srcDoc.getPageIndices());
          ranges.forEach(page => outDoc.addPage(page));
        }
        const mergedBytes = await outDoc.save();
        const blob = new Blob([mergedBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "pixelpress-consolidated.pdf";
        link.click();
      } catch (err) { alert("Processing runtime dropped: " + err.message); }
    }
  </script>
</body>
</html>
