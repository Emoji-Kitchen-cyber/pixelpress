<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette Generator — PixelPress</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
    :root { --bg:#f5f5f7; --card:#ffffff; --border:rgba(0,0,0,0.06); --text:#1d1d1f; --accent:#ec4899; }
    [data-theme="dark"] { --bg:#09090e; --card:#15151e; --border:rgba(255,255,255,0.08); --text:#e8e8f0; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans', sans-serif; margin:0; }
    nav { display:flex; align-items:center; padding:0 2rem; height:64px; background:var(--card); border-bottom:1px solid var(--border); }
    .nav-logo { font-family:'Syne'; font-weight:800; text-decoration:none; color:var(--text); }
    .container { max-width:800px; margin:4rem auto; background:var(--card); padding:32px; border-radius:16px; border:1px solid var(--border); text-align:center; }
    .grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; margin:24px 0; height:200px; }
    .swatch { border-radius:12px; display:flex; flex-direction:column; justify-content:flex-end; padding:12px; color:white; font-family:monospace; font-weight:bold; text-shadow:0 2px 4px rgba(0,0,0,0.4); border:1px solid var(--border); }
    .btn { background:var(--text); color:var(--bg); border:none; padding:12px 24px; border-radius:8px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <nav><a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a></nav>
  <div class="container">
    <h2 style="font-family:'Syne';">Palette Generator</h2>
    <div class="grid" id="paletteGrid"></div>
    <button class="btn" onclick="generateRandomPalette()">Generate Scheme</button>
  </div>
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('pixelpress-theme') || 'light');
    function generateRandomPalette() {
      const grid = document.getElementById('paletteGrid');
      grid.innerHTML = '';
      for(let i=0; i<5; i++) {
        const randColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        grid.innerHTML += `<div class="swatch" style="background:${randColor}">${randColor.toUpperCase()}</div>`;
      }
    }
    generateRandomPalette();
  </script>
</body>
</html>
