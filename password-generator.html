<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Password Generator - PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.75);
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236, 72, 153, 0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --fmono: 'JetBrains Mono', monospace;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21, 21, 30, 0.7);
      --card: #15151e;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236, 72, 153, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--fbody);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }

    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      letter-spacing: -0.5px; text-transform: uppercase;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .main {
      flex: 1;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 20px 5rem;
    }

    .tool-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .tool-header h1 {
      font-family: var(--fhead);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
    }
    .tool-header p { color: var(--muted); font-size: 1.05rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .password-display {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      font-family: var(--fmono);
      font-size: 1.35rem;
      letter-spacing: 2px;
      word-break: break-all;
      margin-bottom: 1.5rem;
      min-height: 68px;
      display: flex;
      align-items: center;
      position: relative;
    }

    .copy-btn {
      position: absolute;
      right: 12px;
      top: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .option {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    label {
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px var(--glow);
    }

    .strength-bar {
      height: 6px;
      border-radius: 999px;
      margin-top: 8px;
      transition: all 0.3s;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <div class="tool-header">
      <h1>Secure Password Generator</h1>
      <p>Cryptographically strong • Client-side only</p>
    </div>

    <div class="card">
      <div class="password-display" id="passwordDisplay">
        Click Generate
        <button onclick="copyPassword()" class="copy-btn">
          <i class="fa-solid fa-copy"></i>
        </button>
      </div>

      <div id="strengthBar" class="strength-bar"></div>

      <div class="options-grid">
        <div class="option">
          <label>Length: <span id="lengthValue">16</span></label>
          <input type="range" id="length" min="8" max="64" value="16" oninput="updateLength(this)">
        </div>

        <div class="option">
          <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
        </div>
        <div class="option">
          <label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
        </div>
        <div class="option">
          <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
        </div>
        <div class="option">
          <label><input type="checkbox" id="symbols" checked> Symbols (!@#$% etc)</label>
        </div>
      </div>

      <div class="btn-group">
        <button onclick="generatePassword()" class="btn-primary">
          <i class="fa-solid fa-key"></i> Generate New Password
        </button>
        <button onclick="copyPassword()" class="btn-primary">
          <i class="fa-solid fa-copy"></i> Copy Password
        </button>
      </div>
    </div>
  </div>

  <footer>© 2026 PixelPress — All processing happens in your browser</footer>

  <script>
    function syncTheme() {
      const savedTheme = localStorage.getItem('pixelpress-theme');
      const theme = savedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pixelpress-theme', next);
    });

    function updateLength(slider) {
      document.getElementById('lengthValue').textContent = slider.value;
    }

    function getRandomChar(charset) {
      return charset[Math.floor(Math.random() * charset.length)];
    }

    function generatePassword() {
      const length = parseInt(document.getElementById('length').value);
      const useUpper = document.getElementById('uppercase').checked;
      const useLower = document.getElementById('lowercase').checked;
      const useNumbers = document.getElementById('numbers').checked;
      const useSymbols = document.getElementById('symbols').checked;

      const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const lower = 'abcdefghijklmnopqrstuvwxyz';
      const numbers = '0123456789';
      const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

      let charset = '';
      if (useUpper) charset += upper;
      if (useLower) charset += lower;
      if (useNumbers) charset += numbers;
      if (useSymbols) charset += symbols;

      if (!charset) {
        alert("Please select at least one character type");
        return;
      }

      let password = '';
      // Ensure at least one of each selected type
      if (useUpper) password += getRandomChar(upper);
      if (useLower) password += getRandomChar(lower);
      if (useNumbers) password += getRandomChar(numbers);
      if (useSymbols) password += getRandomChar(symbols);

      // Fill remaining length
      for (let i = password.length; i < length; i++) {
        password += getRandomChar(charset);
      }

      // Shuffle password
      password = password.split('').sort(() => Math.random() - 0.5).join('');

      document.getElementById('passwordDisplay').innerHTML = `
        ${password}
        <button onclick="copyPassword()" class="copy-btn">
          <i class="fa-solid fa-copy"></i>
        </button>
      `;

      updateStrengthBar(password);
    }

    function updateStrengthBar(password) {
      const bar = document.getElementById('strengthBar');
      let strength = 0;
      
      if (password.length >= 12) strength += 30;
      if (/[A-Z]/.test(password)) strength += 20;
      if (/[a-z]/.test(password)) strength += 20;
      if (/[0-9]/.test(password)) strength += 15;
      if (/[^A-Za-z0-9]/.test(password)) strength += 15;

      let color = '#ef4444';
      if (strength > 60) color = '#eab308';
      if (strength > 80) color = '#22c55e';

      bar.style.width = strength + '%';
      bar.style.background = color;
    }

    function copyPassword() {
      const display = document.getElementById('passwordDisplay');
      const passwordText = display.textContent.trim().replace('Copy', '').trim();
      
      if (!passwordText || passwordText === "Click Generate") {
        alert("Generate a password first");
        return;
      }

      navigator.clipboard.writeText(passwordText).then(() => {
        const original = display.innerHTML;
        display.innerHTML = `
          ${passwordText}
          <button onclick="copyPassword()" class="copy-btn" style="color:#22c55e">
            <i class="fa-solid fa-check"></i>
          </button>
        `;
        setTimeout(() => {
          display.innerHTML = original;
        }, 1800);
      });
    }

    // Initialize
    window.onload = () => {
      syncTheme();
      setTimeout(() => {
        generatePassword();
      }, 200);
    };
  </script>
</body>
</html>
