<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Password Generator — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght=700;800&family=DM+Sans:wght=400;500;600&family=JetBrains+Mono:wght=400;500&display=swap');
    :root {
      --bg: #f5f5f7; --card: #ffffff; --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f; --muted: #6e6e73; --accent: #ec4899; --accent2: #a78bfa;
    }
    [data-theme="dark"] {
      --bg: #09090e; --card: #15151e; --border: rgba(255, 255, 255, 0.08); --text: #e8e8f0; --muted: #86868b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; }
    .container { max-width: 500px; width: 100%; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 16px; height: fit-content; }
    h1 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
    h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .display-panel { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; align-items: center; justify-content: space-between; gap: 10px; }
    .password-out { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 500; word-break: break-all; color: var(--text); }
    .copy-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); transition: color 0.2s; padding: 5px; }
    .copy-btn:hover { color: var(--accent); }
    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; font-weight: 500; }
    .btn { width: 100%; padding: 14px; background: var(--text); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; }
    .btn:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <a href="./index.html" style="color: var(--muted); font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 15px;"><i class="fa-solid fa-arrow-left"></i> Back</a>
    <h1><span>Password</span> Generator</h1>

    <div class="display-panel">
      <span class="password-out" id="passwordOutput">Loading Matrix Securely...</span>
      <button class="copy-btn" id="copyBtn" title="Copy Key"><i class="fa-regular fa-copy"></i></button>
    </div>

    <div class="setting-row">
      <label>Length (<span id="lenVal">16</span>)</label>
      <input type="range" id="passLength" min="8" max="64" value="16" style="width: 60%;">
    </div>
    <div class="setting-row"><label>Include Uppercase</label><input type="checkbox" id="upCase" checked></div>
    <div class="setting-row"><label>Include Numbers</label><input type="checkbox" id="numCase" checked></div>
    <div class="setting-row"><label>Include Symbols</label><input type="checkbox" id="symCase" checked></div>

    <button class="btn" id="generateBtn"><i class="fa-solid fa-bolt"></i> Generate Secure Key</button>
  </div>

  <script src="./password-generator.js"></script>
</body>
</html>
