<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator – PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --bg: #f5f5f7; --surface: rgba(255,255,255,0.75); --card: #ffffff;
      --border: rgba(0,0,0,0.06); --text: #1d1d1f; --muted: #6e6e73;
      --accent: #ec4899; --accent2: #a78bfa; --glow: rgba(236,72,153,0.1); --r: 16px;
      --fhead: 'Syne', sans-serif; --fbody: system-ui, -apple-system, sans-serif; --fmono: 'JetBrains Mono', monospace;
    }
    [data-theme="dark"] {
      --bg: #09090e; --surface: rgba(21,21,30,0.7); --card: #15151e;
      --border: rgba(255,255,255,0.08); --text: #e8e8f0; --muted: #86868b;
      --glow: rgba(236,72,153,0.25);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--fbody); min-height:100vh; display:flex; flex-direction:column; transition:0.3s; }
    nav { position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(1rem,5vw,3rem); height:64px; background:var(--surface); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .nav-left { display:flex; align-items:center; gap:1rem; }
    .back-btn { background:var(--card); border:1px solid var(--border); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:1.1rem; cursor:pointer; text-decoration:none; transition:0.2s; }
    .back-btn:hover { border-color:var(--accent); transform:scale(1.05); }
    .nav-logo { font-family:var(--fhead); font-weight:800; font-size:1.25rem; text-transform:uppercase; text-decoration:none; color:inherit; }
    .nav-logo span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .main { flex:1; max-width:960px; margin:0 auto; width:100%; padding:2rem 20px; }
    .hero { text-align:center; margin-bottom:2rem; }
    .hero h1 { font-family:var(--fhead); font-size:clamp(2rem,5vw,2.5rem); font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:2rem; box-shadow:0 4px 20px rgba(0,0,0,0.02); }
    .password-display { background:var(--bg); border:2px solid var(--border); border-radius:12px; padding:20px; font-family:var(--fmono); font-size:1.3rem; letter-spacing:2px; word-break:break-all; margin-bottom:1.5rem; min-height:70px; display:flex; align-items:center; position:relative; }
    .copy-btn { position:absolute; right:10px; top:10px; background:var(--card); border:1px solid var(--border); padding:6px 10px; border-radius:8px; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:1.5rem; margin:1.5rem 0; }
    .option { display:flex; align-items:center; justify-content:space-between; }
    .option label { font-weight:500; }
    .btn { padding:12px 24px; border:none; border-radius:12px; font-weight:600; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:6px; font-size:0.95rem; }
    .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 25px var(--glow); }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
    .strength-section { margin-top:1.5rem; }
    .strength-bar { height:6px; border-radius:999px; transition:0.3s; margin-top:8px; }
    .stats { font-size:0.9rem; color:var(--muted); margin-top:4px; }
    .batch-list { max-height:200px; overflow-y:auto; margin-top:1rem; }
    .batch-item { display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid var(--border); }
    footer { text-align:center; padding:2rem; color:var(--muted); font-size:0.85rem; border-top:1px solid var(--border); margin-top:auto; }
    .mode-tabs { display:flex; gap:8px; margin-bottom:1rem; }
    .tab { padding:8px 20px; border-radius:999px; background:var(--bg); border:1px solid var(--border); cursor:pointer; font-weight:500; }
    .tab.active { background:var(--accent); color:white; border-color:var(--accent); }
    .hidden { display:none; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>
  <div class="main">
    <div class="hero">
      <h1>Password Generator</h1>
      <p style="color:var(--muted);">Cryptographically secure • Advanced options</p>
    </div>
    <div class="card">
      <div class="mode-tabs">
        <div class="tab active" data-mode="standard">Standard</div>
        <div class="tab" data-mode="passphrase">Passphrase</div>
      </div>
      <div class="password-display" id="passwordDisplay">
        Click Generate
        <button class="copy-btn" id="copyBtn"><i class="fa-solid fa-copy"></i></button>
      </div>

      <!-- Standard mode options -->
      <div id="standardOptions">
        <div class="grid">
          <div class="option">
            <label>Length: <span id="lengthValue">16</span></label>
            <input type="range" id="lengthSlider" min="8" max="64" value="16" oninput="updateLength(this)">
          </div>
          <div class="option"><label><input type="checkbox" id="upper" checked> Uppercase</label></div>
          <div class="option"><label><input type="checkbox" id="lower" checked> Lowercase</label></div>
          <div class="option"><label><input type="checkbox" id="numbers" checked> Numbers</label></div>
          <div class="option"><label><input type="checkbox" id="symbols" checked> Symbols</label></div>
          <div class="option"><label><input type="checkbox" id="excludeAmbiguous"> Exclude ambiguous (1lI0O)</label></div>
          <div class="option"><label><input type="checkbox" id="startLetter"> Start with letter</label></div>
          <div class="option"><label><input type="checkbox" id="avoidRepeat"> Avoid repeating chars</label></div>
          <div class="option">
            <label>Custom chars (optional)</label>
            <input type="text" id="customChars" placeholder="e.g. abc123!@#" style="width:100%;" />
          </div>
        </div>
      </div>

      <!-- Passphrase mode options -->
      <div id="passphraseOptions" class="hidden">
        <div class="grid">
          <div class="option">
            <label>Number of words: <span id="wordCountVal">4</span></label>
            <input type="range" id="wordCount" min="3" max="10" value="4" oninput="document.getElementById('wordCountVal').textContent=this.value">
          </div>
          <div class="option">
            <label>Separator</label>
            <select id="separator">
              <option value="-">-</option>
              <option value=".">.</option>
              <option value=" ">Space</option>
              <option value="_">_</option>
            </select>
          </div>
          <div class="option"><label><input type="checkbox" id="capitalize"> Capitalize words</label></div>
          <div class="option"><label><input type="checkbox" id="includeNumberWord"> Append number</label></div>
        </div>
      </div>

      <div class="strength-section">
        <div class="strength-bar" id="strengthBar" style="width:0%; background:#ef4444;"></div>
        <div class="stats" id="strengthText"></div>
      </div>

      <div style="display:flex; gap:12px; margin-top:1.5rem; flex-wrap:wrap;">
        <button class="btn btn-primary" id="generateBtn"><i class="fa-solid fa-key"></i> Generate</button>
        <button class="btn btn-outline" id="batchGenerateBtn"><i class="fa-solid fa-layer-group"></i> Batch (5)</button>
        <button class="btn btn-outline" id="historyBtn"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
        <button class="btn btn-outline" id="exportBtn"><i class="fa-solid fa-download"></i> Export</button>
      </div>

      <div id="batchResults" class="batch-list hidden"></div>
    </div>
  </div>
  <footer>© 2026 PixelPress – Passwords never leave your device</footer>

  <script>
    (function() {
      // Theme
      function syncTheme() {
        const saved = localStorage.getItem('pixelpress-theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pixelpress-theme', next);
      });
      syncTheme();

      let currentMode = 'standard';
      let generatedPasswords = [];

      // Mode switching
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentMode = tab.dataset.mode;
          document.getElementById('standardOptions').classList.toggle('hidden', currentMode !== 'standard');
          document.getElementById('passphraseOptions').classList.toggle('hidden', currentMode !== 'passphrase');
        });
      });

      // Word list for passphrase (common words)
      const wordList = ['apple','banana','carrot','dolphin','elephant','forest','guitar','horizon','island','jungle','kayak','lemon','mountain','notebook','ocean','penguin','quartz','rainbow','sunset','tiger','umbrella','violet','waterfall','xylophone','yogurt','zebra'];

      function generateStandard() {
        const length = parseInt(document.getElementById('lengthSlider').value);
        const upper = document.getElementById('upper').checked;
        const lower = document.getElementById('lower').checked;
        const nums = document.getElementById('numbers').checked;
        const sym = document.getElementById('symbols').checked;
        const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
        const startLetter = document.getElementById('startLetter').checked;
        const avoidRepeat = document.getElementById('avoidRepeat').checked;
        let custom = document.getElementById('customChars').value.trim();

        const upperChars = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I,O
        const lowerChars = 'abcdefghijkmnpqrstuvwxyz'; // no l,o
        const numberChars = '23456789'; // no 0,1
        const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';

        let charset = '';
        if (custom) {
          charset = custom;
        } else {
          if (upper) charset += excludeAmbiguous ? upperChars : 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
          if (lower) charset += excludeAmbiguous ? lowerChars : 'abcdefghijklmnopqrstuvwxyz';
          if (nums) charset += excludeAmbiguous ? numberChars : '0123456789';
          if (sym) charset += symbolChars;
        }
        if (!charset) return alert('Select at least one character set.');

        let pwd = '';
        // Ensure at least one of each required type
        if (!custom) {
          if (upper) pwd += getRandomChar(excludeAmbiguous ? upperChars : 'ABCDEFGHIJKLMNOPQRSTUVWXYZ');
          if (lower) pwd += getRandomChar(excludeAmbiguous ? lowerChars : 'abcdefghijklmnopqrstuvwxyz');
          if (nums) pwd += getRandomChar(excludeAmbiguous ? numberChars : '0123456789');
          if (sym) pwd += getRandomChar(symbolChars);
        }
        while (pwd.length < length) {
          let ch = getRandomChar(charset);
          if (avoidRepeat && pwd.includes(ch)) continue;
          pwd += ch;
        }
        pwd = pwd.substring(0, length);
        if (startLetter && /[^a-zA-Z]/.test(pwd[0])) {
          const letters = charset.match(/[a-zA-Z]/g) || 'abcdefghijklmnopqrstuvwxyz';
          pwd = getRandomChar(letters.join('')) + pwd.slice(1);
        }
        // Shuffle
        pwd = pwd.split('').sort(() => Math.random() - 0.5).join('');
        return pwd;
      }

      function getRandomChar(charset) {
        return charset[Math.floor(Math.random() * charset.length)];
      }

      function generatePassphrase() {
        const count = parseInt(document.getElementById('wordCount').value);
        const separator = document.getElementById('separator').value;
        const capitalize = document.getElementById('capitalize').checked;
        const appendNumber = document.getElementById('includeNumberWord').checked;

        let words = [];
        for (let i = 0; i < count; i++) {
          let word = wordList[Math.floor(Math.random() * wordList.length)];
          if (capitalize) word = word.charAt(0).toUpperCase() + word.slice(1);
          words.push(word);
        }
        let pass = words.join(separator);
        if (appendNumber) pass += Math.floor(Math.random() * 100);
        return pass;
      }

      function updateStrength(password) {
        const bar = document.getElementById('strengthBar');
        const text = document.getElementById('strengthText');
        if (!password) {
          bar.style.width = '0%';
          text.innerHTML = '';
          return;
        }
        let entropy = 0;
        const length = password.length;
        let pool = 0;
        if (/[A-Z]/.test(password)) pool += 26;
        if (/[a-z]/.test(password)) pool += 26;
        if (/[0-9]/.test(password)) pool += 10;
        if (/[^A-Za-z0-9]/.test(password)) pool += 32;
        if (pool > 0) entropy = Math.log2(pool) * length;
        entropy = Math.min(entropy, 256);
        const percent = Math.round((entropy / 256) * 100);

        let color = '#ef4444';
        if (percent > 60) color = '#eab308';
        if (percent > 80) color = '#22c55e';
        bar.style.width = percent + '%';
        bar.style.background = color;

        const crackTime = estimateCrackTime(entropy);
        text.innerHTML = `Entropy: ~${entropy.toFixed(0)} bits • ${crackTime}`;
      }

      function estimateCrackTime(entropy) {
        const guessesPerSecond = 1e9;
        const seconds = Math.pow(2, entropy) / guessesPerSecond;
        if (seconds < 60) return 'instantly';
        if (seconds < 3600) return '~minutes';
        if (seconds < 86400) return '~hours';
        if (seconds < 31536000) return '~days';
        if (seconds < 315360000) return '~years';
        return 'centuries';
      }

      function displayPassword(pwd) {
        document.getElementById('passwordDisplay').innerHTML = `${pwd}<button class="copy-btn" id="copyBtn"><i class="fa-solid fa-copy"></i></button>`;
        document.getElementById('copyBtn').addEventListener('click', () => copyToClipboard(pwd));
        updateStrength(pwd);
        addToHistory(pwd);
      }

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('copyBtn');
          btn.innerHTML = '<i class="fa-solid fa-check"></i>';
          setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-copy"></i>'; }, 2000);
        });
      }

      function addToHistory(pwd) {
        generatedPasswords.unshift({ password: pwd, time: new Date().toISOString() });
        if (generatedPasswords.length > 50) generatedPasswords.pop();
      }

      function showBatch(passwords) {
        const batchDiv = document.getElementById('batchResults');
        batchDiv.classList.remove('hidden');
        batchDiv.innerHTML = passwords.map(p => `
          <div class="batch-item">
            <span style="font-family:var(--fmono);">${p}</span>
            <button class="btn btn-outline btn-small" onclick="navigator.clipboard.writeText('${p}').then(() => alert('Copied'))"><i class="fa-solid fa-copy"></i></button>
          </div>
        `).join('');
      }

      document.getElementById('generateBtn').addEventListener('click', () => {
        let pwd = currentMode === 'passphrase' ? generatePassphrase() : generateStandard();
        displayPassword(pwd);
      });

      document.getElementById('batchGenerateBtn').addEventListener('click', () => {
        const passwords = [];
        for (let i = 0; i < 5; i++) {
          passwords.push(currentMode === 'passphrase' ? generatePassphrase() : generateStandard());
        }
        showBatch(passwords);
      });

      document.getElementById('historyBtn').addEventListener('click', () => {
        if (generatedPasswords.length === 0) return alert('No history yet.');
        const historyText = generatedPasswords.map((p, i) => `${i+1}. ${p.password} (${new Date(p.time).toLocaleString()})`).join('\n');
        alert('Last generated passwords:\n\n' + historyText);
      });

      document.getElementById('exportBtn').addEventListener('click', () => {
        if (generatedPasswords.length === 0) return alert('Generate some passwords first.');
        const blob = new Blob([generatedPasswords.map(p => p.password).join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'pixelpress_passwords.txt';
        a.click();
      });

      // Initial generation
      window.onload = () => {
        syncTheme();
        setTimeout(() => {
          document.getElementById('generateBtn').click();
        }, 100);
      };
    })();
  </script>
</body>
</html>
