<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Annotator & Editor – PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
    :root { --bg:#f5f5f7; --surface:rgba(255,255,255,0.75); --card:#ffffff; --border:rgba(0,0,0,0.06); --text:#1d1d1f; --muted:#6e6e73; --accent:#ec4899; --accent2:#a78bfa; --glow:rgba(236,72,153,0.1); }
    [data-theme="dark"] { --bg:#09090e; --surface:rgba(21,21,30,0.7); --card:#15151e; --border:rgba(255,255,255,0.08); --text:#e8e8f0; --muted:#86868b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; height:100vh; display:flex; flex-direction:column; transition:0.3s; }
    nav { height:56px; background:var(--surface); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; flex-shrink:0; }
    .nav-left { display:flex; align-items:center; gap:1rem; }
    .back-btn { background:var(--card); border:1px solid var(--border); width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:1rem; cursor:pointer; text-decoration:none; }
    .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; text-transform:uppercase; text-decoration:none; color:inherit; }
    .nav-logo span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .toolbar { min-height:44px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:4px 10px; gap:6px; flex-wrap:wrap; flex-shrink:0; }
    .btn { padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:11px; display:flex; align-items:center; gap:4px; transition:0.15s; white-space:nowrap; }
    .btn:hover { border-color:var(--accent); }
    .btn.active { background:var(--accent); color:white; border-color:var(--accent); }
    .btn-primary { background:var(--accent); color:white; border:none; }
    .btn-success { background:#10b981; color:white; border:none; }
    .workspace { flex:1; display:flex; overflow:hidden; }
    .sidebar { width:180px; background:var(--card); border-right:1px solid var(--border); overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
    @media(max-width:768px){ .sidebar{display:none;} }
    .page-item { display:flex; align-items:center; gap:4px; padding:6px; border:1px solid var(--border); border-radius:4px; cursor:pointer; font-size:12px; }
    .page-item.active { border-color:var(--accent); background:var(--glow); }
    .canvas-area { flex:1; overflow:auto; display:flex; justify-content:center; align-items:flex-start; padding:16px; background:var(--bg); }
    .canvas-stack { position:relative; box-shadow:0 2px 12px rgba(0,0,0,0.1); }
    canvas { display:block; }
    #annotCanvas { position:absolute; top:0; left:0; }
    footer { text-align:center; padding:6px; color:var(--muted); font-size:11px; border-top:1px solid var(--border); flex-shrink:0; }
    .sep { width:1px; height:20px; background:var(--border); margin:0 4px; }
    input[type="color"] { width:28px; height:28px; border:1px solid var(--border); border-radius:4px; padding:1px; cursor:pointer; }
    input[type="range"] { width:50px; accent-color:var(--accent); }
    @media(max-width:600px){ .toolbar{gap:4px;padding:4px;} .btn{padding:5px 7px;font-size:10px;} }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="toolbar">
    <button class="btn" id="openBtn"><i class="fa-solid fa-folder-open"></i> Open PDF</button>
    <input type="file" id="pdfInput" accept="application/pdf" hidden />
    <span class="sep"></span>
    <button class="btn active" data-tool="cursor"><i class="fa-solid fa-hand-pointer"></i> Select</button>
    <button class="btn" data-tool="pen"><i class="fa-solid fa-pen"></i> Pen</button>
    <button class="btn" data-tool="highlighter"><i class="fa-solid fa-highlighter"></i> Highlight</button>
    <button class="btn" data-tool="text"><i class="fa-solid fa-font"></i> Text</button>
    <button class="btn" data-tool="rect"><i class="fa-solid fa-square"></i> Rect</button>
    <button class="btn" data-tool="eraser"><i class="fa-solid fa-eraser"></i> Eraser</button>
    <span class="sep"></span>
    <input type="color" id="colorPicker" value="#ff0000" title="Stroke Color" />
    <input type="color" id="fillPicker" value="#ffff00" title="Fill Color" />
    <input type="range" id="sizeSlider" min="1" max="20" value="3" title="Size" />
    <span style="font-size:10px;" id="sizeValue">3</span>
    <span class="sep"></span>
    <button class="btn" id="undoBtn"><i class="fa-solid fa-undo"></i></button>
    <button class="btn" id="clearPageBtn"><i class="fa-solid fa-broom"></i></button>
    <button class="btn btn-primary" id="downloadPdfBtn"><i class="fa-solid fa-file-pdf"></i> PDF</button>
    <button class="btn btn-success" id="downloadDocxBtn"><i class="fa-solid fa-file-word"></i> Word</button>
    <button class="btn" id="downloadPngBtn"><i class="fa-solid fa-image"></i> PNG</button>
    <button class="btn" id="printBtn"><i class="fa-solid fa-print"></i></button>
  </div>

  <div class="workspace">
    <div class="sidebar" id="sidebar">
      <strong style="font-size:12px;">Pages</strong>
      <div id="pageList"></div>
    </div>
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-stack" id="canvasStack" style="display:none;">
        <canvas id="pdfCanvas"></canvas>
        <canvas id="annotCanvas"></canvas>
      </div>
      <div id="emptyState" style="padding:3rem;text-align:center;color:var(--muted);">
        <i class="fa-solid fa-file-pdf" style="font-size:3rem;opacity:0.3;"></i>
        <p style="margin-top:1rem;">Open a PDF to start annotating</p>
      </div>
    </div>
  </div>
  <footer>© 2026 PixelPress – All processing is local & private</footer>

  <script>
    (function() {
      // ====== THEME ======
      function syncTheme() {
        const saved = localStorage.getItem('pixelpress-theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pixelpress-theme', next);
      });
      syncTheme();

      // ====== DOM ELEMENTS ======
      const pdfCanvas = document.getElementById('pdfCanvas');
      const annotCanvas = document.getElementById('annotCanvas');
      const ctxPdf = pdfCanvas.getContext('2d');
      const ctxAnnot = annotCanvas.getContext('2d');
      const canvasStack = document.getElementById('canvasStack');
      const emptyState = document.getElementById('emptyState');
      const pageList = document.getElementById('pageList');

      // ====== STATE ======
      let pdfDoc = null;
      let pdfBytes = null;
      let currentPage = 1;
      let annotations = {};  // { pageNum: [annotation objects] }
      let currentTool = 'cursor';
      let strokeColor = '#ff0000';
      let fillColor = '#ffff00';
      let brushSize = 3;
      let isDrawing = false;
      let currentAnn = null;
      let startX = 0, startY = 0;

      // ====== PDF LOADING ======
      document.getElementById('openBtn').addEventListener('click', () => document.getElementById('pdfInput').click());
      document.getElementById('pdfInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          pdfBytes = new Uint8Array(ev.target.result);
          try {
            pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes }).promise;
            currentPage = 1;
            annotations = {};
            for (let i = 1; i <= pdfDoc.numPages; i++) annotations[i] = [];
            canvasStack.style.display = 'block';
            emptyState.style.display = 'none';
            await renderPage();
            renderPageList();
          } catch (err) {
            alert('Failed to load PDF: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
        document.getElementById('pdfInput').value = '';
      });

      // ====== PAGE RENDERING ======
      async function renderPage() {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(currentPage);
        const viewport = page.getViewport({ scale: 1.5 });
        pdfCanvas.width = annotCanvas.width = viewport.width;
        pdfCanvas.height = annotCanvas.height = viewport.height;
        canvasStack.style.width = viewport.width + 'px';
        canvasStack.style.height = viewport.height + 'px';
        await page.render({ canvasContext: ctxPdf, viewport }).promise;
        redrawAnnotations();
      }

      function redrawAnnotations() {
        ctxAnnot.clearRect(0, 0, annotCanvas.width, annotCanvas.height);
        const anns = annotations[currentPage] || [];
        anns.forEach(ann => drawAnn(ann));
      }

      function drawAnn(ann) {
        ctxAnnot.save();
        switch (ann.type) {
          case 'pen':
            ctxAnnot.beginPath();
            ctxAnnot.strokeStyle = ann.color;
            ctxAnnot.lineWidth = ann.size;
            ctxAnnot.lineCap = 'round';
            ctxAnnot.lineJoin = 'round';
            if (ann.points && ann.points.length) {
              ctxAnnot.moveTo(ann.points[0].x, ann.points[0].y);
              for (let i = 1; i < ann.points.length; i++) ctxAnnot.lineTo(ann.points[i].x, ann.points[i].y);
              ctxAnnot.stroke();
            }
            break;
          case 'highlighter':
            ctxAnnot.beginPath();
            ctxAnnot.strokeStyle = ann.color + '60';
            ctxAnnot.lineWidth = ann.size * 3;
            ctxAnnot.lineCap = 'round';
            ctxAnnot.lineJoin = 'round';
            if (ann.points && ann.points.length) {
              ctxAnnot.moveTo(ann.points[0].x, ann.points[0].y);
              for (let i = 1; i < ann.points.length; i++) ctxAnnot.lineTo(ann.points[i].x, ann.points[i].y);
              ctxAnnot.stroke();
            }
            break;
          case 'text':
            ctxAnnot.font = `bold ${ann.size * 5}px sans-serif`;
            ctxAnnot.fillStyle = ann.color;
            ctxAnnot.fillText(ann.text, ann.x, ann.y);
            break;
          case 'rect':
            ctxAnnot.fillStyle = ann.fillColor + '40';
            ctxAnnot.fillRect(ann.x, ann.y, ann.w, ann.h);
            ctxAnnot.strokeStyle = ann.color;
            ctxAnnot.lineWidth = ann.size;
            ctxAnnot.strokeRect(ann.x, ann.y, ann.w, ann.h);
            break;
          case 'eraser':
            ctxAnnot.clearRect(ann.x - ann.w/2, ann.y - ann.h/2, ann.w, ann.h);
            break;
        }
        ctxAnnot.restore();
      }

      function renderPageList() {
        if (!pdfDoc) return;
        pageList.innerHTML = '';
        for (let i = 1; i <= pdfDoc.numPages; i++) {
          const div = document.createElement('div');
          div.className = `page-item ${i === currentPage ? 'active' : ''}`;
          div.textContent = `Page ${i}`;
          div.addEventListener('click', () => { currentPage = i; renderPage(); renderPageList(); });
          pageList.appendChild(div);
        }
      }

      // ====== TOOL MANAGEMENT ======
      const toolBtns = document.querySelectorAll('[data-tool]');
      function setTool(tool) {
        currentTool = tool;
        toolBtns.forEach(b => b.classList.remove('active'));
        const active = document.querySelector(`[data-tool="${tool}"]`);
        if (active) active.classList.add('active');
        annotCanvas.style.cursor = tool === 'cursor' ? 'default' : 'crosshair';
      }
      toolBtns.forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)));

      document.getElementById('colorPicker').addEventListener('input', e => strokeColor = e.target.value);
      document.getElementById('fillPicker').addEventListener('input', e => fillColor = e.target.value);
      document.getElementById('sizeSlider').addEventListener('input', e => {
        brushSize = parseInt(e.target.value);
        document.getElementById('sizeValue').textContent = brushSize;
      });

      // ====== CANVAS EVENTS ======
      function getPos(e) {
        const rect = annotCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * (annotCanvas.width / rect.width),
          y: (clientY - rect.top) * (annotCanvas.height / rect.height)
        };
      }

      annotCanvas.addEventListener('mousedown', onStart);
      annotCanvas.addEventListener('mousemove', onMove);
      annotCanvas.addEventListener('mouseup', onEnd);
      annotCanvas.addEventListener('mouseleave', onEnd);
      annotCanvas.addEventListener('touchstart', e => { e.preventDefault(); onStart(e); }, { passive: false });
      annotCanvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e); }, { passive: false });
      annotCanvas.addEventListener('touchend', onEnd);

      function onStart(e) {
        if (currentTool === 'cursor') return;
        const pos = getPos(e);
        startX = pos.x; startY = pos.y;
        isDrawing = true;

        if (currentTool === 'text') {
          const text = prompt('Enter text:');
          if (text) {
            const ann = { type: 'text', text, x: pos.x, y: pos.y, color: strokeColor, size: brushSize };
            annotations[currentPage].push(ann);
            drawAnn(ann);
          }
          isDrawing = false;
        } else if (currentTool === 'eraser') {
          const ann = { type: 'eraser', x: pos.x, y: pos.y, w: brushSize * 8, h: brushSize * 4 };
          annotations[currentPage].push(ann);
          drawAnn(ann);
          isDrawing = false;
        } else {
          currentAnn = { type: currentTool, color: strokeColor, fillColor, size: brushSize };
          if (currentTool === 'pen' || currentTool === 'highlighter') {
            currentAnn.points = [{ x: pos.x, y: pos.y }];
          } else if (currentTool === 'rect') {
            currentAnn.x = pos.x; currentAnn.y = pos.y; currentAnn.w = 0; currentAnn.h = 0;
          }
          annotations[currentPage].push(currentAnn);
        }
      }

      function onMove(e) {
        if (!isDrawing || currentTool === 'cursor' || currentTool === 'text' || currentTool === 'eraser') return;
        const pos = getPos(e);
        if (currentTool === 'pen' || currentTool === 'highlighter') {
          if (currentAnn && currentAnn.points) {
            currentAnn.points.push({ x: pos.x, y: pos.y });
            drawAnn(currentAnn);
          }
        } else if (currentTool === 'rect' && currentAnn) {
          currentAnn.w = pos.x - startX;
          currentAnn.h = pos.y - startY;
          redrawAnnotations();
        }
      }

      function onEnd() {
        isDrawing = false;
        currentAnn = null;
      }

      // ====== BUTTON ACTIONS ======
      document.getElementById('undoBtn').addEventListener('click', () => {
        if (!pdfDoc) return;
        annotations[currentPage].pop();
        redrawAnnotations();
      });

      document.getElementById('clearPageBtn').addEventListener('click', () => {
        if (!pdfDoc) return;
        if (!confirm('Clear all annotations on this page?')) return;
        annotations[currentPage] = [];
        redrawAnnotations();
      });

      // ====== DOWNLOAD: PDF ======
      document.getElementById('downloadPdfBtn').addEventListener('click', async () => {
        if (!pdfBytes) return alert('No PDF loaded');
        const pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes);
        const pages = pdfLibDoc.getPages();
        for (let pNum = 1; pNum <= pdfDoc.numPages; pNum++) {
          const anns = annotations[pNum] || [];
          if (anns.length === 0) continue;
          const page = pages[pNum - 1];
          const { width, height } = page.getSize();
          const tmpCanvas = document.createElement('canvas');
          tmpCanvas.width = width; tmpCanvas.height = height;
          const tmpCtx = tmpCanvas.getContext('2d');
          // Scale annotations to PDF coordinates
          const scaleX = width / annotCanvas.width;
          const scaleY = height / annotCanvas.height;
          tmpCtx.scale(scaleX, scaleY);
          anns.forEach(ann => drawAnn(tmpCtx, ann));
          const img = await pdfLibDoc.embedPng(tmpCanvas.toDataURL());
          page.drawImage(img, { x: 0, y: 0, width, height });
        }
        const bytes = await pdfLibDoc.save();
        downloadBlob(new Blob([bytes], { type: 'application/pdf' }), 'annotated.pdf');
      });

      // Helper for drawing on temp canvas (same logic as drawAnn)
      function drawAnn(ctx, ann) {
        ctx.save();
        switch (ann.type) {
          case 'pen':
            ctx.beginPath(); ctx.strokeStyle = ann.color; ctx.lineWidth = ann.size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            if (ann.points && ann.points.length) { ctx.moveTo(ann.points[0].x, ann.points[0].y); for (let i=1;i<ann.points.length;i++) ctx.lineTo(ann.points[i].x, ann.points[i].y); ctx.stroke(); }
            break;
          case 'highlighter':
            ctx.beginPath(); ctx.strokeStyle = ann.color + '60'; ctx.lineWidth = ann.size * 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            if (ann.points && ann.points.length) { ctx.moveTo(ann.points[0].x, ann.points[0].y); for (let i=1;i<ann.points.length;i++) ctx.lineTo(ann.points[i].x, ann.points[i].y); ctx.stroke(); }
            break;
          case 'text':
            ctx.font = `bold ${ann.size * 5}px sans-serif`; ctx.fillStyle = ann.color; ctx.fillText(ann.text, ann.x, ann.y);
            break;
          case 'rect':
            ctx.fillStyle = ann.fillColor + '40'; ctx.fillRect(ann.x, ann.y, ann.w, ann.h);
            ctx.strokeStyle = ann.color; ctx.lineWidth = ann.size; ctx.strokeRect(ann.x, ann.y, ann.w, ann.h);
            break;
        }
        ctx.restore();
      }

      // ====== DOWNLOAD: PNG ======
      document.getElementById('downloadPngBtn').addEventListener('click', async () => {
        if (!pdfBytes) return alert('No PDF loaded');
        const pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes);
        const pages = pdfLibDoc.getPages();
        for (let pNum = 1; pNum <= pdfDoc.numPages; pNum++) {
          const anns = annotations[pNum] || [];
          if (anns.length === 0) continue;
          const page = pages[pNum - 1];
          const { width, height } = page.getSize();
          const tmpCanvas = document.createElement('canvas');
          tmpCanvas.width = width; tmpCanvas.height = height;
          const tmpCtx = tmpCanvas.getContext('2d');
          const scaleX = width / annotCanvas.width;
          const scaleY = height / annotCanvas.height;
          tmpCtx.scale(scaleX, scaleY);
          anns.forEach(ann => drawAnn(tmpCtx, ann));
          const img = await pdfLibDoc.embedPng(tmpCanvas.toDataURL());
          page.drawImage(img, { x: 0, y: 0, width, height });
        }
        const bytes = await pdfLibDoc.save();
        // Render first page as PNG preview
        const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 2 });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        canvas.toBlob(blob => downloadBlob(blob, 'annotated.png', 'image/png'));
      });

      // ====== DOWNLOAD: WORD (DOCX) ======
      document.getElementById('downloadDocxBtn').addEventListener('click', async () => {
        if (!pdfDoc) return alert('No PDF loaded');
        let allText = '';
        for (let i = 1; i <= pdfDoc.numPages; i++) {
          const page = await pdfDoc.getPage(i);
          const content = await page.getTextContent();
          const pageText = content.items.map(it => it.str).join(' ');
          allText += `Page ${i}\n${pageText}\n\n`;
        }
        // Create simple Word document using HTML format
        const html = `<html><body>${allText.replace(/\n/g, '<br>')}</body></html>`;
        const blob = new Blob([html], { type: 'application/msword' });
        downloadBlob(blob, 'extracted-text.doc');
      });

      // ====== PRINT ======
      document.getElementById('printBtn').addEventListener('click', async () => {
        if (!pdfBytes) return alert('No PDF loaded');
        const pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes);
        const pages = pdfLibDoc.getPages();
        for (let pNum = 1; pNum <= pdfDoc.numPages; pNum++) {
          const anns = annotations[pNum] || [];
          if (anns.length === 0) continue;
          const page = pages[pNum - 1];
          const { width, height } = page.getSize();
          const tmpCanvas = document.createElement('canvas');
          tmpCanvas.width = width; tmpCanvas.height = height;
          const tmpCtx = tmpCanvas.getContext('2d');
          const scaleX = width / annotCanvas.width;
          const scaleY = height / annotCanvas.height;
          tmpCtx.scale(scaleX, scaleY);
          anns.forEach(ann => drawAnn(tmpCtx, ann));
          const img = await pdfLibDoc.embedPng(tmpCanvas.toDataURL());
          page.drawImage(img, { x: 0, y: 0, width, height });
        }
        const bytes = await pdfLibDoc.save();
        const url = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
        window.open(url, '_blank');
      });

      function downloadBlob(blob, name, type) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = name;
        if (type) a.type = type;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      // ====== INIT ======
      setTool('cursor');
    })();
  </script>
</body>
</html>
