<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editor – PixelPress</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {font-family: 'Segoe UI', sans-serif; background: #f9fafb; margin:0; padding:15px;}
        .editor-container {max-width: 1200px; margin:0 auto; background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); overflow:hidden;}
        .header {background:linear-gradient(135deg, #ec4899, #7e22ce); color:white; padding:20px; text-align:center;}
        .step {display:none; padding:25px;}
        .step.active {display:block;}
        .upload-zone {border:4px dashed #cbd5e1; border-radius:16px; padding:70px 20px; text-align:center; cursor:pointer;}
        .canvas-container {position:relative; text-align:center; margin:20px 0; background:#f8fafc; padding:10px; border-radius:12px;}
        .controls {display:grid; gap:15px;}
        button {padding:10px 18px; border:none; border-radius:8px; cursor:pointer;}
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="header">
            <h1>✨ Photo Editor</h1>
            <p>Edit your photos like a pro</p>
        </div>

        <!-- Upload Step -->
        <div id="upload-step" class="step active">
            <h2 style="text-align:center;">Upload Photo to Edit</h2>
            <div id="editorUploadZone" class="upload-zone">
                <h3>📁 Drop Photo Here</h3>
                <p>or click to select</p>
            </div>
            <input type="file" id="editorFileInput" accept="image/*" style="display:none;">
        </div>

        <!-- Editor Step -->
        <div id="editor-step" class="step">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2>Edit Your Photo</h2>
                <button onclick="resetEditor()" style="background:#6b7280; color:white;">Reset All</button>
            </div>

            <div class="canvas-container">
                <canvas id="mainCanvas" style="max-width:100%; max-height:550px; border-radius:10px;"></canvas>
            </div>

            <div class="controls">
                <!-- Crop -->
                <div>
                    <h3>Crop</h3>
                    <button onclick="applyCrop(0.8)">Crop 80%</button>
                    <button onclick="applyCrop(0.6)">Crop 60%</button>
                </div>

                <!-- Adjust -->
                <div>
                    <h3>Adjust</h3>
                    <label>Brightness: <span id="brightVal">100</span>%</label>
                    <input type="range" id="brightness" min="50" max="150" value="100" oninput="livePreview()">
                    
                    <label>Contrast: <span id="contrastVal">100</span>%</label>
                    <input type="range" id="contrast" min="50" max="150" value="100" oninput="livePreview()">
                    
                    <label>Saturation: <span id="satVal">100</span>%</label>
                    <input type="range" id="saturation" min="0" max="200" value="100" oninput="livePreview()">
                </div>

                <!-- Filters -->
                <div>
                    <h3>Filters</h3>
                    <button onclick="applyFilter('grayscale')">Grayscale</button>
                    <button onclick="applyFilter('sepia')">Sepia</button>
                    <button onclick="applyFilter('invert')">Invert</button>
                    <button onclick="applyFilter('none')">Reset Filter</button>
                </div>

                <!-- Rotate & Flip -->
                <div>
                    <h3>Rotate & Flip</h3>
                    <button onclick="rotateImage(-90)">↩️ Rotate Left</button>
                    <button onclick="rotateImage(90)">↪️ Rotate Right</button>
                    <button onclick="flipImage('h')">Flip Horizontal</button>
                    <button onclick="flipImage('v')">Flip Vertical</button>
                </div>

                <!-- Text -->
                <div>
                    <h3>Add Text</h3>
                    <input type="text" id="textInput" placeholder="Enter text" style="width:70%; padding:10px;">
                    <input type="color" id="textColor" value="#ffffff">
                    <button onclick="addText()">Add Text</button>
                </div>
            </div>

            <button onclick="downloadEditedImage()" style="width:100%; margin-top:20px; padding:18px; background:#ec4899; color:white; font-size:18px; border-radius:12px;">
                📥 Download Edited Photo
            </button>
        </div>
    </div>

    <script src="../js/photo-editor.js"></script>
</body>
</html>
