<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editor – PixelPress</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            padding: 15px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ec4899, #7e22ce);
            color: white;
            padding: 35px 20px;
            text-align: center;
        }
        .upload-area {
            padding: 100px 20px;
            text-align: center;
            border: 5px dashed #94a3b8;
            margin: 30px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover {
            border-color: #ec4899;
            background: #fdf4ff;
        }
        canvas {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        button {
            padding: 15px 40px;
            font-size: 18px;
            background: #ec4899;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Photo Editor</h1>
            <p>Edit your photos directly in browser</p>
        </div>

        <div id="uploadScreen">
            <div class="upload-area" id="dropZone">
                <h2>📸 Drop Photo Here</h2>
                <p>or click to upload from device</p>
                <small>JPG, PNG, WEBP supported</small>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
        </div>

        <div id="editorScreen" style="display:none; padding:25px; text-align:center;">
            <canvas id="mainCanvas"></canvas>
            <br><br>
            <button onclick="downloadImage()">📥 Download Edited Photo</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadScreen = document.getElementById('uploadScreen');
        const editorScreen = document.getElementById('editorScreen');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                loadImage(e.target.files[0]);
            }
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    uploadScreen.style.display = 'none';
                    editorScreen.style.display = 'block';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'edited-photo.png';
            link.href = canvas.toDataURL('image/png', 0.95);
            link.click();
        }
    </script>
</body>
</html>
