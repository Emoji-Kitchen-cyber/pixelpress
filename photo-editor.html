<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Editor – PixelPress</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8fafc;
            padding: 15px;
        }
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ec4899, #7e22ce);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .upload-area {
            padding: 80px 20px;
            text-align: center;
            border: 4px dashed #94a3b8;
            margin: 20px;
            border-radius: 20px;
            cursor: pointer;
        }
        canvas {
            max-width: 100%;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>✨ Photo Editor</h1>
            <p>Powerful browser-based photo editor</p>
        </div>

        <!-- Upload -->
        <div id="upload-screen">
            <div class="upload-area" id="uploadZone">
                <h2>📸 Drop your photo here</h2>
                <p>or click to upload</p>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
        </div>

        <!-- Editor -->
        <div id="editor-screen" style="display:none; padding:20px;">
            <canvas id="canvas" style="display:block; margin:0 auto;"></canvas>
            
            <div style="margin-top:20px; text-align:center;">
                <button onclick="downloadImage()" style="padding:15px 30px; font-size:18px; background:#ec4899; color:white; border:none; border-radius:12px;">
                    Download Edited Photo
                </button>
            </div>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const uploadScreen = document.getElementById('upload-screen');
        const editorScreen = document.getElementById('editor-screen');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentImage = null;

        uploadZone.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) loadImage(e.target.files[0]);
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    uploadScreen.style.display = 'none';
                    editorScreen.style.display = 'block';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'edited-photo.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
