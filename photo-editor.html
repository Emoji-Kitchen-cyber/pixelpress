<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Editor – PixelPress</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .editor-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 20px 0;
            align-items: center;
        }
        .tool-group {
            background: #f9fafb;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            flex: 1 1 250px;
        }
        .tool-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #374151;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #ec4899;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 0.9rem;
            border: 1px solid #d1d5db;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-small:hover { background: #f3f4f6; }
        .filter-btn.active { background: #ec4899; color: white; border-color: #ec4899; }
        canvas { max-width: 100%; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
  <header class="main-header">
    <a href="/" class="logo">🎨 PixelPress</a>
    <nav><a href="/" class="btn-outline">← All Tools</a></nav>
  </header>

  <div class="tool-page">
    <h1>✨ Photo Editor</h1>

    <!-- Step 1: Upload -->
    <div class="workflow-step" id="upload-step">
      <h2>1. Upload Image</h2>
      <div class="upload-zone" id="editorUploadZone">
        <div class="icon">📸</div>
        <p>Drop your photo here or click to browse</p>
      </div>
      <input type="file" id="editorFileInput" accept="image/*" hidden>
    </div>

    <!-- Step 2: Editor -->
    <div class="workflow-step" id="editor-step" style="display:none;">
      <h2>2. Edit Photo</h2>
      <canvas id="mainCanvas"></canvas>

      <div class="editor-tools">
        <div class="tool-group">
          <label>Brightness <span id="brightnessVal">100%</span></label>
          <input type="range" id="brightness" min="0" max="200" value="100" step="1">
        </div>
        <div class="tool-group">
          <label>Contrast <span id="contrastVal">100%</span></label>
          <input type="range" id="contrast" min="0" max="200" value="100" step="1">
        </div>
        <div class="tool-group">
          <label>Saturation <span id="saturationVal">100%</span></label>
          <input type="range" id="saturation" min="0" max="200" value="100" step="1">
        </div>
      </div>

      <div class="editor-tools">
        <button class="btn-small filter-btn" data-filter="none">Normal</button>
        <button class="btn-small filter-btn" data-filter="grayscale(100%)">B&W</button>
        <button class="btn-small filter-btn" data-filter="sepia(100%)">Sepia</button>
        <button class="btn-small filter-btn" data-filter="invert(100%)">Invert</button>
        <button class="btn-small filter-btn" data-filter="blur(3px)">Blur</button>
      </div>

      <div class="editor-tools">
        <button class="btn-small" onclick="rotateImage(90)">↩️ Rotate 90°</button>
        <button class="btn-small" onclick="rotateImage(-90)">↪️ Rotate -90°</button>
        <button class="btn-small" onclick="flipImage('h')">↔️ Flip H</button>
        <button class="btn-small" onclick="flipImage('v')">↕️ Flip V</button>
      </div>

      <div class="editor-tools">
        <input type="text" id="textInput" placeholder="Add text...">
        <input type="color" id="textColor" value="#ffffff">
        <button class="btn-small" onclick="addText()">Add Text</button>
      </div>

      <div class="editor-tools">
        <button class="btn-small" onclick="applyCrop(0.8)">✂️ Crop 80%</button>
        <button class="btn-small" onclick="applyCrop(0.5)">✂️ Crop 50%</button>
        <button class="btn-small" onclick="resetEditor()">🔄 Reset</button>
      </div>

      <div class="download-section">
        <button class="btn-primary" onclick="downloadEditedImage()">📥 Download Edited Photo</button>
      </div>
    </div>
  </div>

  <script src="/js/photo-editor.js"></script>
</body>
</html>
