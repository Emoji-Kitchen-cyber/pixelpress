<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght=700;800&family=DM+Sans:wght@400;500;600&display=swap');
    :root {
      --bg: #f5f5f7; --card: #ffffff; --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f; --muted: #6e6e73; --accent: #ec4899; --accent2: #a78bfa;
    }
    [data-theme="dark"] {
      --bg: #09090e; --card: #15151e; --border: rgba(255, 255, 255, 0.08); --text: #e8e8f0; --muted: #86868b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 40px 20px; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
    .container { max-width: 500px; width: 100%; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.01); height: fit-content; }
    h1 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
    h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    label { font-size: 14px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 8px; }
    input { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 10px; margin-bottom: 20px; outline: none; font-size: 15px; box-sizing: border-box; }
    input:focus { border-color: var(--accent); }
    .qr-preview-box { display: flex; justify-content: center; align-items: center; min-height: 220px; border: 1px dashed var(--border); border-radius: 12px; margin-bottom: 20px; background: #fff; padding: 10px; }
    .btn { width: 100%; padding: 14px; background: var(--text); color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
    .btn:hover { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <a href="./index.html" style="color: var(--muted); font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 15px;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    <h1><span>QR Code</span> Generator</h1>
    
    <label>Enter URL or Text</label>
    <input type="text" id="qrText" value="https://pixelpress-smoky.vercel.app/" placeholder="Type text or paste link...">

    <label>QR Code Color</label>
    <input type="color" id="qrColor" value="#1d1d1f" style="height: 45px; padding: 5px; cursor: pointer;">

    <div class="qr-preview-box">
      <div id="qrcode"></div>
    </div>

    <button class="btn" id="downloadBtn"><i class="fa-solid fa-download"></i> Download High-Res PNG</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./qr-generator.js"></script>
</body>
</html>
