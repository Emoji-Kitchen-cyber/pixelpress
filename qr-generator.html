<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator - PixelPress</title>
  <meta name="description" content="Generate high-quality QR codes instantly" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.75);
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236, 72, 153, 0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --fmono: 'JetBrains Mono', monospace;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21, 21, 30, 0.7);
      --card: #15151e;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236, 72, 153, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--fbody);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }

    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      letter-spacing: -0.5px; text-transform: uppercase;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .main {
      flex: 1;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 20px 5rem;
    }

    .tool-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .tool-header h1 {
      font-family: var(--fhead);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    .tool-header p {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .input-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.95rem;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      transition: all 0.3s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--glow);
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: var(--fmono);
    }

    .qr-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
      padding: 2rem;
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border);
      min-height: 280px;
    }

    #qrcode {
      padding: 12px;
      background: white;
      border-radius: 12px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--glow);
    }

    .btn-secondary {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn" title="Back to Dashboard">
        <i class="fa-solid fa-arrow-left"></i>
      </a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <div>
      <button id="themeToggle" class="back-btn" title="Toggle Theme">🌓</button>
    </div>
  </nav>

  <div class="main">
    <div class="tool-header">
      <h1>QR Code Generator</h1>
      <p>Instant high-resolution QR codes for URLs, text, and more</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label for="qrText">Content</label>
        <textarea id="qrText" placeholder="Enter URL, text, or any data...">https://pixelpress-smoky.vercel.app</textarea>
      </div>

      <div class="input-group">
        <label for="qrSize">Size (px)</label>
        <select id="qrSize">
          <option value="256">256 × 256</option>
          <option value="384">384 × 384</option>
          <option value="512" selected>512 × 512 (Recommended)</option>
          <option value="640">640 × 640</option>
        </select>
      </div>

      <div class="qr-container">
        <div id="qrcode"></div>
      </div>

      <div class="btn-group">
        <button onclick="generateQR()" class="btn-primary">
          <i class="fa-solid fa-qrcode"></i> Generate QR Code
        </button>
        <button onclick="downloadQR()" class="btn-primary">
          <i class="fa-solid fa-download"></i> Download PNG
        </button>
        <button onclick="copyQRUrl()" class="btn-secondary">
          <i class="fa-solid fa-copy"></i> Copy Link
        </button>
      </div>
    </div>
  </div>

  <footer>
    © 2026 PixelPress — All processing happens in your browser
  </footer>

  <script>
    // Theme Sync
    function syncTheme() {
      const savedTheme = localStorage.getItem('pixelpress-theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('pixelpress-theme', newTheme);
    });

    let currentQR = null;

    function generateQR() {
      const text = document.getElementById('qrText').value.trim();
      const size = parseInt(document.getElementById('qrSize').value);
      
      if (!text) {
        alert("Please enter some content to generate a QR code.");
        return;
      }

      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';

      currentQR = new QRCode(qrContainer, {
        text: text,
        width: size,
        height: size,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    function downloadQR() {
      if (!currentQR) {
        alert("Please generate a QR code first.");
        return;
      }

      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) return;

      const link = document.createElement('a');
      link.download = `qrcode-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
    }

    function copyQRUrl() {
      const text = document.getElementById('qrText').value.trim();
      if (!text) return;
      
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('button[onclick="copyQRUrl()"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
        setTimeout(() => btn.innerHTML = originalText, 2000);
      });
    }

    // Auto generate on load
    window.onload = () => {
      syncTheme();
      setTimeout(() => {
        generateQR();
      }, 300);
    };
  </script>
</body>
</html>
