<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Modern, maintained QR library with SVG + canvas support -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.75);
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236, 72, 153, 0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --fmono: 'JetBrains Mono', monospace;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21, 21, 30, 0.7);
      --card: #15151e;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236, 72, 153, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--fbody);
      min-height: 100vh; display: flex; flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    nav {
      position: sticky; top: 0; z-index: 200; display: flex; align-items: center;
      justify-content: space-between; padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }
    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      text-transform: uppercase; letter-spacing: -0.5px; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .main {
      flex: 1; max-width: 980px; margin: 0 auto; width: 100%; padding: 2rem 20px 5rem;
    }
    .tool-header { text-align: center; margin-bottom: 2.5rem; }
    .tool-header h1 {
      font-family: var(--fhead); font-size: clamp(2rem, 5vw, 2.8rem); font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tool-header p { color: var(--muted); font-size: 1.05rem; }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab {
      padding: 10px 20px; border-radius: 999px; background: var(--bg);
      border: 1px solid var(--border); cursor: pointer; font-weight: 500;
      transition: all 0.2s; font-size: 14px;
    }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    .input-group { margin-bottom: 1.2rem; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
    input, textarea, select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--bg); color: var(--text);
      font-family: var(--fbody); font-size: 15px;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 4px var(--glow); outline: none;
    }
    textarea { min-height: 110px; font-family: var(--fmono); resize: vertical; }

    .adv-settings {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) { .adv-settings { grid-template-columns: 1fr; } }
    .adv-settings label { font-size: 13px; }

    .qr-container {
      display: flex; flex-direction: column; align-items: center; margin: 1.5rem 0;
    }
    .qr-canvas-wrapper {
      background: #ffffff; padding: 20px; border-radius: 16px;
      border: 1px solid var(--border); display: inline-block;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    #qrCanvas { display: block; }

    .warning-msg {
      font-size: 0.85rem; color: #f59e0b; margin-top: 8px;
    }
    .info-msg {
      font-size: 0.9rem; color: var(--muted); margin-top: 8px;
      display: flex; align-items: center; gap: 6px;
    }

    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 1.5rem; justify-content: center; }
    button {
      padding: 12px 24px; border: none; border-radius: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px var(--glow); }
    .btn-secondary {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); }

    footer {
      text-align: center; padding: 2rem; color: var(--muted);
      font-size: 0.9rem; border-top: 1px solid var(--border); margin-top: auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <div class="tool-header">
      <h1>QR Code Generator</h1>
      <p>100% offline • camera‑proof • advanced encoding</p>
    </div>

    <div class="card">
      <div class="tabs" id="tabs">
        <div class="tab active" data-mode="url">URL / Text</div>
        <div class="tab" data-mode="wifi">WiFi</div>
        <div class="tab" data-mode="vcard">Contact (vCard)</div>
        <div class="tab" data-mode="email">Email</div>
        <div class="tab" data-mode="sms">SMS</div>
      </div>

      <div id="inputArea"></div>

      <div class="adv-settings">
        <div class="input-group">
          <label>Error Correction</label>
          <select id="ecLevel">
            <option value="L">L (7%) – smallest size</option>
            <option value="M">M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H" selected>H (30%) – best scan</option>
          </select>
        </div>
        <div class="input-group">
          <label>Size (px)</label>
          <select id="qrSize">
            <option value="400">400</option>
            <option value="512" selected>512 (recommended)</option>
            <option value="640">640</option>
            <option value="800">800</option>
          </select>
        </div>
        <div class="input-group">
          <label>Foreground Color</label>
          <input type="color" id="fgColor" value="#000000">
        </div>
      </div>

      <div class="qr-container">
        <div class="qr-canvas-wrapper">
          <canvas id="qrCanvas"></canvas>
        </div>
        <div class="info-msg" id="sizeInfo"></div>
        <div class="warning-msg" id="warning"></div>
      </div>

      <div class="btn-group">
        <button onclick="downloadQR('png')" class="btn-primary">
          <i class="fa-solid fa-download"></i> Download PNG
        </button>
        <button onclick="downloadQR('svg')" class="btn-secondary">
          <i class="fa-solid fa-file-code"></i> Download SVG (vector)
        </button>
      </div>
    </div>
  </div>

  <footer>© 2026 PixelPress — Client‑side, private, secure</footer>

  <script>
    // ----- Theme sync -----
    function syncTheme() {
      const saved = localStorage.getItem('pixelpress-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }
    document.getElementById('themeToggle').addEventListener('click', () => {
      const curr = document.documentElement.getAttribute('data-theme');
      const next = curr === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pixelpress-theme', next);
    });

    // ----- Tab system -----
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderInputFields(tab.dataset.mode);
      });
    });

    function renderInputFields(mode) {
      const area = document.getElementById('inputArea');
      let html = '';
      switch (mode) {
        case 'url':
        case 'text':
          html = `<div class="input-group">
                    <label>Content (URL or plain text)</label>
                    <textarea id="urlText" placeholder="https://example.com or any text...">https://pixelpress-smoky.vercel.app</textarea>
                  </div>`;
          break;
        case 'wifi':
          html = `<div class="input-group"><label>Network SSID</label><input type="text" id="ssid" placeholder="MyWiFi" value="MyWiFi"></div>
                  <div class="input-group"><label>Password</label><input type="password" id="wifiPass" placeholder="password" value="password123"></div>
                  <div class="input-group"><label>Encryption</label><select id="wifiEnc"><option value="WPA" selected>WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`;
          break;
        case 'vcard':
          html = `<div class="input-group"><label>Full Name</label><input type="text" id="vName" placeholder="John Doe" value="Ahmed Ali"></div>
                  <div class="input-group"><label>Phone</label><input type="tel" id="vPhone" placeholder="+966501234567" value="+966501234567"></div>
                  <div class="input-group"><label>Email</label><input type="email" id="vEmail" placeholder="john@example.com"></div>`;
          break;
        case 'email':
          html = `<div class="input-group"><label>Recipient</label><input type="email" id="emailTo" placeholder="user@domain.com" value="hello@example.com"></div>
                  <div class="input-group"><label>Subject</label><input type="text" id="emailSub" placeholder="Hello"></div>
                  <div class="input-group"><label>Body</label><textarea id="emailBody" placeholder="Message..."></textarea></div>`;
          break;
        case 'sms':
          html = `<div class="input-group"><label>Phone Number</label><input type="tel" id="smsNum" placeholder="+966501234567" value="+966501234567"></div>
                  <div class="input-group"><label>Message</label><textarea id="smsMsg" placeholder="Your message..."></textarea></div>`;
          break;
      }
      area.innerHTML = html;

      // Attach live update to all inputs
      area.querySelectorAll('input, textarea, select').forEach(el => {
        el.addEventListener('input', generateQR);
        el.addEventListener('change', generateQR);
      });
      generateQR();
    }

    // ----- QR content builder -----
    function buildContent(mode) {
      switch (mode) {
        case 'url':
        case 'text': {
          let val = document.getElementById('urlText')?.value.trim() || '';
          return val || 'https://pixelpress-smoky.vercel.app';
        }
        case 'wifi': {
          const ssid = document.getElementById('ssid')?.value.trim() || 'MyWiFi';
          const pass = document.getElementById('wifiPass')?.value.trim() || 'password';
          const enc = document.getElementById('wifiEnc')?.value || 'WPA';
          return `WIFI:S:${ssid};T:${enc};P:${pass};;`;
        }
        case 'vcard': {
          const name = document.getElementById('vName')?.value.trim() || 'Ahmed Ali';
          const phone = document.getElementById('vPhone')?.value.trim() || '';
          const email = document.getElementById('vEmail')?.value.trim() || '';
          let vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}`;
          if (phone) vcard += `\nTEL:${phone}`;
          if (email) vcard += `\nEMAIL:${email}`;
          vcard += '\nEND:VCARD';
          return vcard;
        }
        case 'email': {
          const to = document.getElementById('emailTo')?.value.trim() || '';
          const sub = document.getElementById('emailSub')?.value.trim() || '';
          const body = document.getElementById('emailBody')?.value.trim() || '';
          return `MATMSG:TO:${to};SUB:${sub};BODY:${body};;`;
        }
        case 'sms': {
          const num = document.getElementById('smsNum')?.value.trim() || '';
          const msg = document.getElementById('smsMsg')?.value.trim() || '';
          return `SMSTO:${num}:${msg}`;
        }
        default: return '';
      }
    }

    // ----- Generate QR (using qrcode library) -----
    async function generateQR() {
      const mode = document.querySelector('.tab.active')?.dataset.mode || 'url';
      const size = parseInt(document.getElementById('qrSize').value);
      const ecLevel = document.getElementById('ecLevel').value;
      const fgColor = document.getElementById('fgColor').value;
      const canvas = document.getElementById('qrCanvas');
      const warning = document.getElementById('warning');
      const sizeInfo = document.getElementById('sizeInfo');

      try {
        const content = buildContent(mode);
        if (!content) {
          canvas.style.display = 'none';
          warning.textContent = '⚠️ Please fill in the fields above.';
          return;
        }
        warning.textContent = '';

        // Build options
        const opts = {
          errorCorrectionLevel: ecLevel,
          width: size,
          color: { dark: fgColor, light: '#ffffff' },
          margin: 2
        };

        // Render to canvas
        await QRCode.toCanvas(canvas, content, opts);
        canvas.style.display = 'block';

        // Show data size info
        const byteLength = new TextEncoder().encode(content).length;
        sizeInfo.innerHTML = `<i class="fa-solid fa-circle-info"></i> Content: ${byteLength} bytes | EC: ${ecLevel}`;

        // Warn if data may be too large for chosen EC level
        if (byteLength > 200 && ecLevel === 'H') {
          warning.textContent = '⚠️ Large data with high EC may create a very dense QR – hard for some cameras.';
        }
      } catch (err) {
        warning.textContent = '❌ Error generating QR: ' + err.message;
        canvas.style.display = 'none';
      }
    }

    // ----- Download function (PNG & SVG) -----
    function downloadQR(format) {
      const canvas = document.getElementById('qrCanvas');
      if (!canvas || canvas.style.display === 'none') return alert('No QR code to download.');
      const content = buildContent(document.querySelector('.tab.active')?.dataset.mode || 'url');
      const size = parseInt(document.getElementById('qrSize').value);
      const ecLevel = document.getElementById('ecLevel').value;
      const fgColor = document.getElementById('fgColor').value;

      if (format === 'png') {
        const link = document.createElement('a');
        link.download = `qr-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } else if (format === 'svg') {
        QRCode.toString(content, {
          type: 'svg',
          errorCorrectionLevel: ecLevel,
          color: { dark: fgColor, light: '#ffffff' },
          width: size,
          margin: 2
        }, (err, svg) => {
          if (err) return alert('SVG generation failed: ' + err);
          const blob = new Blob([svg], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = `qr-${Date.now()}.svg`;
          link.href = url;
          link.click();
          URL.revokeObjectURL(url);
        });
      }
    }

    // ----- Initialize -----
    window.addEventListener('DOMContentLoaded', () => {
      syncTheme();
      renderInputFields('url');
      // Live update on settings change
      ['ecLevel', 'qrSize', 'fgColor'].forEach(id => {
        document.getElementById(id).addEventListener('change', generateQR);
      });
    });
  </script>
</body>
</html>
