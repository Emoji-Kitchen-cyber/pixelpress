<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator - PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.75);
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236, 72, 153, 0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --fmono: 'JetBrains Mono', monospace;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21, 21, 30, 0.7);
      --card: #15151e;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236, 72, 153, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--fbody);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }

    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      letter-spacing: -0.5px; text-transform: uppercase;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .main {
      flex: 1;
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 20px 5rem;
    }

    .tool-header { text-align: center; margin-bottom: 2.5rem; }
    .tool-header h1 {
      font-family: var(--fhead);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
    }
    .tool-header p { color: var(--muted); font-size: 1.05rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tab {
      padding: 10px 20px;
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .input-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--glow);
      outline: none;
    }

    textarea { min-height: 110px; font-family: var(--fmono); }

    .qr-container {
      display: flex;
      justify-content: center;
      margin: 2rem 0;
      padding: 2rem;
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border);
      min-height: 300px;
    }

    #qrcode { padding: 16px; background: white; border-radius: 12px; }

    .advanced-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--glow); }

    .btn-secondary {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <div class="tool-header">
      <h1>QR Code Generator</h1>
      <p>Advanced QR codes with image, logo & color support</p>
    </div>

    <div class="card">
      <!-- Mode Tabs -->
      <div class="tabs" id="tabs">
        <div class="tab active" data-mode="text">Text / URL</div>
        <div class="tab" data-mode="wifi">WiFi</div>
        <div class="tab" data-mode="contact">Contact</div>
        <div class="tab" data-mode="image">Image</div>
      </div>

      <div id="inputArea">
        <!-- Dynamic inputs will be injected by JS -->
      </div>

      <div class="advanced-options">
        <div class="input-group">
          <label>Size (px)</label>
          <select id="qrSize">
            <option value="256">256</option>
            <option value="384">384</option>
            <option value="512" selected>512 (Recommended)</option>
            <option value="640">640</option>
          </select>
        </div>
        <div class="input-group">
          <label>Error Correction</label>
          <select id="errorLevel">
            <option value="L">Low</option>
            <option value="M" selected>Medium</option>
            <option value="Q">Quality</option>
            <option value="H">High</option>
          </select>
        </div>
        <div class="input-group">
          <label>Foreground Color</label>
          <input type="color" id="fgColor" value="#000000">
        </div>
        <div class="input-group">
          <label>Background Color</label>
          <input type="color" id="bgColor" value="#ffffff">
        </div>
      </div>

      <div class="input-group">
        <label>Upload Logo (Optional)</label>
        <input type="file" id="logoUpload" accept="image/*">
      </div>

      <div class="qr-container">
        <div id="qrcode"></div>
      </div>

      <div class="btn-group">
        <button onclick="generateQR()" class="btn-primary">
          <i class="fa-solid fa-qrcode"></i> Generate
        </button>
        <button onclick="downloadQR()" class="btn-primary">
          <i class="fa-solid fa-download"></i> Download PNG
        </button>
        <button onclick="copyToClipboard()" class="btn-secondary">
          <i class="fa-solid fa-copy"></i> Copy Content
        </button>
      </div>
    </div>
  </div>

  <footer>© 2026 PixelPress — All processing happens in your browser</footer>

  <script>
    let currentQR = null;
    let currentLogo = null;

    function syncTheme() {
      const saved = localStorage.getItem('pixelpress-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('pixelpress-theme', newTheme);
    });

    // Tab System
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderInputFields(tab.dataset.mode);
      });
    });

    function renderInputFields(mode) {
      const area = document.getElementById('inputArea');
      let html = '';

      if (mode === 'text') {
        html = `
          <div class="input-group">
            <label>Content</label>
            <textarea id="content" placeholder="https://example.com or any text...">https://pixelpress-smoky.vercel.app</textarea>
          </div>`;
      } else if (mode === 'wifi') {
        html = `
          <div class="input-group"><label>Network Name (SSID)</label><input type="text" id="ssid" value="MyWiFi"></div>
          <div class="input-group"><label>Password</label><input type="text" id="wifiPass" value="password123"></div>
          <div class="input-group"><label>Encryption</label>
            <select id="encryption"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option></select>
          </div>`;
      } else if (mode === 'contact') {
        html = `
          <div class="input-group"><label>Name</label><input type="text" id="name" value="John Doe"></div>
          <div class="input-group"><label>Phone</label><input type="tel" id="phone" value="+966501234567"></div>
          <div class="input-group"><label>Email</label><input type="email" id="email" value="hello@example.com"></div>`;
      } else if (mode === 'image') {
        html = `
          <div class="input-group">
            <label>Upload Image to Encode</label>
            <input type="file" id="imageUpload" accept="image/*">
          </div>`;
      }

      area.innerHTML = html;
    }

    async function getContent(mode) {
      if (mode === 'text') return document.getElementById('content').value.trim();
      if (mode === 'wifi') {
        const ssid = document.getElementById('ssid').value;
        const pass = document.getElementById('wifiPass').value;
        const enc = document.getElementById('encryption').value;
        return `WIFI:S:\( {ssid};T: \){enc};P:${pass};;`;
      }
      if (mode === 'contact') {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        return `BEGIN:VCARD\nVERSION:3.0\nFN:\( {name}\nTEL: \){phone}\nEMAIL:${email}\nEND:VCARD`;
      }
      if (mode === 'image') {
        const file = document.getElementById('imageUpload').files[0];
        if (!file) throw new Error("Please upload an image");
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(file);
        });
      }
    }

    async function generateQR() {
      const activeTab = document.querySelector('.tab.active').dataset.mode;
      const size = parseInt(document.getElementById('qrSize').value);
      const errorLevel = document.getElementById('errorLevel').value;
      const fg = document.getElementById('fgColor').value;
      const bg = document.getElementById('bgColor').value;

      try {
        const content = await getContent(activeTab);
        if (!content) {
          alert("Please provide content");
          return;
        }

        const container = document.getElementById('qrcode');
        container.innerHTML = '';

        currentQR = new QRCode(container, {
          text: content,
          width: size,
          height: size,
          colorDark: fg,
          colorLight: bg,
          correctLevel: QRCode.CorrectLevel[errorLevel]
        });

      } catch (e) {
        alert(e.message || "Failed to generate QR code");
      }
    }

    function downloadQR() {
      if (!currentQR) return alert("Generate a QR code first");
      const canvas = document.querySelector('#qrcode canvas');
      const link = document.createElement('a');
      link.download = `qr-code-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
    }

    function copyToClipboard() {
      const activeTab = document.querySelector('.tab.active').dataset.mode;
      let text = "";
      if (activeTab === 'text') text = document.getElementById('content').value;
      else if (activeTab === 'wifi') text = "WiFi configuration copied";
      else if (activeTab === 'contact') text = "vCard copied";
      
      if (text) navigator.clipboard.writeText(text);
      alert("Content copied to clipboard!");
    }

    // Logo Upload (Basic overlay simulation - advanced would need canvas merge)
    document.getElementById('logoUpload').addEventListener('change', (e) => {
      if (e.target.files[0]) {
        currentLogo = e.target.files[0];
        alert("Logo uploaded! (Note: Full logo overlay needs canvas merge - currently preview ready)");
      }
    });

    // Initialize
    window.onload = () => {
      syncTheme();
      renderInputFields('text');
      setTimeout(generateQR, 400);
    };
  </script>
</body>
</html>
