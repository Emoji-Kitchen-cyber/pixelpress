<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator Pro — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Modern QR styling library -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <!-- JSZip for batch download -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.75);
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236, 72, 153, 0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --fmono: 'JetBrains Mono', monospace;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21, 21, 30, 0.7);
      --card: #15151e;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236, 72, 153, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--fbody);
      min-height: 100vh; display: flex; flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    nav {
      position: sticky; top: 0; z-index: 200; display: flex; align-items: center;
      justify-content: space-between; padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s; text-decoration: none;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }
    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      text-transform: uppercase; letter-spacing: -0.5px; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .main {
      flex: 1; max-width: 1200px; margin: 0 auto; width: 100%; padding: 2rem 20px 4rem;
      display: grid; grid-template-columns: 1fr 380px; gap: 2rem;
    }
    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
    .preview-panel {
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
    }
    .preview-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
      padding: 2rem; display: flex; justify-content: center; align-items: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.03); width: 100%;
    }
    #qrContainer { width: 280px; height: 280px; }
    .design-panel {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
      padding: 1.5rem; overflow-y: auto; max-height: calc(100vh - 120px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }
    .section-title {
      font-family: var(--fhead); font-size: 1.1rem; font-weight: 800; margin: 1.2rem 0 0.8rem;
      display: flex; align-items: center; gap: 8px;
    }
    .tab-row {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem;
    }
    .tab {
      padding: 8px 16px; border-radius: 999px; background: var(--bg);
      border: 1px solid var(--border); cursor: pointer; font-weight: 500;
      transition: all 0.2s; font-size: 13px;
    }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .input-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: var(--muted); }
    input, textarea, select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 10px; background: var(--bg); color: var(--text);
      font-size: 14px; font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); outline: none;
    }
    textarea { min-height: 70px; font-family: var(--fmono); }
    .color-row {
      display: flex; align-items: center; gap: 8px;
    }
    .color-row input[type="color"] {
      width: 40px; height: 40px; padding: 2px; border-radius: 8px;
      border: 1px solid var(--border);
    }
    .range-row {
      display: flex; align-items: center; gap: 10px;
    }
    .range-row input[type="range"] { flex: 1; }
    .range-row span { min-width: 30px; }
    .btn-group {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem;
    }
    button {
      padding: 10px 18px; border: none; border-radius: 10px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-size: 13px; display: flex; align-items: center; gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--glow); }
    .btn-secondary {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .note {
      font-size: 0.8rem; color: var(--muted); margin-top: 6px;
    }
    .batch-area { display: none; }
    .badge {
      background: var(--accent); color: white; border-radius: 20px; padding: 2px 10px;
      font-size: 11px; margin-left: 6px;
    }
    footer {
      text-align: center; padding: 2rem; color: var(--muted);
      font-size: 0.9rem; border-top: 1px solid var(--border); margin-top: auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <!-- Preview Area -->
    <div class="preview-panel">
      <div class="tool-header" style="text-align:center;">
        <h1 style="font-family:var(--fhead); font-size:1.8rem; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
          QR Code Pro
        </h1>
        <p style="color:var(--muted); font-size:0.95rem;">Fully customizable, modern QR codes</p>
      </div>
      <div class="preview-card">
        <div id="qrContainer"></div>
      </div>
      <div class="btn-group">
        <button onclick="downloadQR('png')" class="btn-primary"><i class="fa-solid fa-download"></i> PNG</button>
        <button onclick="downloadQR('svg')" class="btn-secondary"><i class="fa-solid fa-file-code"></i> SVG</button>
        <button onclick="downloadQR('jpeg')" class="btn-secondary"><i class="fa-solid fa-image"></i> JPEG</button>
      </div>
      <div class="btn-group">
        <button onclick="savePreset()" class="btn-secondary"><i class="fa-solid fa-floppy-disk"></i> Save Design</button>
        <button onclick="loadPreset()" class="btn-secondary"><i class="fa-solid fa-folder-open"></i> Load Design</button>
      </div>
    </div>

    <!-- Design Panel -->
    <div class="design-panel">
      <div class="section-title"><i class="fa-solid fa-pen"></i> Content Type</div>
      <div class="tab-row" id="contentTabs">
        <div class="tab active" data-mode="url">URL</div>
        <div class="tab" data-mode="wifi">WiFi</div>
        <div class="tab" data-mode="vcard">vCard</div>
        <div class="tab" data-mode="email">Email</div>
        <div class="tab" data-mode="sms">SMS</div>
        <div class="tab" data-mode="image">Image</div>
        <div class="tab" data-mode="batch">Batch <span class="badge">Pro</span></div>
      </div>
      <div id="dynamicInputs"></div>

      <div class="section-title"><i class="fa-solid fa-palette"></i> Style</div>
      <div class="input-group">
        <label>Dot Style</label>
        <select id="dotStyle">
          <option value="square">Square</option>
          <option value="dots" selected>Dots</option>
          <option value="rounded">Rounded</option>
          <option value="classy">Classy</option>
          <option value="extra-rounded">Extra-rounded</option>
        </select>
      </div>
      <div class="input-group">
        <label>Corner Square Style</label>
        <select id="cornerStyle">
          <option value="square">Square</option>
          <option value="dot">Dot</option>
          <option value="extra-rounded" selected>Extra-rounded</option>
        </select>
      </div>
      <div class="input-group">
        <label>Color 1</label>
        <div class="color-row">
          <input type="color" id="color1" value="#000000">
          <span id="color1Hex">#000000</span>
        </div>
      </div>
      <div class="input-group">
        <label>Color 2 (gradient)</label>
        <div class="color-row">
          <input type="color" id="color2" value="#ec4899">
          <span id="color2Hex">#ec4899</span>
        </div>
      </div>
      <div class="input-group">
        <label>Background Color</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="input-group">
        <label>Logo (center image)</label>
        <input type="file" id="logoUpload" accept="image/*">
      </div>
      <div class="input-group">
        <label>Quiet Zone (margin)</label>
        <div class="range-row">
          <input type="range" id="margin" min="0" max="40" value="10">
          <span id="marginVal">10</span>
        </div>
      </div>
      <div class="input-group">
        <label>Error Correction</label>
        <select id="ecLevel">
          <option value="L">L (7%)</option>
          <option value="M">M (15%)</option>
          <option value="Q">Q (25%)</option>
          <option value="H" selected>H (30%)</option>
        </select>
      </div>
      <button onclick="updateQR()" class="btn-primary" style="width:100%;margin-top:1rem;">Apply Changes</button>
    </div>
  </div>

  <footer>© 2026 PixelPress — Client‑side • 100% Private</footer>

  <script>
    // ---- QR Code Styling Instance ----
    let qrCode = null;

    const qrContainer = document.getElementById('qrContainer');

    const defaultOptions = {
      width: 280,
      height: 280,
      type: "canvas",
      data: "https://pixelpress-smoky.vercel.app",
      image: "",
      margin: 10,
      qrOptions: {
        typeNumber: "0",
        mode: "Byte",
        errorCorrectionLevel: "H"
      },
      imageOptions: {
        hideBackgroundDots: true,
        imageSize: 0.4,
        margin: 10,
        crossOrigin: "anonymous",
      },
      dotsOptions: {
        color: "#000000",
        gradient: {
          type: "linear",
          rotation: 0,
          colorStops: [
            { offset: 0, color: "#000000" },
            { offset: 1, color: "#ec4899" }
          ]
        },
        type: "dots"
      },
      cornersSquareOptions: {
        type: "extra-rounded",
        color: "#000000",
      },
      backgroundOptions: {
        color: "#ffffff",
      },
    };

    function initQR() {
      qrCode = new QRCodeStyling({...defaultOptions});
      qrCode.append(qrContainer);
    }

    function updateQR() {
      if (!qrCode) return;
      const mode = document.querySelector('#contentTabs .tab.active')?.dataset.mode || 'url';
      const content = buildContent(mode);
      if (!content) return;

      const dotStyle = document.getElementById('dotStyle').value;
      const cornerStyle = document.getElementById('cornerStyle').value;
      const color1 = document.getElementById('color1').value;
      const color2 = document.getElementById('color2').value;
      const bgColor = document.getElementById('bgColor').value;
      const ec = document.getElementById('ecLevel').value;
      const margin = parseInt(document.getElementById('margin').value);

      const options = {
        data: content,
        margin: margin,
        qrOptions: { errorCorrectionLevel: ec },
        dotsOptions: {
          type: dotStyle,
          gradient: {
            type: "linear",
            rotation: 0,
            colorStops: [
              { offset: 0, color: color1 },
              { offset: 1, color: color2 }
            ]
          }
        },
        cornersSquareOptions: {
          type: cornerStyle,
          color: color1,
        },
        backgroundOptions: { color: bgColor },
        image: qrCode?._options?.image || "", // keep existing logo
        imageOptions: { hideBackgroundDots: true, imageSize: 0.4, margin: 10 }
      };

      qrCode.update(options);
    }

    // ---- Content Builder ----
    function buildContent(mode) {
      switch(mode) {
        case 'url': return document.getElementById('urlText')?.value.trim() || 'https://pixelpress-smoky.vercel.app';
        case 'wifi': {
          const ssid = document.getElementById('ssid')?.value.trim() || 'MyWiFi';
          const pass = document.getElementById('wifiPass')?.value.trim() || '';
          const enc = document.getElementById('wifiEnc')?.value || 'WPA';
          return `WIFI:S:${ssid};T:${enc};P:${pass};;`;
        }
        case 'vcard': {
          const name = document.getElementById('vName')?.value.trim() || 'Ahmed Ali';
          const phone = document.getElementById('vPhone')?.value.trim() || '';
          const email = document.getElementById('vEmail')?.value.trim() || '';
          let vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}`;
          if(phone) vcf += `\nTEL:${phone}`;
          if(email) vcf += `\nEMAIL:${email}`;
          vcf += '\nEND:VCARD';
          return vcf;
        }
        case 'email': {
          const to = document.getElementById('emailTo')?.value.trim() || '';
          const sub = document.getElementById('emailSub')?.value.trim() || '';
          const body = document.getElementById('emailBody')?.value.trim() || '';
          return `MATMSG:TO:${to};SUB:${sub};BODY:${body};;`;
        }
        case 'sms': {
          const num = document.getElementById('smsNum')?.value.trim() || '';
          const msg = document.getElementById('smsMsg')?.value.trim() || '';
          return `SMSTO:${num}:${msg}`;
        }
        case 'image': {
          const file = document.getElementById('imageUpload')?.files[0];
          if (!file) return alert('Please select an image.');
          // Read as data URL
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        }
        case 'batch': {
          // Not used directly; batch generation handled separately
          return '';
        }
        default: return '';
      }
    }

    // ---- Dynamic Inputs based on mode ----
    function renderInputFields(mode) {
      const area = document.getElementById('dynamicInputs');
      area.innerHTML = '';
      let html = '';
      switch(mode) {
        case 'url':
          html = `<div class="input-group"><label>URL or Text</label><textarea id="urlText" placeholder="https://...">https://pixelpress-smoky.vercel.app</textarea></div>`;
          break;
        case 'wifi':
          html = `<div class="input-group"><label>SSID</label><input id="ssid" value="MyWiFi"></div>
                  <div class="input-group"><label>Password</label><input id="wifiPass" value="password123"></div>
                  <div class="input-group"><label>Encryption</label><select id="wifiEnc"><option value="WPA" selected>WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>`;
          break;
        case 'vcard':
          html = `<div class="input-group"><label>Name</label><input id="vName" value="Ahmed Ali"></div>
                  <div class="input-group"><label>Phone</label><input id="vPhone" value="+966501234567"></div>
                  <div class="input-group"><label>Email</label><input id="vEmail" value=""></div>`;
          break;
        case 'email':
          html = `<div class="input-group"><label>To</label><input id="emailTo" value="hello@example.com"></div>
                  <div class="input-group"><label>Subject</label><input id="emailSub" value="Hello"></div>
                  <div class="input-group"><label>Body</label><textarea id="emailBody"></textarea></div>`;
          break;
        case 'sms':
          html = `<div class="input-group"><label>Phone</label><input id="smsNum" value="+966501234567"></div>
                  <div class="input-group"><label>Message</label><textarea id="smsMsg"></textarea></div>`;
          break;
        case 'image':
          html = `<div class="input-group"><label>Select image (small)</label><input type="file" id="imageUpload" accept="image/*"><div class="note">Will be encoded as data URL (very small images only)</div></div>`;
          break;
        case 'batch':
          html = `<div class="input-group"><label>Enter multiple URLs/texts (one per line)</label><textarea id="batchInput" placeholder="https://example.com&#10;https://another.com&#10;Hello World"></textarea></div>
                  <button onclick="generateBatch()" class="btn-primary" style="width:100%"><i class="fa-solid fa-layer-group"></i> Generate Batch</button>
                  <div id="batchProgress" class="note"></div>`;
          break;
      }
      area.innerHTML = html;

      // Attach listeners
      area.querySelectorAll('input, textarea, select').forEach(el => {
        el.addEventListener('input', () => {
          if (mode !== 'batch') updateQR();
        });
      });
      if (mode === 'image') {
        document.getElementById('imageUpload')?.addEventListener('change', () => {
          // Re-read data URL and update QR
          const file = document.getElementById('imageUpload').files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
              if (qrCode) {
                qrCode.update({ data: e.target.result });
              }
            };
            reader.readAsDataURL(file);
          }
        });
      }
      if (mode !== 'batch') updateQR();
    }

    // ---- Tab switching ----
    document.querySelectorAll('#contentTabs .tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('#contentTabs .tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const mode = this.dataset.mode;
        renderInputFields(mode);
      });
    });

    // ---- Style change listeners ----
    document.getElementById('dotStyle').addEventListener('change', updateQR);
    document.getElementById('cornerStyle').addEventListener('change', updateQR);
    document.getElementById('color1').addEventListener('input', function() {
      document.getElementById('color1Hex').textContent = this.value;
      updateQR();
    });
    document.getElementById('color2').addEventListener('input', function() {
      document.getElementById('color2Hex').textContent = this.value;
      updateQR();
    });
    document.getElementById('bgColor').addEventListener('input', updateQR);
    document.getElementById('margin').addEventListener('input', function() {
      document.getElementById('marginVal').textContent = this.value;
      updateQR();
    });
    document.getElementById('ecLevel').addEventListener('change', updateQR);

    // Logo upload
    document.getElementById('logoUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        if (qrCode) {
          qrCode.update({ image: ev.target.result });
        }
      };
      reader.readAsDataURL(file);
    });

    // ---- Download ----
    function downloadQR(format) {
      if (!qrCode) return;
      const ext = format === 'jpeg' ? 'jpg' : format;
      qrCode.download({ name: `qr-${Date.now()}`, extension: ext });
    }

    // ---- Presets Save/Load ----
    function savePreset() {
      const preset = {
        dotStyle: document.getElementById('dotStyle').value,
        cornerStyle: document.getElementById('cornerStyle').value,
        color1: document.getElementById('color1').value,
        color2: document.getElementById('color2').value,
        bgColor: document.getElementById('bgColor').value,
        margin: document.getElementById('margin').value,
        ecLevel: document.getElementById('ecLevel').value,
      };
      localStorage.setItem('qr-preset', JSON.stringify(preset));
      alert('Design saved!');
    }

    function loadPreset() {
      const saved = localStorage.getItem('qr-preset');
      if (!saved) return alert('No saved design found.');
      const p = JSON.parse(saved);
      document.getElementById('dotStyle').value = p.dotStyle;
      document.getElementById('cornerStyle').value = p.cornerStyle;
      document.getElementById('color1').value = p.color1;
      document.getElementById('color2').value = p.color2;
      document.getElementById('bgColor').value = p.bgColor;
      document.getElementById('margin').value = p.margin;
      document.getElementById('ecLevel').value = p.ecLevel;
      document.getElementById('color1Hex').textContent = p.color1;
      document.getElementById('color2Hex').textContent = p.color2;
      document.getElementById('marginVal').textContent = p.margin;
      updateQR();
    }

    // ---- Batch Generation with ZIP ----
    async function generateBatch() {
      const textarea = document.getElementById('batchInput');
      if (!textarea) return;
      const lines = textarea.value.split('\n').filter(line => line.trim() !== '');
      if (lines.length === 0) return alert('Enter at least one line.');
      if (lines.length > 50) return alert('Maximum 50 codes in batch.');

      const progress = document.getElementById('batchProgress');
      progress.textContent = `Generating ${lines.length} codes...`;

      const zip = new JSZip();
      const promises = lines.map((text, index) => {
        return new Promise((resolve) => {
          // Create a temporary QRCodeStyling instance for each
          const tempQR = new QRCodeStyling({
            ...defaultOptions,
            data: text,
            width: 300,
            height: 300,
            margin: 10,
          });
          tempQR.getRawData('png').then(blob => {
            zip.file(`qr-${index + 1}.png`, blob);
            resolve();
          }).catch(() => resolve());
        });
      });

      await Promise.all(promises);
      const content = await zip.generateAsync({ type: 'blob' });
      saveAs(content, 'qr-batch.zip');
      progress.textContent = 'Done! ZIP downloaded.';
    }

    // ---- Theme ----
    function syncTheme() {
      const saved = localStorage.getItem('pixelpress-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }
    document.getElementById('themeToggle').addEventListener('click', () => {
      const curr = document.documentElement.getAttribute('data-theme');
      const next = curr === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pixelpress-theme', next);
    });

    // Init
    window.addEventListener('DOMContentLoaded', () => {
      syncTheme();
      initQR();
      renderInputFields('url');
      // Apply saved preset if exists
      if (localStorage.getItem('qr-preset')) {
        loadPreset();
      }
    });
  </script>
</body>
</html>
