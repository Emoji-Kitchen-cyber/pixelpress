<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator - PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    [data-theme="dark"] body { background: #09090e; color: #e8e8f0; }
    nav {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      padding: 0 2rem; height: 64px; display: flex; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.06); position: sticky; top: 0;
    }
    [data-theme="dark"] nav { background: rgba(21,21,30,0.7); border-color: rgba(255,255,255,0.08); }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      text-transform: uppercase; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .container {
      max-width: 800px; margin: 3rem auto; padding: 2rem; flex: 1;
    }
    h1 {
      font-size: 2rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .input-group {
      display: flex; gap: 10px; margin-bottom: 2rem;
    }
    input {
      flex: 1; padding: 12px 16px; border: 1px solid #ddd;
      border-radius: 12px; font-size: 15px; outline: none;
    }
    button {
      background: #ec4899; color: white; border: none;
      padding: 12px 24px; border-radius: 12px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    #qrcode {
      display: flex; justify-content: center; padding: 2rem;
      background: white; border-radius: 16px;
    }
    [data-theme="dark"] #qrcode { background: #1e1e2e; }
    .download-btn {
      display: none; margin: 1rem auto; text-align: center;
    }
    .back-link {
      display: inline-block; margin-top: 2rem; color: #ec4899;
      text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <nav>
    <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
  </nav>
  
  <div class="container">
    <h1>QR Code Generator</h1>
    <div class="input-group">
      <input type="text" id="qrText" placeholder="Enter text or URL..." />
      <button onclick="generateQR()">Generate</button>
    </div>
    <div id="qrcode"></div>
    <div class="download-btn" id="downloadBtn">
      <button onclick="downloadQR()">Download QR Code</button>
    </div>
    <a href="./index.html" class="back-link">← Back to Tools</a>
  </div>

  <script>
    let qrInstance = null;
    
    function generateQR() {
      const text = document.getElementById('qrText').value.trim();
      if (!text) return alert('Please enter text or URL');
      
      document.getElementById('qrcode').innerHTML = '';
      qrInstance = new QRCode(document.getElementById('qrcode'), {
        text: text,
        width: 256,
        height: 256,
        colorDark: '#000000',
        colorLight: '#ffffff'
      });
      document.getElementById('downloadBtn').style.display = 'block';
    }

    function downloadQR() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) return;
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Sync theme with parent
    const theme = localStorage.getItem('pixelpress-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
