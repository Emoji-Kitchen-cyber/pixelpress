<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Background Changer - Safe for your website</title>
  <style>
    /* Yeh styles sirf is page par apply hongi, baaki site ko nahi chhedti */
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      text-align: center;
    }
    canvas, img {
      max-width: 100%;
      margin-top: 1rem;
      border: 1px solid #ccc;
    }
    .controls {
      margin: 1rem 0;
    }
    input, select, button {
      margin: 0.3rem;
    }
  </style>
</head>
<body>
  <h2>🖼️ Background Remover & Changer</h2>

  <div>
    <input type="file" id="imageInput" accept="image/*" />
  </div>

  <div class="controls">
    <label>Naya background:</label>
    <select id="bgType">
      <option value="color">Solid Color</option>
      <option value="image">Image URL</option>
    </select>

    <input type="color" id="bgColor" value="#00aaff" />
    <input type="text" id="bgImageUrl" placeholder="Image URL yahan paste karein" style="display:none;" />
  </div>

  <button id="processBtn">Change Background</button>
  <p id="status"></p>

  <div>
    <h3>Result:</h3>
    <img id="outputImage" />
  </div>

  <!-- Library ko CDN se lao – isse koi server load nahi, aur model 404 ki tension nahi -->
  <script src="https://unpkg.com/@imgly/background-removal@1.7.0/dist/index.umd.js"></script>

  <script>
    (function() {
      // poora code apne private scope mein, kisi global variable ko touch nahi karta
      const bgType = document.getElementById('bgType');
      const bgColor = document.getElementById('bgColor');
      const bgImageUrl = document.getElementById('bgImageUrl');

      bgType.addEventListener('change', function() {
        if (bgType.value === 'color') {
          bgColor.style.display = 'inline';
          bgImageUrl.style.display = 'none';
        } else {
          bgColor.style.display = 'none';
          bgImageUrl.style.display = 'inline';
        }
      });

      document.getElementById('processBtn').addEventListener('click', async function() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('status');
        const outputImg = document.getElementById('outputImage');

        if (!fileInput.files.length) {
          alert('Pehle ek image select karein.');
          return;
        }

        status.textContent = 'Processing... (thoda wait karein)';
        outputImg.src = '';

        try {
          // Library UMD global se access kar rahe hain, but IIFE ke andar safe hai
          const { removeBackground } = window.imglyBackgroundRemoval;
          const image = fileInput.files[0];
          let background;

          if (bgType.value === 'color') {
            background = bgColor.value;
          } else {
            const url = bgImageUrl.value.trim();
            if (!url) throw new Error('Background image ka URL daalein');
            const response = await fetch(url);
            if (!response.ok) throw new Error('Background image load nahi hui');
            background = await response.blob();
          }

          const resultBlob = await removeBackground(image, {
            model: 'medium',
            output: {
              format: 'image/png',
              background: background
            }
          });

          outputImg.src = URL.createObjectURL(resultBlob);
          status.textContent = 'Ho gaya!';
        } catch (err) {
          status.textContent = 'Error: ' + err.message;
          console.error(err);
        }
      });
    })(); // IIFE yahan khatam
  </script>
</body>
</html>
