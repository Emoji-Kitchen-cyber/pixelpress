<html lang="en" data-theme="dark">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Background Remover – PixelPress</title>
  <meta name="description" content="Remove image background online free. Bulk upload, instant download, no signup.">
  <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/index.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --bg: #f5f5f7;
      --surface: rgba(255,255,255,0.75);
      --card: #ffffff;
      --border: rgba(0,0,0,0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236,72,153,0.1);
      --green: #10b981;
      --red: #ef4444;
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21,21,30,0.7);
      --card: #15151e;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236,72,153,0.25);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:var(--fbody); min-height:100vh; display:flex; flex-direction:column; transition: background 0.3s,color 0.3s; }
    nav { position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(1rem,5vw,3rem); height:64px; background:var(--surface); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .nav-left { display:flex; align-items:center; gap:1rem; }
    .back-btn { background:var(--card); border:1px solid var(--border); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:1.1rem; cursor:pointer; text-decoration:none; transition:0.2s; }
    .back-btn:hover { border-color:var(--accent); transform:scale(1.05); }
    .nav-logo { font-family:var(--fhead); font-weight:800; font-size:1.25rem; text-transform:uppercase; text-decoration:none; color:inherit; }
    .nav-logo span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .main { flex:1; max-width:1200px; margin:0 auto; width:100%; padding:2rem 20px; }
    .hero { text-align:center; margin-bottom:2.5rem; }
    .hero h1 { font-family:var(--fhead); font-size:clamp(2rem,5vw,2.8rem); font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero p { color:var(--muted); font-size:1rem; max-width:580px; margin:0 auto; }
    .mode-switch { display:flex; justify-content:center; gap:6px; margin-bottom:1.5rem; }
    .mode-btn { padding:10px 24px; border-radius:999px; background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600; transition:0.2s; }
    .mode-btn.active { background:var(--accent); color:white; border-color:var(--accent); }
    .drop-zone { border:2px dashed var(--border); border-radius:var(--r); padding:3rem; text-align:center; cursor:pointer; transition:0.2s; background:var(--card); margin-bottom:1.5rem; }
    .drop-zone:hover { border-color:var(--accent); background:var(--glow); }
    .drop-zone i { font-size:2.5rem; color:var(--accent); }
    .drop-zone input { display:none; }
    .settings-bar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 16px; margin-bottom:1rem; }
    .setting-group { display:flex; align-items:center; gap:6px; font-size:0.85rem; }
    .setting-group label { color:var(--muted); white-space:nowrap; }
    .setting-group select, .setting-group input[type=range], .setting-group input[type=color] { background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:0.8rem; }
    .btn { padding:10px 20px; border:none; border-radius:10px; font-weight:600; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:6px; font-size:0.85rem; }
    .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 20px var(--glow); }
    .btn-success { background:var(--green); color:white; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
    .btn-danger { background:var(--red); color:white; }
    .btn:disabled { opacity:0.5; pointer-events:none; }
    .progress-bar { height:6px; background:var(--border); border-radius:10px; margin-bottom:0.5rem; display:none; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); width:0%; border-radius:10px; transition:width 0.3s; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; display:flex; flex-direction:column; animation:fadeUp 0.3s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .card-image { position:relative; aspect-ratio:1/1; background:repeating-conic-gradient(#80808020 0% 25%, transparent 0% 50%) 50% / 16px 16px; }
    .card-image img { width:100%; height:100%; object-fit:contain; position:absolute; top:0; left:0; }
    .card-original { z-index:1; clip-path:inset(0 50% 0 0); }
    .card-result { z-index:0; }
    .card-slider { position:absolute; top:0; bottom:0; width:4px; background:var(--accent); left:50%; cursor:ew-resize; z-index:2; }
    .card-badge { position:absolute; top:8px; right:8px; padding:2px 10px; border-radius:999px; font-size:0.7rem; font-weight:600; z-index:3; }
    .badge-queue { background:rgba(107,107,128,0.15); color:var(--muted); }
    .badge-processing { background:rgba(236,72,153,0.15); color:var(--accent); }
    .badge-done { background:rgba(16,185,129,0.15); color:var(--green); }
    .badge-fail { background:rgba(239,68,68,0.15); color:var(--red); }
    .card-actions { padding:10px; display:flex; flex-direction:column; gap:6px; flex:1; }
    .filename { font-size:0.75rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-row { display:flex; gap:6px; flex-wrap:wrap; }
    .btn-small { padding:6px 10px; font-size:0.75rem; border-radius:6px; }
    .refine-overlay { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; }
    .refine-panel { background:var(--card); border-radius:var(--r); padding:1.5rem; max-width:90vw; max-height:90vh; display:flex; flex-direction:column; gap:1rem; position:relative; }
    .refine-canvas-container { position:relative; }
    .refine-canvas-container canvas { max-width:100%; max-height:60vh; border-radius:12px; }
    .refine-tools { display:flex; gap:8px; align-items:center; }
    .refine-tools button { padding:8px 14px; }
    .close-btn { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--text); font-size:1.2rem; cursor:pointer; }
    footer { text-align:center; padding:2rem; color:var(--muted); font-size:0.85rem; border-top:1px solid var(--border); margin-top:auto; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <div class="hero">
      <h1>AI Background Remover</h1>
      <p>Remove backgrounds instantly. Manual refine brush for perfect cutouts. 100% private.</p>
    </div>

    <div class="mode-switch" id="modeSwitch">
      <button class="mode-btn active" data-mode="fast">⚡ Fast (Edge Fill)</button>
      <button class="mode-btn" data-mode="ai">🧠 Precise (AI)</button>
    </div>

    <div class="drop-zone" id="dropZone">
      <i class="fa-solid fa-cloud-upload"></i>
      <h2>Drop images or click to upload</h2>
      <p style="color:var(--muted); margin-top:0.5rem;">JPG, PNG, WebP – multiple at once</p>
      <input type="file" id="fileInput" accept="image/*" multiple />
    </div>

    <div class="settings-bar" id="settingsBar" style="display:none;">
      <div class="setting-group">
        <label>Tolerance</label>
        <input type="range" id="tolerance" min="10" max="130" value="40">
        <span id="toleranceVal">40</span>
      </div>
      <div class="setting-group">
        <label>Feather</label>
        <input type="range" id="feather" min="0" max="5" value="2">
        <span id="featherVal">2</span>
      </div>
      <div class="setting-group">
        <label>Replace BG</label>
        <select id="bgMode">
          <option value="transparent">Transparent</option>
          <option value="white">White</option>
          <option value="black">Black</option>
          <option value="color">Custom Color</option>
          <option value="image">Custom Image</option>
        </select>
      </div>
      <div class="setting-group" id="bgColorGroup" style="display:none;">
        <input type="color" id="bgColor" value="#ffffff">
      </div>
      <div class="setting-group" id="bgImageGroup" style="display:none;">
        <input type="file" id="bgImageInput" accept="image/*">
      </div>
      <div class="setting-group">
        <label>Format</label>
        <select id="format">
          <option value="png">PNG</option>
          <option value="webp">WebP</option>
          <option value="jpg">JPG</option>
        </select>
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:1rem; flex-wrap:wrap;">
      <button class="btn btn-primary" id="processAllBtn">⚡ Remove All Backgrounds</button>
      <button class="btn btn-success" id="downloadZipBtn" disabled>⬇ Download All (ZIP)</button>
      <button class="btn btn-outline" id="addMoreBtn">+ Add More</button>
      <button class="btn btn-danger" id="clearAllBtn">✕ Clear All</button>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="grid" id="grid">
      <div id="emptyState" style="grid-column:1/-1; text-align:center; padding:3rem; color:var(--muted);">
        <i class="fa-solid fa-images" style="font-size:3rem; opacity:0.4;"></i>
        <p style="margin-top:1rem;">Upload images to start</p>
      </div>
    </div>
  </div>

  <!-- Refine modal -->
  <div class="refine-overlay" id="refineOverlay">
    <div class="refine-panel" id="refinePanel">
      <button class="close-btn" id="closeRefine">✕</button>
      <h3 style="font-family:var(--fhead);">Manual Refine</h3>
      <div class="refine-canvas-container">
        <canvas id="refineCanvas"></canvas>
      </div>
      <div class="refine-tools">
        <button class="btn btn-outline btn-small" id="brushFg">🖌 Foreground</button>
        <button class="btn btn-outline btn-small" id="brushBg">🧹 Background</button>
        <span>Size:</span>
        <input type="range" id="brushSize" min="5" max="60" value="20">
        <button class="btn btn-primary btn-small" id="applyRefine">✅ Apply</button>
        <button class="btn btn-danger btn-small" id="cancelRefine">Cancel</button>
      </div>
    </div>
  </div>

  <footer>© 2026 PixelPress – No images leave your device</footer>

  <script>
    (function() {
      // Theme sync
      function syncTheme() {
        const saved = localStorage.getItem('pixelpress-theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pixelpress-theme', next);
      });
      syncTheme();

      // DOM elements
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const settingsBar = document.getElementById('settingsBar');
      const processAllBtn = document.getElementById('processAllBtn');
      const downloadZipBtn = document.getElementById('downloadZipBtn');
      const addMoreBtn = document.getElementById('addMoreBtn');
      const clearAllBtn = document.getElementById('clearAllBtn');
      const grid = document.getElementById('grid');
      const emptyState = document.getElementById('emptyState');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const modeBtns = document.querySelectorAll('#modeSwitch .mode-btn');
      const refineOverlay = document.getElementById('refineOverlay');
      const refineCanvas = document.getElementById('refineCanvas');
      const closeRefine = document.getElementById('closeRefine');
      const brushFg = document.getElementById('brushFg');
      const brushBg = document.getElementById('brushBg');
      const brushSizeInput = document.getElementById('brushSize');
      const applyRefine = document.getElementById('applyRefine');
      const cancelRefine = document.getElementById('cancelRefine');

      let items = [];
      let currentMode = 'fast';
      let refineItem = null;
      let refineMask = null;
      let refineOrigImage = null;
      let refineBrushType = 'fg';
      let isRefineDrawing = false;

      const toleranceInput = document.getElementById('tolerance');
      const toleranceVal = document.getElementById('toleranceVal');
      const featherInput = document.getElementById('feather');
      const featherVal = document.getElementById('featherVal');
      const bgModeSelect = document.getElementById('bgMode');
      const bgColorGroup = document.getElementById('bgColorGroup');
      const bgColorInput = document.getElementById('bgColor');
      const bgImageGroup = document.getElementById('bgImageGroup');
      const bgImageInput = document.getElementById('bgImageInput');
      const formatSelect = document.getElementById('format');

      toleranceInput.addEventListener('input', () => toleranceVal.textContent = toleranceInput.value);
      featherInput.addEventListener('input', () => featherVal.textContent = featherInput.value);
      bgModeSelect.addEventListener('change', () => {
        bgColorGroup.style.display = bgModeSelect.value === 'color' ? 'flex' : 'none';
        bgImageGroup.style.display = bgModeSelect.value === 'image' ? 'flex' : 'none';
      });

      // Mode switch
      modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          modeBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
        });
      });

      // Upload handling
      dropZone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        addFiles([...e.target.files]);
        fileInput.value = '';
      });
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
      dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; });
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--border)';
        addFiles([...e.dataTransfer.files]);
      });
      addMoreBtn.addEventListener('click', () => fileInput.click());

      function addFiles(files) {
        const imageFiles = files.filter(f => f.type.startsWith('image/')).slice(0, 30 - items.length);
        if (!imageFiles.length) return;
        imageFiles.forEach(file => {
          const id = Date.now() + Math.random();
          const url = URL.createObjectURL(file);
          items.push({
            id, file, url, status: 'queue',
            resultBlob: null,
            resultUrl: null,
            showOriginal: false,
            originalImage: null,
          });
        });
        settingsBar.style.display = 'flex';
        renderGrid();
        updateStats();
      }

      function renderCard(item) {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'card-' + item.id;
        card.innerHTML = `
          <div class="card-image" id="imgContainer-${item.id}">
            <img class="card-original" src="${item.url}" id="origImg-${item.id}" />
            <img class="card-result" id="resImg-${item.id}" style="display:none;" />
            <div class="card-slider" id="slider-${item.id}" style="display:none;"></div>
            <span class="card-badge badge-queue" id="badge-${item.id}">Queue</span>
          </div>
          <div class="card-actions">
            <span class="filename">${item.file.name}</span>
            <div class="btn-row">
              <button class="btn btn-outline btn-small" id="dlBtn-${item.id}" disabled>⬇</button>
              <button class="btn btn-outline btn-small" id="refineBtn-${item.id}" disabled>🖊 Refine</button>
              <button class="btn btn-outline btn-small" id="compareBtn-${item.id}" disabled>👁 Compare</button>
              <button class="btn btn-outline btn-small" id="resetBtn-${item.id}" disabled>↩</button>
              <button class="btn btn-danger btn-small" id="rmBtn-${item.id}">✕</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
        const slider = document.getElementById('slider-' + item.id);
        if (slider) {
          let dragging = false;
          slider.addEventListener('mousedown', () => dragging = true);
          window.addEventListener('mouseup', () => dragging = false);
          window.addEventListener('mousemove', (e) => {
            if (!dragging || slider.style.display !== 'block') return;
            const container = document.getElementById('imgContainer-' + item.id);
            if (!container) return;
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = Math.min(100, Math.max(0, (x / rect.width) * 100));
            document.getElementById('origImg-' + item.id).style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
            slider.style.left = percent + '%';
          });
        }
      }

      function renderGrid() {
        grid.innerHTML = '';
        items.forEach(item => renderCard(item));
        if (items.length === 0) {
          grid.appendChild(emptyState);
          settingsBar.style.display = 'none';
        }
        updateStats();
      }

      function updateStats() {
        const done = items.filter(i => i.status === 'done').length;
        downloadZipBtn.disabled = done === 0;
      }

      processAllBtn.addEventListener('click', async () => {
        if (!items.length) return;
        processAllBtn.disabled = true;
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        const queue = items.filter(i => i.status === 'queue' || i.status === 'fail');
        for (let i = 0; i < queue.length; i++) {
          const item = queue[i];
          item.status = 'processing';
          updateBadge(item);
          try {
            if (currentMode === 'fast') {
              const opts = {
                tol: parseInt(toleranceInput.value),
                fea: parseInt(featherInput.value),
                bgm: bgModeSelect.value,
                bgc: bgColorInput.value,
                bgImage: bgImageInput.files[0] || null,
                fmt: formatSelect.value
              };
              const blob = await processWithEdgeFill(item.url, opts);
              item.resultBlob = blob;
              item.resultUrl = URL.createObjectURL(blob);
              item.status = 'done';
            } else {
              const blob = await processWithAI(item.url);
              item.resultBlob = blob;
              item.resultUrl = URL.createObjectURL(blob);
              item.status = 'done';
            }
          } catch (e) {
            item.status = 'fail';
            console.error(e);
          }
          updateBadge(item);
          updateCardButtons(item);
          if (item.status === 'done') {
            document.getElementById('resImg-' + item.id).src = item.resultUrl;
            document.getElementById('resImg-' + item.id).style.display = 'block';
            document.getElementById('slider-' + item.id).style.display = 'block';
          }
          progressFill.style.width = ((i + 1) / queue.length * 100) + '%';
        }
        processAllBtn.disabled = false;
        downloadZipBtn.disabled = !items.some(i => i.status === 'done');
        setTimeout(() => progressBar.style.display = 'none', 2000);
      });

      function updateBadge(item) {
        const badge = document.getElementById('badge-' + item.id);
        if (!badge) return;
        badge.className = 'card-badge';
        switch (item.status) {
          case 'queue': badge.classList.add('badge-queue'); badge.textContent = 'Queue'; break;
          case 'processing': badge.classList.add('badge-processing'); badge.textContent = 'Processing...'; break;
          case 'done': badge.classList.add('badge-done'); badge.textContent = '✓ Done'; break;
          case 'fail': badge.classList.add('badge-fail'); badge.textContent = 'Failed'; break;
        }
      }

      function updateCardButtons(item) {
        const dlBtn = document.getElementById('dlBtn-' + item.id);
        const refineBtn = document.getElementById('refineBtn-' + item.id);
        const compareBtn = document.getElementById('compareBtn-' + item.id);
        const resetBtn = document.getElementById('resetBtn-' + item.id);
        const slider = document.getElementById('slider-' + item.id);
        if (item.status === 'done') {
          dlBtn.disabled = false;
          refineBtn.disabled = false;
          compareBtn.disabled = false;
          resetBtn.disabled = false;
          if (slider) slider.style.display = 'block';
        }
        dlBtn.onclick = () => downloadSingle(item);
        refineBtn.onclick = () => openRefine(item);
        compareBtn.onclick = () => toggleCompare(item);
        resetBtn.onclick = () => resetItem(item);
        document.getElementById('rmBtn-' + item.id).onclick = () => removeItem(item);
      }

      function downloadSingle(item) {
        if (!item.resultUrl) return;
        const ext = formatSelect.value === 'jpg' ? 'jpg' : formatSelect.value;
        const link = document.createElement('a');
        link.download = item.file.name.replace(/\.[^/.]+$/, '') + '_nobg.' + ext;
        link.href = item.resultUrl;
        link.click();
      }

      function toggleCompare(item) {
        item.showOriginal = !item.showOriginal;
        const origImg = document.getElementById('origImg-' + item.id);
        const resImg = document.getElementById('resImg-' + item.id);
        if (item.showOriginal) {
          origImg.style.clipPath = 'inset(0 0 0 0)';
          resImg.style.display = 'none';
        } else {
          origImg.style.clipPath = 'inset(0 50% 0 0)';
          resImg.style.display = 'block';
        }
      }

      function resetItem(item) {
        item.status = 'queue';
        item.resultBlob = null;
        item.resultUrl = null;
        item.showOriginal = false;
        document.getElementById('resImg-' + item.id).style.display = 'none';
        document.getElementById('slider-' + item.id).style.display = 'none';
        updateBadge(item);
        updateCardButtons(item);
        downloadZipBtn.disabled = true;
      }

      function removeItem(item) {
        URL.revokeObjectURL(item.url);
        if (item.resultUrl) URL.revokeObjectURL(item.resultUrl);
        items = items.filter(i => i.id !== item.id);
        const card = document.getElementById('card-' + item.id);
        if (card) card.remove();
        if (items.length === 0) {
          grid.appendChild(emptyState);
          settingsBar.style.display = 'none';
        }
        updateStats();
      }

      clearAllBtn.addEventListener('click', () => {
        items.forEach(item => {
          URL.revokeObjectURL(item.url);
          if (item.resultUrl) URL.revokeObjectURL(item.resultUrl);
        });
        items = [];
        grid.innerHTML = '';
        grid.appendChild(emptyState);
        settingsBar.style.display = 'none';
        progressBar.style.display = 'none';
        updateStats();
      });

      downloadZipBtn.addEventListener('click', async () => {
        const done = items.filter(i => i.status === 'done' && i.resultBlob);
        if (!done.length) return;
        const zip = new JSZip();
        const ext = formatSelect.value === 'jpg' ? 'jpg' : formatSelect.value;
        done.forEach(item => {
          const name = item.file.name.replace(/\.[^/.]+$/, '') + '_nobg.' + ext;
          zip.file(name, item.resultBlob);
        });
        const content = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pixelpress_nobg.zip';
        a.click();
        URL.revokeObjectURL(url);
      });

      // ================================================
      // FIXED EDGE-FILL BACKGROUND REMOVAL ALGORITHM
      // ================================================
      function processWithEdgeFill(imageUrl, opts) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => {
            try {
              const canvas = document.createElement('canvas');
              canvas.width = img.naturalWidth;
              canvas.height = img.naturalHeight;
              const ctx = canvas.getContext('2d', { willReadFrequently: true });
              ctx.drawImage(img, 0, 0);
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const { tol, fea, bgm, bgc, bgImage } = opts;
              const W = canvas.width, H = canvas.height;
              const d = imageData.data;

              // 1. Sample background from edges
              const samples = [
                [0,0], [W-1,0], [0,H-1], [W-1,H-1],
                [Math.floor(W/2),0], [Math.floor(W/2),H-1],
                [0,Math.floor(H/2)], [W-1,Math.floor(H/2)]
              ];
              let r=0,g=0,b=0;
              samples.forEach(([x,y]) => {
                const i = (y*W + x) * 4;
                r += d[i]; g += d[i+1]; b += d[i+2];
              });
              const bgR = r/samples.length, bgG = g/samples.length, bgB = b/samples.length;

              // 2. Flood-fill mask from edges
              const mask = new Uint8Array(W * H);  // 0=unvisited, 1=background, 2=foreground
              const queue = [];
              function enq(x, y) {
                if (x < 0 || x >= W || y < 0 || y >= H) return;
                const idx = y * W + x;
                if (mask[idx] !== 0) return;
                const pi = idx * 4;
                const dr = d[pi] - bgR, dg = d[pi+1] - bgG, db = d[pi+2] - bgB;
                if (Math.sqrt(dr*dr + dg*dg + db*db) <= tol) {
                  mask[idx] = 1; // background
                  queue.push(x, y);
                } else {
                  mask[idx] = 2; // foreground
                }
              }
              for (let x = 0; x < W; x++) { enq(x, 0); enq(x, H-1); }
              for (let y = 1; y < H-1; y++) { enq(0, y); enq(W-1, y); }

              let qi = 0;
              while (qi < queue.length) {
                const cx = queue[qi++], cy = queue[qi++];
                enq(cx-1, cy); enq(cx+1, cy); enq(cx, cy-1); enq(cx, cy+1);
              }

              // 3. Set any remaining unvisited pixels as foreground (CRITICAL FIX)
              for (let i = 0; i < mask.length; i++) {
                if (mask[i] === 0) mask[i] = 2;
              }

              // 4. Feather mask
              if (fea > 0) {
                const tmp = new Uint8Array(W * H);
                for (let pass = 0; pass < fea; pass++) {
                  for (let y = 0; y < H; y++) {
                    for (let x = 0; x < W; x++) {
                      let sum = 0, cnt = 0;
                      for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                          const nx = x+dx, ny = y+dy;
                          if (nx >= 0 && nx < W && ny >= 0 && ny < H) {
                            sum += mask[ny*W + nx]; cnt++;
                          }
                        }
                      }
                      tmp[y*W + x] = Math.round(sum / cnt);
                    }
                  }
                  mask.set(tmp);
                }
              }

              // 5. Apply background
              applyBackground(canvas, ctx, imageData, mask, bgm, bgc, bgImage, () => {
                canvas.toBlob(blob => {
                  if (blob) resolve(blob);
                  else reject(new Error('Export failed'));
                }, 'image/' + (opts.fmt === 'jpg' ? 'jpeg' : opts.fmt));
              });
            } catch (e) { reject(e); }
          };
          img.onerror = reject;
          img.src = imageUrl;
        });
      }

      function applyBackground(canvas, ctx, imageData, mask, bgm, bgc, bgImage, callback) {
        const d = imageData.data;
        const W = canvas.width, H = canvas.height;
        if (bgm === 'transparent') {
          for (let i = 0; i < W * H; i++) {
            d[i*4+3] = mask[i] === 1 ? 0 : 255; // background transparent
          }
          ctx.putImageData(imageData, 0, 0);
          callback();
        } else if (bgm === 'white' || bgm === 'black' || bgm === 'color') {
          let bgR = 255, bgG = 255, bgB = 255;
          if (bgm === 'black') { bgR=0; bgG=0; bgB=0; }
          else if (bgm === 'color') {
            bgR = parseInt(bgc.slice(1,3), 16);
            bgG = parseInt(bgc.slice(3,5), 16);
            bgB = parseInt(bgc.slice(5,7), 16);
          }
          for (let i = 0; i < W * H; i++) {
            const alpha = mask[i] === 1 ? 0 : 255; // 1 = background
            const a = alpha / 255;
            d[i*4] = Math.round(d[i*4] * a + bgR * (1-a));
            d[i*4+1] = Math.round(d[i*4+1] * a + bgG * (1-a));
            d[i*4+2] = Math.round(d[i*4+2] * a + bgB * (1-a));
            d[i*4+3] = 255;
          }
          ctx.putImageData(imageData, 0, 0);
          callback();
        } else if (bgm === 'image' && bgImage) {
          const bgImg = new Image();
          bgImg.onload = () => {
            ctx.globalCompositeOperation = 'destination-over';
            ctx.drawImage(bgImg, 0, 0, W, H);
            ctx.globalCompositeOperation = 'source-over';
            ctx.putImageData(imageData, 0, 0);
            callback();
          };
          bgImg.src = URL.createObjectURL(bgImage);
        }
      }

      async function processWithAI(imageUrl) {
        const blob = await fetch(imageUrl).then(r => r.blob());
        const resultBlob = await window.removeBackground(blob, {
          model: 'medium',
          output: { format: 'image/png' }
        });
        return resultBlob;
      }

      // Refine modal functions (same as before)
      function openRefine(item) {
        if (!item.resultUrl) return;
        refineItem = item;
        refineOverlay.style.display = 'flex';
        const origImg = new Image();
        origImg.onload = () => {
          refineOrigImage = origImg;
          refineCanvas.width = origImg.naturalWidth;
          refineCanvas.height = origImg.naturalHeight;
          const ctx = refineCanvas.getContext('2d');
          ctx.drawImage(origImg, 0, 0);
          const tmpCanvas = document.createElement('canvas');
          tmpCanvas.width = origImg.width;
          tmpCanvas.height = origImg.height;
          const tmpCtx = tmpCanvas.getContext('2d');
          const resImg = new Image();
          resImg.onload = () => {
            tmpCtx.drawImage(resImg, 0, 0);
            const imgData = tmpCtx.getImageData(0, 0, tmpCanvas.width, tmpCanvas.height);
            refineMask = new Uint8Array(origImg.width * origImg.height);
            for (let i = 0; i < refineMask.length; i++) {
              refineMask[i] = imgData.data[i*4+3] > 128 ? 255 : 0;
            }
            drawRefineCanvas();
          };
          resImg.src = item.resultUrl;
        };
        origImg.src = item.url;
      }

      function drawRefineCanvas() {
        const ctx = refineCanvas.getContext('2d');
        ctx.drawImage(refineOrigImage, 0, 0);
        ctx.save();
        ctx.globalAlpha = 0.4;
        for (let y = 0; y < refineCanvas.height; y++) {
          for (let x = 0; x < refineCanvas.width; x++) {
            const idx = y * refineCanvas.width + x;
            if (refineMask[idx] === 0) {
              ctx.fillStyle = '#ff0000';
              ctx.fillRect(x, y, 1, 1);
            }
          }
        }
        ctx.restore();
      }

      function refinePaint(x, y) {
        if (!refineMask) return;
        const radius = Math.floor(parseInt(brushSizeInput.value) / 2);
        const val = refineBrushType === 'fg' ? 255 : 0;
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            const px = x + dx, py = y + dy;
            if (px < 0 || px >= refineCanvas.width || py < 0 || py >= refineCanvas.height) continue;
            refineMask[py * refineCanvas.width + px] = val;
          }
        }
        drawRefineCanvas();
      }

      refineCanvas.addEventListener('mousedown', (e) => {
        isRefineDrawing = true;
        const rect = refineCanvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (refineCanvas.width / rect.width));
        const y = Math.floor((e.clientY - rect.top) * (refineCanvas.height / rect.height));
        refinePaint(x, y);
      });
      window.addEventListener('mousemove', (e) => {
        if (!isRefineDrawing) return;
        const rect = refineCanvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) * (refineCanvas.width / rect.width));
        const y = Math.floor((e.clientY - rect.top) * (refineCanvas.height / rect.height));
        refinePaint(x, y);
      });
      window.addEventListener('mouseup', () => { isRefineDrawing = false; });

      brushFg.addEventListener('click', () => refineBrushType = 'fg');
      brushBg.addEventListener('click', () => refineBrushType = 'bg');

      applyRefine.addEventListener('click', () => {
        if (!refineItem || !refineMask) return;
        const canvas = document.createElement('canvas');
        canvas.width = refineCanvas.width;
        canvas.height = refineCanvas.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(refineOrigImage, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < refineMask.length; i++) {
          imageData.data[i*4+3] = refineMask[i] ? 255 : 0;
        }
        ctx.putImageData(imageData, 0, 0);
        canvas.toBlob(blob => {
          refineItem.resultBlob = blob;
          refineItem.resultUrl = URL.createObjectURL(blob);
          document.getElementById('resImg-' + refineItem.id).src = refineItem.resultUrl;
          refineOverlay.style.display = 'none';
        });
      });

      cancelRefine.addEventListener('click', () => { refineOverlay.style.display = 'none'; });
      closeRefine.addEventListener('click', () => { refineOverlay.style.display = 'none'; });

      renderGrid();
    })();
  </script>
