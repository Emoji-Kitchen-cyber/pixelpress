<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove BG</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        :root { --primary: #6366f1; }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            background: #0f172a; color: #e2e8f0;
        }
        .remove-bg-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }
        .title { font-size: 28px; font-weight: 700; margin: 0; }
        .upload-area {
            border: 3px dashed #475569;
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            background: #1e2937;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: #334155;
        }
        .files-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        .file-card {
            background: #1e2937;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        .preview-container { position: relative; height: 220px; background: #0f172a; }
        .preview { width: 100%; height: 100%; object-fit: contain; }
        .processing-overlay {
            position: absolute; inset: 0;
            background: rgba(15,23,42,0.95);
            display: none; align-items: center; justify-content: center;
            flex-direction: column; color: white; z-index: 10;
        }
        button {
            padding: 10px 20px;
            border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .result-panel {
            display: none; margin-top: 30px;
            border: 1px solid #334155; border-radius: 16px;
            overflow: hidden; background: #1e2937;
        }
        .slider-container { position: relative; height: 420px; background: #0f172a; }
        .before-after { position: absolute; inset: 0; overflow: hidden; }
        .before, .after { position: absolute; top: 0; height: 100%; }
        .before { left: 0; width: 50%; }
        .after { left: 50%; width: 50%; }
        .slider-divider {
            position: absolute; top: 0; left: 50%;
            width: 4px; height: 100%; background: white;
            cursor: ew-resize; z-index: 10;
        }
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%);
            background: #1e2937; color: white;
            padding: 14px 24px; border-radius: 8px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            display: none; z-index: 10000;
            border-left: 4px solid #22c55e;
        }
    </style>
</head>
<body>
    <div class="remove-bg-container">
        <div class="header">
            <div>
                <h1 class="title">✂️ Background Remover</h1>
                <p class="subtitle">Stable Browser Version</p>
            </div>
            <div id="status" style="color:#22c55e;">✅ Ready</div>
        </div>

        <div id="upload-area" class="upload-area">
            <div style="font-size:52px;margin-bottom:16px;">📤</div>
            <h3>Drop images here or click</h3>
            <p style="color:#64748b;">JPG, PNG, WEBP • Max 10</p>
            <input type="file" id="file-input" multiple accept="image/*" style="display:none;">
        </div>

        <div style="display:flex; gap:12px; margin:20px 0; flex-wrap:wrap;">
            <button onclick="RemoveBG.processAll()" class="btn-primary" id="process-all-btn" disabled>Process All</button>
            <button onclick="RemoveBG.clearAll()" class="btn-secondary">Clear All</button>
            <button onclick="RemoveBG.downloadAll()" class="btn-primary" id="download-all-btn" style="display:none;">Download ZIP</button>
        </div>

        <div id="files-list" class="files-list"></div>

        <div id="result-panel" class="result-panel">
            <div style="padding:16px 20px;background:#0f172a;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;">
                <strong id="current-file-name"></strong>
                <div>
                    <button onclick="RemoveBG.closeResult()" class="btn-secondary">Close</button>
                    <button onclick="RemoveBG.downloadCurrent()" class="btn-primary" style="margin-left:8px;">Download</button>
                </div>
            </div>
            <div class="slider-container">
                <div id="before-after" class="before-after">
                    <div id="before-img" class="before"><img id="original-preview" style="width:100%;height:100%;object-fit:contain;"></div>
                    <div id="after-img" class="after"><img id="processed-preview" style="width:100%;height:100%;object-fit:contain;"></div>
                    <div id="slider-divider" class="slider-divider"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/remove-bg.js"></script>
</body>
</html>
