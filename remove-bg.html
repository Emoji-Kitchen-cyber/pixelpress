<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remove Background – PixelPress</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    /* Reusing existing .tool-page, .upload-zone etc. from your style.css */
    .tool-page { max-width: 900px; margin: 40px auto; padding: 20px; }
    .workflow-step { background: #fff; border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #e5e7eb; }
    .comparison-slider { position: relative; width: 100%; max-width: 500px; margin: 20px auto; overflow: hidden; border-radius: 12px; }
    .comparison-slider img { display: block; width: 100%; }
    .img-after { position: absolute; top: 0; left: 0; clip-path: inset(0 50% 0 0); }
    .slider-handle { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: #fff; cursor: ew-resize; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    .handle-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
    .bg-options { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
    .bg-options label { font-weight: 600; display: block; margin-bottom: 5px; }
    #batchProgress { margin-top: 15px; display: none; }
    progress { width: 100%; height: 10px; }
  </style>
</head>
<body>
  <div class="tool-page">
    <h1>🫥 AI Background Remover</h1>
    <div class="workflow-step" id="uploadStep">
      <h2>Upload Images</h2>
      <div class="upload-zone" id="dropZone">
        <p>📁 Drop images here or click to browse</p>
        <small>JPG, PNG, WEBP – max 10 files</small>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple hidden>
      <div id="queuePreview" style="display:flex; gap:10px; margin-top:15px; flex-wrap:wrap;"></div>
      <div id="batchProgress"><progress id="progressBar" max="100" value="0"></progress> <span id="progressText"></span></div>
    </div>

    <div class="workflow-step" id="settingsStep" style="display:none;">
      <h2>Processed Results</h2>
      <div id="resultGrid" style="display:flex; flex-wrap:wrap; gap:15px;"></div>
      <div style="margin-top:20px; text-align:center;">
        <button id="downloadAllBtn" class="btn-primary" disabled>📦 Download All as ZIP</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/@imgly/background-removal@1.4.5/dist/index.umd.js"></script>
  <script src="./js/remove-bg.js"></script>
</body>
</html>
