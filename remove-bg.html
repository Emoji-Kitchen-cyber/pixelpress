<!DOCTYPE html>    
<html lang="en">    
<head>    
  <meta charset="UTF-8" />    
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />    
  <title>Remove Background – PixelPress</title>    
  <link rel="stylesheet" href="./css/style.css" />    
  <style>    
    .tool-page { max-width: 1000px; margin: 40px auto; padding: 20px; }    
    .workflow-step { background: #fff; border-radius: 16px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #e5e7eb; }    
    .upload-zone {    
      border: 2px dashed #d1d5db; border-radius: 12px; padding: 48px 24px; text-align: center;    
      cursor: pointer; transition: 0.2s; color: #6b7280;    
    }    
    .upload-zone:hover, .upload-zone.dragover { border-color: #2563eb; background: rgba(37,99,235,0.03); }    
    .progress-container { display: none; margin-top: 20px; }    
    progress { width: 100%; height: 12px; border-radius: 6px; }    
    .result-card { width: 220px; border-radius: 12px; overflow: hidden; background: #f8fafc; box-shadow: 0 2px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }    
    .comparison-slider { 
      position: relative; 
      width: 100%; 
      height: 200px; 
      overflow: hidden; 
      /* Transparent checkerboard background pattern */
      background-color: #343a40;
      background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }    
    .comparison-slider img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }    
    .comparison-slider .img-after { clip-path: inset(0 50% 0 0); z-index: 1; }    
    .slider-handle { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: #2563eb; cursor: ew-resize; z-index: 2; }    
    .handle-circle {    
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);    
      width: 32px; height: 32px; background: #2563eb; color: #fff; border-radius: 50%;    
      box-shadow: 0 2px 8px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;    
      font-size: 14px; z-index: 3; font-weight: bold; pointer-events: none;
    }    
    .bg-options { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }    
    .bg-option-card { background: #f1f5f9; padding: 12px; border-radius: 12px; flex: 1 1 180px; }    
    .bg-option-card label { display: block; font-weight: 600; margin-bottom: 6px; }    
    .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }    
    .loading-overlay {    
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;    
      background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center;    
      z-index: 9999; flex-direction: column; gap: 15px; font-size: 18px; font-weight: 600;    
    }    
    .fallback-btn { margin-top: 10px; background: #e2e8f0; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }    
    @media (max-width: 600px) { .result-card { width: 100%; } }    
  </style>    
</head>    
<body>      
  <div class="loading-overlay" id="loadingOverlay" style="display:none;">    
    <p id="loadingMsg">Loading AI model…</p>    
    <progress id="modelProgress" max="100" value="0"></progress>    
    <p id="loadingSubMsg" style="font-size:14px; color:#64748b;"></p>    
    <button id="fallbackBtn" class="fallback-btn" style="display:none;">Try Manual Removal</button>    
  </div>      
  
  <div class="tool-page">    
    <h1>🫥 Advanced Background Remover</h1>    
    <p style="margin-bottom:20px; color:#64748b;">Remove backgrounds in seconds. Replace with colours, gradients, blur, or custom images.</p>    
    
    <div class="workflow-step">    
      <h2>1. Upload Images</h2>    
      <div class="upload-zone" id="dropZone">    
        <p>📁 Drop up to 10 images here or click to browse</p>    
        <small>JPG, PNG, WEBP</small>    
      </div>    
      <input type="file" id="fileInput" accept="image/*" multiple hidden />    
      <div class="progress-container" id="progressContainer">    
        <progress id="batchProgress" max="100" value="0"></progress>    
        <p id="progressStatus" style="text-align:center; margin-top:8px;"></p>    
      </div>    
    </div>    

    <div class="workflow-step" id="resultsSection" style="display:none;">    
      <h2>2. Customize & Download</h2>    
      <div class="bg-options">    
        <div class="bg-option-card">    
          <label>Background Type</label>    
          <select id="bgType">    
            <option value="transparent">Transparent (PNG)</option>    
            <option value="solid">Solid Colour</option>    
            <option value="gradient">Gradient (2 colours)</option>    
            <option value="blur">Blur Original</option>    
            <option value="custom">Custom Image</option>    
          </select>    
        </div>    
        <div class="bg-option-card" id="solidColorCard" style="display:none;">    
          <label>Colour</label>    
          <input type="color" id="solidColor" value="#ffffff" />    
        </div>    
        <div class="bg-option-card" id="gradientCard" style="display:none;">    
          <label>Gradient From / To</label>    
          <div style="display:flex; gap:5px; align-items:center;">    
            <input type="color" id="gradStart" value="#ff9a9e" />    
            <span>→</span>    
            <input type="color" id="gradEnd" value="#fad0c4" />    
          </div>    
        </div>    
        <div class="bg-option-card" id="customBgCard" style="display:none;">    
          <label>Background Image</label>    
          <input type="file" id="customBgFile" accept="image/*" />    
        </div>    
        <div class="bg-option-card" id="blurCard" style="display:none;">    
          <label>Blur Amount</label>    
          <input type="range" id="blurAmount" min="0" max="20" value="8" step="1" />    
          <span id="blurValue">8px</span>    
        </div>    
        <div class="bg-option-card">    
          <label>Edge Feather (px)</label>    
          <input type="range" id="feather" min="0" max="10" value="0" step="0.5" />    
          <span id="featherValue">0</span>    
        </div>    
        <div class="bg-option-card">    
          <label>Output Format</label>    
          <select id="outputFormat">    
            <option value="image/png">PNG</option>    
            <option value="image/jpeg">JPEG</option>    
            <option value="image/webp">WebP</option>    
          </select>    
        </div>    
      </div>    

      <div id="resultGrid" style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;"></div>    
      <div class="btn-group" style="justify-content:center;">    
        <button id="applyBgBtn" class="btn-primary">Apply Background to All</button>    
        <button id="downloadAllBtn" class="btn-primary" disabled>📦 Download All as ZIP</button>    
      </div>    
    </div>
  </div>      
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>      
  <script type="module" src="./js/remove-bg.js"></script>    
</body>    
</html>
