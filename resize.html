<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resize Image – PixelPress</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="main-header">
    <a href="/" class="logo">🎨 PixelPress</a>
    <nav><a href="/" class="btn-outline">← All Tools</a></nav>
  </header>
  <div class="tool-page">
    <h1>📐 Resize Image</h1>
    <div class="workflow-step" id="upload-step">
      <h2>1. Upload Image</h2>
      <div class="upload-zone" id="resizeUploadZone">
        <div class="icon">📁</div>
        <p>Drop image here</p>
      </div>
      <input type="file" id="resizeFileInput" accept="image/*" hidden>
    </div>
    <div class="workflow-step" id="settings-step" style="display:none">
      <h2>2. New Dimensions</h2>
      <div class="settings-grid">
        <div class="form-group">
          <label>Width (px)</label>
          <input type="number" id="resizeWidth" value="800" min="1">
        </div>
        <div class="form-group">
          <label>Height (px)</label>
          <input type="number" id="resizeHeight" value="600" min="1">
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="lockAspect" checked> Lock aspect ratio</label>
        </div>
        <button id="resizeBtn" class="btn-primary">Resize</button>
      </div>
    </div>
    <div class="workflow-step" id="processing-step" style="display:none">
      <h2>Processing...</h2>
      <div class="processing-bar"><div class="spinner"></div><p>Resizing...</p></div>
    </div>
    <div class="workflow-step" id="result-step" style="display:none">
      <h2>Result</h2>
      <div class="preview-container">
        <div class="preview-box"><p>Original</p><img id="originalPreview"></div>
        <div class="preview-box"><p>Resized</p><img id="resizedPreview"></div>
      </div>
      <div class="download-section">
        <button id="downloadBtn" class="btn-primary">📥 Download Resized Image</button>
      </div>
    </div>
  </div>
  <script src="/js/common.js"></script>
  <script src="/js/resize.js"></script>
</body>
</html>
