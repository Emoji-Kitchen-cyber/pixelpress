<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resize Image – PixelPress</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {font-family: 'Segoe UI', sans-serif; background: #f9fafb; margin:0; padding:20px;}
        .container {max-width: 1100px; margin:0 auto; background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); overflow:hidden;}
        .header {background:linear-gradient(135deg, #8b5cf6, #6d28d9); color:white; padding:25px; text-align:center;}
        .step {display:none; padding:30px;}
        .step.active {display:block;}
        .upload-zone {border:4px dashed #cbd5e1; border-radius:16px; padding:80px 20px; text-align:center; cursor:pointer;}
        .upload-zone:hover {border-color:#8b5cf6; background:#f3e8ff;}
        .preview-img {max-width:100%; max-height:450px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.15);}
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>📏 Resize Image</h1></div>

        <!-- Upload -->
        <div id="upload-step" class="step active">
            <h2 style="text-align:center;">Upload Image</h2>
            <div id="resizeUploadZone" class="upload-zone">
                <h3>Drop Image Here</h3>
                <p>or click to browse</p>
            </div>
            <input type="file" id="resizeFileInput" accept="image/*" style="display:none;">
        </div>

        <!-- Settings -->
        <div id="settings-step" class="step">
            <h2>Resize Settings</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin:20px 0;">
                <div>
                    <label>Width (px)</label>
                    <input type="number" id="widthInput" style="width:100%; padding:12px; border-radius:8px;">
                </div>
                <div>
                    <label>Height (px)</label>
                    <input type="number" id="heightInput" style="width:100%; padding:12px; border-radius:8px;">
                </div>
            </div>
            <label><input type="checkbox" id="aspectLock" checked> Maintain Aspect Ratio</label><br><br>
            <button id="resizeBtn" style="width:100%; padding:16px; background:#8b5cf6; color:white; border:none; border-radius:12px; font-size:18px;">Resize Image</button>
        </div>

        <!-- Processing -->
        <div id="processing-step" class="step"><h2 style="text-align:center;">⏳ Resizing...</h2></div>

        <!-- Result -->
        <div id="result-step" class="step">
            <h2 style="text-align:center; color:#10b981;">✅ Resized Successfully!</h2>
            <img id="resizedPreview" class="preview-img">
            <div style="text-align:center; margin-top:25px;">
                <button id="downloadResizeBtn" style="background:#10b981; color:white; padding:16px 40px; border:none; border-radius:12px; font-size:18px;">Download Image</button>
                <button onclick="location.reload()" style="margin-left:10px; background:#6b7280; color:white; padding:16px 30px; border:none; border-radius:12px;">New Image</button>
            </div>
        </div>
    </div>

    <script src="../js/resize.js"></script>
</body>
</html>
