<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resize Image — PixelPress</title>

  <style>
    :root { --primary: #ec4899; --text-dark: #0f172a; --bg-main: #f8fafc; }
    body { font-family: system-ui, sans-serif; background: var(--bg-main); color: var(--text-dark); padding: 20px; }
    .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .upload-area { border: 2px dashed #cbd5e1; padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; margin-bottom: 20px; }
    .controls { display: none; margin-bottom: 20px; }
    .controls.active { display: block; }
    input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
    .btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #previewImg { max-width: 100%; margin-top: 15px; border-radius: 8px; display: none; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; }
  </style>
</head>
<body>

  <div class="container">
    <h2 style="text-align: center; margin-bottom: 20px;">Resize Image</h2>
    
    <div class="upload-area" id="dropZone">
      <p>Click to select image</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none" />
    </div>

    <div class="controls" id="controlsPanel">
      <input type="number" id="widthInput" placeholder="Width (px)">
      <input type="number" id="heightInput" placeholder="Height (px)">
      <button class="btn" id="resizeBtn">Resize & Download</button>
    </div>

    <img id="previewImg" alt="Preview">
  </div>
  <div class="toast" id="toastBox"></div>

  <script>
    const fileInput = document.getElementById('fileInput'), dropZone = document.getElementById('dropZone');
    const controls = document.getElementById('controlsPanel'), resizeBtn = document.getElementById('resizeBtn');
    let selectedImage = null;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      selectedImage = file;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        const preview = document.getElementById('previewImg');
        preview.src = e.target.result;
        preview.style.display = 'block';
        controls.classList.add('active');
      };
      reader.readAsDataURL(file);
    };

    resizeBtn.onclick = () => {
      const w = document.getElementById('widthInput').value;
      const h = document.getElementById('heightInput').value;
      if (!w || !h) return showToast('Enter width and height!');

      const img = new Image();
      img.src = document.getElementById('previewImg').src;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        
        // Final Download Logic
        const link = document.createElement('a');
        link.download = 'resized-image.png';
        link.href = canvas.toDataURL(selectedImage.type);
        link.click();
        showToast('Resizing complete, download started!');
      };
    };

    function showToast(msg) {
      const t = document.getElementById('toastBox');
      t.innerText = msg; t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }
  </script>
</body>
</html>
