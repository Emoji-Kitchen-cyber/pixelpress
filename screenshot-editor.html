<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screenshot Editor – PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
    :root {
      --bg: #f5f5f7; --surface: rgba(255,255,255,0.75); --card: #ffffff;
      --border: rgba(0,0,0,0.06); --text: #1d1d1f; --muted: #6e6e73;
      --accent: #ec4899; --accent2: #a78bfa;
    }
    [data-theme="dark"] {
      --bg: #09090e; --surface: rgba(21,21,30,0.7); --card: #15151e;
      --border: rgba(255,255,255,0.08); --text: #e8e8f0; --muted: #86868b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; transition:0.3s; }
    nav { position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(1rem,5vw,3rem); height:64px; background:var(--surface); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .nav-left { display:flex; align-items:center; gap:1rem; }
    .back-btn { background:var(--card); border:1px solid var(--border); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:1.1rem; cursor:pointer; text-decoration:none; transition:0.2s; }
    .back-btn:hover { border-color:var(--accent); transform:scale(1.05); }
    .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.25rem; text-transform:uppercase; text-decoration:none; color:inherit; }
    .nav-logo span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .main { flex:1; max-width:1100px; margin:0 auto; width:100%; padding:1.5rem 20px; display:grid; grid-template-columns:1fr 340px; gap:2rem; }
    @media(max-width:850px) { .main { grid-template-columns:1fr; } }
    .preview { background:var(--card); border:1px solid var(--border); border-radius:16px; display:flex; align-items:center; justify-content:center; min-height:400px; }
    canvas { max-width:100%; height:auto; }
    .controls { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:1.5rem; display:flex; flex-direction:column; gap:1.2rem; height:fit-content; }
    .section-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:800; }
    .input-group { display:flex; flex-direction:column; gap:4px; }
    label { font-size:0.8rem; font-weight:600; color:var(--muted); text-transform:uppercase; }
    select, input[type="range"], input[type="color"] { width:100%; padding:8px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:var(--text); }
    .btn { padding:10px 18px; border-radius:8px; border:none; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:0.9rem; transition:0.2s; background:var(--card); color:var(--text); border:1px solid var(--border); }
    .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border:none; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(236,72,153,0.3); }
    footer { text-align:center; padding:2rem; color:var(--muted); font-size:0.85rem; border-top:1px solid var(--border); margin-top:auto; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>
  <div class="main">
    <div class="preview">
      <canvas id="canvas" width="800" height="600"></canvas>
    </div>
    <div class="controls">
      <div class="section-title">Screenshot Editor</div>
      <div class="input-group">
        <label>Upload Screenshot</label>
        <button class="btn" onclick="document.getElementById('screenInput').click()"><i class="fa-solid fa-upload"></i> Choose</button>
        <input type="file" id="screenInput" accept="image/*" hidden />
      </div>
      <div class="input-group">
        <label>Device Frame</label>
        <select id="frameSelect">
          <option value="none">Clean Shadow</option>
          <option value="iphone">iPhone 14</option>
          <option value="macbook">MacBook Pro</option>
          <option value="browser">Browser Window</option>
        </select>
      </div>
      <div class="input-group">
        <label>Background</label>
        <select id="bgType">
          <option value="gradient">Gradient</option>
          <option value="solid">Solid Color</option>
          <option value="image">Custom Image</option>
        </select>
      </div>
      <div id="solidPicker" class="input-group hidden"><label>Color</label><input type="color" id="bgColor" value="#0f172a" /></div>
      <div id="gradientPicker" class="input-group">
        <label>Gradient Style</label>
        <select id="gradientStyle">
          <option value="sunset">Sunset</option>
          <option value="ocean">Ocean</option>
          <option value="midnight">Midnight</option>
        </select>
      </div>
      <div id="imageUploader" class="input-group hidden">
        <button class="btn" onclick="document.getElementById('bgImageInput').click()"><i class="fa-solid fa-image"></i> Upload Background</button>
        <input type="file" id="bgImageInput" accept="image/*" hidden />
      </div>
      <div class="input-group">
        <label>Padding</label>
        <input type="range" id="padding" min="20" max="120" value="60" />
      </div>
      <div class="input-group">
        <label>Shadow</label>
        <input type="range" id="shadow" min="0" max="50" value="20" />
      </div>
      <button class="btn btn-primary" id="exportBtn"><i class="fa-solid fa-download"></i> Export</button>
      <select id="exportFormat">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="webp">WebP</option>
      </select>
    </div>
  </div>
  <footer>© 2026 PixelPress – Screenshot Editor</footer>

  <script>
    (function() {
      function syncTheme() {
        const saved = localStorage.getItem('pixelpress-theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pixelpress-theme', next);
      });
      syncTheme();

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      let screenshot = null, bgImage = null;
      let bgType = 'gradient', bgColor = '#0f172a', gradientStyle = 'sunset';
      let frame = 'none', padding = 60, shadow = 20;

      function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        // Background
        if (bgType === 'solid') {
          ctx.fillStyle = document.getElementById('bgColor').value;
          ctx.fillRect(0,0,canvas.width,canvas.height);
        } else if (bgType === 'gradient') {
          const style = document.getElementById('gradientStyle').value;
          let grad = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
          if (style === 'sunset') { grad.addColorStop(0, '#f43f5e'); grad.addColorStop(1, '#eab308'); }
          else if (style === 'ocean') { grad.addColorStop(0, '#06b6d4'); grad.addColorStop(1, '#3b82f6'); }
          else { grad.addColorStop(0, '#1e1e24'); grad.addColorStop(1, '#0f0f15'); }
          ctx.fillStyle = grad;
          ctx.fillRect(0,0,canvas.width,canvas.height);
        } else if (bgType === 'image' && bgImage) {
          ctx.drawImage(bgImage, 0,0,canvas.width,canvas.height);
        }
        if (!screenshot) return;
        // Frame dimensions
        const pad = parseInt(document.getElementById('padding').value);
        let frameW = canvas.width - pad*2, frameH = canvas.height - pad*2;
        let x = pad, y = pad;
        if (frame === 'iphone') {
          // Draw phone frame
          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = shadow;
          ctx.fillStyle = '#1a1a1a';
          ctx.beginPath();
          ctx.roundRect(x, y, frameW, frameH, 40);
          ctx.fill();
          ctx.restore();
          // Screen area
          const screenPad = 15;
          ctx.drawImage(screenshot, x+screenPad, y+screenPad, frameW-screenPad*2, frameH-screenPad*2);
        } else if (frame === 'macbook') {
          // laptop lid
          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = shadow;
          ctx.fillStyle = '#2c2c2e';
          ctx.beginPath();
          ctx.roundRect(x, y, frameW, frameH*0.9, 20);
          ctx.fill();
          ctx.restore();
          ctx.drawImage(screenshot, x+15, y+10, frameW-30, frameH*0.9-20);
        } else if (frame === 'browser') {
          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = shadow;
          ctx.fillStyle = '#e5e7eb';
          ctx.beginPath();
          ctx.roundRect(x, y, frameW, frameH, 12);
          ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(x+10, y+30, frameW-20, frameH-40);
          ctx.restore();
          ctx.drawImage(screenshot, x+15, y+35, frameW-30, frameH-50);
        } else {
          // clean shadow
          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = shadow;
          ctx.drawImage(screenshot, x, y, frameW, frameH);
          ctx.restore();
        }
      }

      document.getElementById('screenInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          screenshot = new Image();
          screenshot.onload = () => draw();
          screenshot.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('frameSelect').addEventListener('change', e => { frame = e.target.value; draw(); });
      document.getElementById('bgType').addEventListener('change', e => {
        bgType = e.target.value;
        document.getElementById('solidPicker').classList.toggle('hidden', bgType!=='solid');
        document.getElementById('gradientPicker').classList.toggle('hidden', bgType!=='gradient');
        document.getElementById('imageUploader').classList.toggle('hidden', bgType!=='image');
        draw();
      });
      document.getElementById('bgColor').addEventListener('input', () => draw());
      document.getElementById('gradientStyle').addEventListener('change', () => draw());
      document.getElementById('bgImageInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          bgImage = new Image();
          bgImage.onload = () => draw();
          bgImage.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
      document.getElementById('padding').addEventListener('input', draw);
      document.getElementById('shadow').addEventListener('input', draw);

      document.getElementById('exportBtn').addEventListener('click', () => {
        const format = document.getElementById('exportFormat').value;
        const mime = format === 'jpeg' ? 'image/jpeg' : format === 'webp' ? 'image/webp' : 'image/png';
        const a = document.createElement('a');
        a.download = `pixelpress-mockup.${format}`;
        a.href = canvas.toDataURL(mime, 0.92);
        a.click();
      });

      // Initial draw
      draw();
    })();
  </script>
</body>
</html>
