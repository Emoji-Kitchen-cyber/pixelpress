<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split PDF - PixelPress</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif; background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    [data-theme="dark"] body { background: #09090e; color: #e8e8f0; }
    nav {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      padding: 0 2rem; height: 64px; display: flex; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    [data-theme="dark"] nav { background: rgba(21,21,30,0.7); border-color: rgba(255,255,255,0.08); }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      text-transform: uppercase; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .container { max-width: 800px; margin: 2rem auto; padding: 2rem; flex: 1; }
    h1 {
      font-size: 2rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .upload-area {
      border: 2px dashed #ddd; border-radius: 16px; padding: 3rem;
      text-align: center; cursor: pointer; margin: 1.5rem 0;
      transition: border-color 0.3s;
    }
    [data-theme="dark"] .upload-area { border-color: #333; }
    .upload-area:hover { border-color: #ec4899; }
    input[type="file"] { display: none; }
    button {
      background: #ec4899; color: white; border: none;
      padding: 12px 24px; border-radius: 12px; font-weight: 600;
      cursor: pointer; margin-top: 1rem; transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .download-links { margin-top: 1.5rem; }
    .download-links a {
      display: block; padding: 10px; background: white; margin-bottom: 8px;
      border-radius: 10px; color: #ec4899; text-decoration: none;
    }
    [data-theme="dark"] .download-links a { background: #1e1e2e; }
    .back-link { display: inline-block; margin-top: 1rem; color: #ec4899; text-decoration: none; font-weight: 600; }
    .progress { color: #6e6e73; margin-top: 8px; }
  </style>
</head>
<body>
  <nav>
    <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
  </nav>

  <div class="container">
    <h1>Split PDF</h1>
    <p>Upload a PDF and each page will be extracted as a separate PDF file.</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <i class="fa-solid fa-cloud-upload" style="font-size:3rem;color:#ec4899;"></i>
      <p id="uploadText">Click to upload PDF or drag & drop</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(event)" />
    
    <button id="splitBtn" onclick="splitPDF()" disabled>Split PDF</button>
    <div class="progress" id="progress"></div>
    <div class="download-links" id="downloadLinks"></div>
    <a href="./index.html" class="back-link">← Back to Tools</a>
  </div>

  <script>
    let pdfBytes = null;
    let fileName = '';

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file || file.type !== 'application/pdf') {
        alert('Please upload a PDF file');
        return;
      }
      fileName = file.name.replace('.pdf', '');
      document.getElementById('uploadText').textContent = `Selected: ${file.name}`;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        pdfBytes = new Uint8Array(e.target.result);
        document.getElementById('splitBtn').disabled = false;
      };
      reader.readAsArrayBuffer(file);
    }

    async function splitPDF() {
      if (!pdfBytes) return;
      
      const btn = document.getElementById('splitBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      
      try {
        const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
        const totalPages = pdfDoc.getPageCount();
        const downloadDiv = document.getElementById('downloadLinks');
        downloadDiv.innerHTML = '';
        
        for (let i = 0; i < totalPages; i++) {
          const newDoc = await PDFLib.PDFDocument.create();
          const [copiedPage] = await newDoc.copyPages(pdfDoc, [i]);
          newDoc.addPage(copiedPage);
          
          const pdfData = await newDoc.save();
          const blob = new Blob([pdfData], { type: 'application/pdf' });
          const url = URL.createObjectURL(blob);
          
          downloadDiv.innerHTML += `
            <a href="${url}" download="${fileName}_page_${i + 1}.pdf">
              📄 Page ${i + 1} — Download
            </a>`;
          
          document.getElementById('progress').textContent = 
            `Processed ${i + 1} of ${totalPages} pages...`;
        }
        
        document.getElementById('progress').textContent = 
          `✓ Successfully split ${totalPages} pages!`;
      } catch (error) {
        alert('Error splitting PDF: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Split PDF';
      }
    }

    // Drag and drop support
    const uploadArea = document.querySelector('.upload-area');
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#ec4899';
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#ddd';
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#ddd';
      const file = e.dataTransfer.files[0];
      if (file) {
        const input = document.getElementById('fileInput');
        const dt = new DataTransfer();
        dt.items.add(file);
        input.files = dt.files;
        handleEvent({ target: input });
      }
    });

    function handleEvent(e) { handleFile(e); }

    const theme = localStorage.getItem('pixelpress-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
