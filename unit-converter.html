<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter – PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');
    :root {
      --bg: #f5f5f7; --surface: rgba(255,255,255,0.75); --card: #ffffff;
      --border: rgba(0,0,0,0.06); --text: #1d1d1f; --muted: #6e6e73;
      --accent: #ec4899; --accent2: #a78bfa; --glow: rgba(236,72,153,0.1); --r: 16px;
    }
    [data-theme="dark"] {
      --bg: #09090e; --surface: rgba(21,21,30,0.7); --card: #15151e;
      --border: rgba(255,255,255,0.08); --text: #e8e8f0; --muted: #86868b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; transition:0.3s; }
    nav { position:sticky; top:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 clamp(1rem,5vw,3rem); height:64px; background:var(--surface); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .nav-left { display:flex; align-items:center; gap:1rem; }
    .back-btn { background:var(--card); border:1px solid var(--border); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--text); font-size:1.1rem; cursor:pointer; text-decoration:none; transition:0.2s; }
    .back-btn:hover { border-color:var(--accent); transform:scale(1.05); }
    .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.25rem; text-transform:uppercase; text-decoration:none; color:inherit; }
    .nav-logo span { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .main { flex:1; max-width:700px; margin:0 auto; width:100%; padding:2rem 20px; }
    .tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:2rem; }
    .tab { padding:6px 14px; border-radius:999px; background:var(--card); border:1px solid var(--border); cursor:pointer; font-weight:600; font-size:0.8rem; white-space:nowrap; transition:0.2s; }
    .tab.active { background:var(--accent); color:white; border-color:var(--accent); }
    .converter { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
    @media(max-width:600px) { .converter { flex-direction:column; } }
    .input-box { flex:1; background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:1.2rem; display:flex; flex-direction:column; gap:8px; }
    .input-box input { width:100%; background:transparent; border:none; font-size:2rem; color:var(--text); outline:none; font-weight:600; }
    .input-box select { background:var(--bg); color:var(--text); border:1px solid var(--border); padding:8px; border-radius:8px; }
    .swap-btn { width:44px; height:44px; border-radius:50%; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); transition:0.2s; }
    .swap-btn:hover { color:var(--accent); }
    .rate { font-size:0.85rem; color:var(--muted); text-align:center; margin-bottom:1rem; }
    .actions { display:flex; gap:10px; margin-bottom:1.5rem; flex-wrap:wrap; }
    .btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-size:0.85rem; transition:0.2s; }
    .btn:hover { border-color:var(--accent); }
    .favorites, .history { margin-bottom:1.5rem; }
    .fav-item, .hist-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:var(--bg); border-radius:8px; margin-bottom:6px; font-size:0.9rem; }
    .fav-item i { cursor:pointer; color:var(--accent); }
    footer { text-align:center; padding:2rem; color:var(--muted); font-size:0.85rem; border-top:1px solid var(--border); margin-top:auto; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <div class="tabs" id="tabs">
      <button class="tab active" data-cat="length">Length</button>
      <button class="tab" data-cat="area">Area</button>
      <button class="tab" data-cat="volume">Volume</button>
      <button class="tab" data-cat="weight">Weight</button>
      <button class="tab" data-cat="temp">Temperature</button>
      <button class="tab" data-cat="speed">Speed</button>
      <button class="tab" data-cat="time">Time</button>
      <button class="tab" data-cat="digital">Digital</button>
    </div>

    <div class="converter">
      <div class="input-box">
        <input type="number" id="inputVal" value="1" step="any" />
        <select id="inputUnit"></select>
      </div>
      <div class="swap-btn" id="swapBtn"><i class="fa-solid fa-right-left"></i></div>
      <div class="input-box">
        <input type="text" id="outputVal" readonly />
        <select id="outputUnit"></select>
      </div>
    </div>
    <div class="rate" id="rateDisplay"></div>

    <div class="actions">
      <button class="btn" id="copyBtn"><i class="fa-solid fa-copy"></i> Copy</button>
      <button class="btn" id="favBtn"><i class="fa-regular fa-heart"></i> Favourite</button>
      <button class="btn" id="clearHistoryBtn"><i class="fa-solid fa-trash"></i> Clear History</button>
    </div>

    <div class="favorites" id="favorites"></div>
    <div class="history" id="history"></div>
  </div>

  <footer>© 2026 PixelPress – Unit Converter</footer>

  <script>
    (function() {
      // Theme
      function syncTheme() {
        const saved = localStorage.getItem('pixelpress-theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pixelpress-theme', next);
      });
      syncTheme();

      const unitsDB = {
        length: { meters:1, kilometers:0.001, centimeters:100, millimeters:1000, miles:0.000621371, yards:1.09361, feet:3.28084, inches:39.3701 },
        area: { sqmeters:1, sqkilometers:1e-6, sqcentimeters:10000, sqmiles:3.861e-7, acres:0.000247105, hectares:0.0001 },
        volume: { liters:1, milliliters:1000, cubicmeters:0.001, gallons:0.264172, quarts:1.05669, pints:2.11338, cups:4.22675 },
        weight: { kilograms:1, grams:1000, milligrams:1e6, pounds:2.20462, ounces:35.274, tons:0.001 },
        temp: { celsius:'C', fahrenheit:'F', kelvin:'K' },
        speed: { mps:1, kmph:3.6, mph:2.23694, knots:1.94384 },
        time: { seconds:1, minutes:1/60, hours:1/3600, days:1/86400, weeks:1/604800 },
        digital: { bytes:1, kilobytes:1/1024, megabytes:1/1048576, gigabytes:1/1073741824, terabytes:1/1099511627776 }
      };

      let currentCat = 'length';
      const inputVal = document.getElementById('inputVal');
      const outputVal = document.getElementById('outputVal');
      const inputUnit = document.getElementById('inputUnit');
      const outputUnit = document.getElementById('outputUnit');
      const rateDisplay = document.getElementById('rateDisplay');

      function populateUnits() {
        inputUnit.innerHTML = ''; outputUnit.innerHTML = '';
        const unitNames = Object.keys(unitsDB[currentCat]);
        unitNames.forEach((u,i) => {
          const option = `<option value="${u}">${u.charAt(0).toUpperCase()+u.slice(1)}</option>`;
          inputUnit.innerHTML += option;
          outputUnit.innerHTML += option;
        });
        if (outputUnit.options.length > 1) outputUnit.selectedIndex = 1;
        convert();
      }

      function convertTemp(val, from, to) {
        if (from === to) return val;
        let c = val;
        if (from === 'fahrenheit') c = (val - 32) * 5/9;
        else if (from === 'kelvin') c = val - 273.15;
        if (to === 'celsius') return c;
        if (to === 'fahrenheit') return c * 9/5 + 32;
        if (to === 'kelvin') return c + 273.15;
      }

      function convert() {
        const val = parseFloat(inputVal.value);
        if (isNaN(val)) { outputVal.value = ''; rateDisplay.textContent = ''; return; }
        const from = inputUnit.value, to = outputUnit.value;
        let result, rate;
        if (currentCat === 'temp') {
          result = convertTemp(val, from, to);
          rateDisplay.textContent = '';
        } else {
          const base = val / unitsDB[currentCat][from];
          result = base * unitsDB[currentCat][to];
          rate = unitsDB[currentCat][to] / unitsDB[currentCat][from];
          rateDisplay.textContent = `1 ${from} = ${rate.toPrecision(6)} ${to}`;
        }
        outputVal.value = Number.isInteger(result) ? result : parseFloat(result.toFixed(8));
        addToHistory(val, from, to, result);
      }

      function addToHistory(val, from, to, result) {
        const history = JSON.parse(localStorage.getItem('unitHistory') || '[]');
        history.unshift({ val, from, to, result, cat: currentCat, time: new Date().toISOString() });
        if (history.length > 20) history.pop();
        localStorage.setItem('unitHistory', JSON.stringify(history));
        renderHistory();
      }

      function renderHistory() {
        const histDiv = document.getElementById('history');
        const history = JSON.parse(localStorage.getItem('unitHistory') || '[]');
        if (history.length === 0) { histDiv.innerHTML = '<p style="color:var(--muted)">No history</p>'; return; }
        histDiv.innerHTML = history.slice(0,5).map((h,i) => `
          <div class="hist-item">
            <span>${h.val} ${h.from} → ${h.result} ${h.to} (${h.cat})</span>
            <i class="fa-solid fa-arrow-up-right-from-square" onclick="loadHistory(${i})"></i>
          </div>
        `).join('');
      }

      window.loadHistory = (index) => {
        const history = JSON.parse(localStorage.getItem('unitHistory') || '[]');
        if (index < history.length) {
          const h = history[index];
          currentCat = h.cat;
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelector(`[data-cat="${h.cat}"]`).classList.add('active');
          populateUnits();
          inputVal.value = h.val;
          inputUnit.value = h.from;
          outputUnit.value = h.to;
          convert();
        }
      };

      function addFavourite() {
        const favs = JSON.parse(localStorage.getItem('unitFavs') || '[]');
        const pair = { cat: currentCat, from: inputUnit.value, to: outputUnit.value };
        if (!favs.some(f => f.cat===pair.cat && f.from===pair.from && f.to===pair.to)) {
          favs.push(pair);
          localStorage.setItem('unitFavs', JSON.stringify(favs));
          renderFavs();
        }
      }

      function renderFavs() {
        const favDiv = document.getElementById('favorites');
        const favs = JSON.parse(localStorage.getItem('unitFavs') || '[]');
        if (favs.length === 0) { favDiv.innerHTML = ''; return; }
        favDiv.innerHTML = '<strong>Favourites</strong>' + favs.map((f,i) => `
          <div class="fav-item">
            <span>${f.from} → ${f.to} (${f.cat})</span>
            <i class="fa-solid fa-xmark" onclick="removeFav(${i})"></i>
          </div>
        `).join('');
      }

      window.removeFav = (index) => {
        const favs = JSON.parse(localStorage.getItem('unitFavs') || '[]');
        favs.splice(index,1);
        localStorage.setItem('unitFavs', JSON.stringify(favs));
        renderFavs();
      };

      document.getElementById('swapBtn').addEventListener('click', () => {
        const tmp = inputUnit.value;
        inputUnit.value = outputUnit.value;
        outputUnit.value = tmp;
        convert();
      });

      document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(outputVal.value).then(() => alert('Copied!'));
      });

      document.getElementById('favBtn').addEventListener('click', addFavourite);
      document.getElementById('clearHistoryBtn').addEventListener('click', () => {
        localStorage.removeItem('unitHistory');
        renderHistory();
      });

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          currentCat = e.target.dataset.cat;
          populateUnits();
        });
      });

      inputVal.addEventListener('input', convert);
      inputUnit.addEventListener('change', convert);
      outputUnit.addEventListener('change', convert);

      populateUnits();
      renderHistory();
      renderFavs();
    })();
  </script>
</body>
</html>
