<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener - PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f7; color: #1d1d1f;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    [data-theme="dark"] body { background: #09090e; color: #e8e8f0; }
    nav {
      background: rgba(255,255,255,0.75); backdrop-filter: blur(20px);
      padding: 0 2rem; height: 64px; display: flex; align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    [data-theme="dark"] nav { background: rgba(21,21,30,0.7); border-color: rgba(255,255,255,0.08); }
    .nav-logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem;
      text-transform: uppercase; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .container {
      max-width: 700px; margin: 3rem auto; padding: 2rem; flex: 1;
    }
    h1 {
      font-size: 2rem; margin-bottom: 1rem;
      background: linear-gradient(135deg, #ec4899, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .input-group {
      display: flex; gap: 10px; margin-bottom: 2rem;
    }
    input {
      flex: 1; padding: 12px 16px; border: 1px solid #ddd;
      border-radius: 12px; font-size: 15px; outline: none;
    }
    [data-theme="dark"] input { background: #1e1e2e; color: #e8e8f0; border-color: #333; }
    button {
      background: #ec4899; color: white; border: none;
      padding: 12px 24px; border-radius: 12px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    .result-box {
      background: white; padding: 20px; border-radius: 12px;
      margin-top: 1rem; display: none;
    }
    [data-theme="dark"] .result-box { background: #1e1e2e; }
    .short-url {
      font-size: 1.2rem; color: #ec4899; word-break: break-all;
      font-family: 'JetBrains Mono', monospace;
    }
    .history {
      margin-top: 2rem;
    }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; background: white; margin-bottom: 8px;
      border-radius: 10px; font-size: 14px;
    }
    [data-theme="dark"] .history-item { background: #1e1e2e; }
    .back-link {
      display: inline-block; margin-top: 1rem; color: #ec4899;
      text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
  <nav>
    <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
  </nav>

  <div class="container">
    <h1>URL Shortener</h1>
    <p style="margin-bottom:1.5rem; color:#6e6e73;">Shorten long URLs instantly — all processing happens locally in your browser.</p>
    <div class="input-group">
      <input type="url" id="longUrl" placeholder="Enter long URL..." />
      <button onclick="shortenURL()">Shorten</button>
    </div>
    
    <div class="result-box" id="resultBox">
      <strong>Shortened URL:</strong>
      <div class="short-url" id="shortUrlDisplay"></div>
      <button onclick="copyURL()" style="margin-top:10px; background:#a78bfa;">
        <i class="fa-solid fa-copy"></i> Copy
      </button>
    </div>

    <div class="history" id="historySection">
      <h3 style="margin-bottom:12px;">Recent Shortcuts</h3>
      <div id="historyList"></div>
    </div>
    
    <a href="./index.html" class="back-link">← Back to Tools</a>
  </div>

  <script>
    let currentShortURL = '';

    function shortenURL() {
      const longUrl = document.getElementById('longUrl').value.trim();
      if (!longUrl) return alert('Please enter a URL');
      
      try {
        new URL(longUrl);
      } catch {
        return alert('Please enter a valid URL (include http:// or https://)');
      }

      // Generate short ID using browser-native crypto
      const array = new Uint8Array(6);
      crypto.getRandomValues(array);
      const shortId = Array.from(array, byte => byte.toString(36).padStart(2, '0')).join('');
      
      currentShortURL = `${window.location.origin}/s/${shortId}`;
      
      // Store in localStorage
      const history = JSON.parse(localStorage.getItem('pixelpress_urls') || '[]');
      history.unshift({ long: longUrl, short: currentShortURL, id: shortId, time: new Date().toLocaleString() });
      localStorage.setItem('pixelpress_urls', JSON.stringify(history.slice(0, 20))); // Keep last 20
      localStorage.setItem(`redirect_${shortId}`, longUrl);

      document.getElementById('shortUrlDisplay').textContent = currentShortURL;
      document.getElementById('resultBox').style.display = 'block';
      renderHistory();
    }

    function copyURL() {
      navigator.clipboard.writeText(currentShortURL).then(() => {
        alert('URL copied to clipboard!');
      });
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('pixelpress_urls') || '[]');
      const list = document.getElementById('historyList');
      list.innerHTML = history.length ? '' : '<p style="color:#6e6e73;">No shortened URLs yet.</p>';
      history.forEach(item => {
        list.innerHTML += `
          <div class="history-item">
            <div>
              <strong>${item.short}</strong><br>
              <small style="color:#6e6e73;">${item.long.substring(0, 50)}... · ${item.time}</small>
            </div>
            <button onclick="copyText('${item.short}')" style="padding:6px 12px; font-size:12px;">
              <i class="fa-solid fa-copy"></i>
            </button>
          </div>`;
      });
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => alert('Copied!'));
    }

    // Handle redirects when user visits /s/shortId
    if (window.location.pathname.startsWith('/s/')) {
      const shortId = window.location.pathname.split('/s/')[1];
      const longUrl = localStorage.getItem(`redirect_${shortId}`);
      if (longUrl) {
        window.location.href = longUrl;
      } else {
        document.body.innerHTML = '<div style="text-align:center;padding:4rem;"><h2>URL not found</h2><p>This shortened URL doesn\'t exist or has expired.</p><a href="./index.html">Go Home</a></div>';
      }
    }

    renderHistory();
    const theme = localStorage.getItem('pixelpress-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
  </script>
</body>
</html>
