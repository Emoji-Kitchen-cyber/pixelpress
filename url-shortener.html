<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener - PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.75);
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236, 72, 153, 0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21, 21, 30, 0.7);
      --card: #15151e;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236, 72, 153, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--fbody);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }

    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      letter-spacing: -0.5px; text-transform: uppercase;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .main {
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 20px 5rem;
    }

    .tool-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .tool-header h1 {
      font-family: var(--fhead);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
    }
    .tool-header p { color: var(--muted); font-size: 1.05rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .input-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 1.05rem;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--glow);
      outline: none;
    }

    .result {
      margin-top: 2rem;
      padding: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: none;
    }
    .short-url {
      font-family: monospace;
      font-size: 1.1rem;
      word-break: break-all;
      padding: 12px;
      background: var(--card);
      border-radius: 8px;
      margin: 12px 0;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    button {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px var(--glow);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <div class="tool-header">
      <h1>URL Shortener</h1>
      <p>Make long URLs short and clean</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label>Enter Long URL</label>
        <input type="url" id="longUrl" placeholder="https://very-long-url-example.com/very/long/path?with=parameters" />
      </div>

      <div class="btn-group">
        <button onclick="shortenURL()" class="btn-primary">
          <i class="fa-solid fa-link"></i> Shorten URL
        </button>
      </div>

      <div id="result" class="result">
        <p><strong>Shortened URL:</strong></p>
        <div class="short-url" id="shortUrlDisplay"></div>
        <button onclick="copyShortUrl()" class="btn-primary" style="width:100%; margin-top:10px;">
          <i class="fa-solid fa-copy"></i> Copy Short URL
        </button>
      </div>
    </div>
  </div>

  <footer>© 2026 PixelPress — Client-side only</footer>

  <script>
    function syncTheme() {
      const saved = localStorage.getItem('pixelpress-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pixelpress-theme', next);
    });

    // Simple hash-based shortener (client-side)
    function generateShortCode(url) {
      let hash = 0;
      for (let i = 0; i < url.length; i++) {
        hash = (hash << 5) - hash + url.charCodeAt(i);
        hash = hash & hash;
      }
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let short = "";
      let num = Math.abs(hash);
      while (short.length < 8) {
        short += chars[num % chars.length];
        num = Math.floor(num / chars.length);
      }
      return short;
    }

    function shortenURL() {
      const longUrl = document.getElementById('longUrl').value.trim();
      const resultDiv = document.getElementById('result');
      const shortDisplay = document.getElementById('shortUrlDisplay');

      if (!longUrl) {
        alert("Please enter a valid URL");
        return;
      }

      if (!longUrl.startsWith('http')) {
        alert("Please enter a full URL starting with http:// or https://");
        return;
      }

      const shortCode = generateShortCode(longUrl);
      const shortUrl = window.location.origin + "/s/" + shortCode;

      shortDisplay.textContent = shortUrl;
      resultDiv.style.display = "block";

      // Save to localStorage for demo
      let urls = JSON.parse(localStorage.getItem('shortUrls') || '[]');
      urls.unshift({ short: shortCode, original: longUrl, date: new Date().toISOString() });
      localStorage.setItem('shortUrls', JSON.stringify(urls.slice(0, 20)));
    }

    function copyShortUrl() {
      const shortUrl = document.getElementById('shortUrlDisplay').textContent;
      if (!shortUrl) return;
      
      navigator.clipboard.writeText(shortUrl).then(() => {
        alert("✅ Short URL copied to clipboard!");
      });
    }

    // Initialize
    window.onload = () => {
      syncTheme();
    };
  </script>
</body>
</html>
