<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Watermark Tool — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255,255,255,0.75);
      --card: #ffffff;
      --border: rgba(0,0,0,0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236,72,153,0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21,21,30,0.7);
      --card: #15151e;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236,72,153,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--fbody);
      min-height: 100vh; display: flex; flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    nav {
      position: sticky; top: 0; z-index: 200; display: flex; align-items: center;
      justify-content: space-between; padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; color: var(--text); font-size: 1.1rem; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }
    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      text-transform: uppercase; text-decoration: none; color: inherit;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .main {
      max-width: 1200px; margin: 0 auto; width: 100%; padding: 2rem 20px 4rem;
      display: grid; grid-template-columns: 1fr 380px; gap: 2rem;
    }
    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

    .preview-panel { display: flex; flex-direction: column; gap: 1.5rem; }
    .preview-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
      padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }
    .preview-area {
      position: relative; background: repeating-conic-gradient(#80808030 0% 25%, transparent 0% 50%) 50% / 20px 20px;
      border-radius: 12px; min-height: 300px; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .preview-area img { max-width: 100%; max-height: 500px; display: block; border-radius: 8px; }

    .design-panel {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
      padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.02);
      overflow-y: auto; max-height: calc(100vh - 140px);
    }

    .section-title {
      font-family: var(--fhead); font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem;
      display: flex; align-items: center; gap: 8px;
    }
    .tab-row { display: flex; gap: 6px; margin-bottom: 1.2rem; flex-wrap: wrap; }
    .tab {
      padding: 8px 16px; border-radius: 999px; background: var(--bg);
      border: 1px solid var(--border); cursor: pointer; font-weight: 500; font-size: 13px;
      transition: all 0.2s;
    }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    .input-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: var(--muted); }
    input, select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 10px; background: var(--bg); color: var(--text); font-size: 14px;
    }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); outline: none; }
    .range-row { display: flex; align-items: center; gap: 8px; }
    .range-row input[type="range"] { flex: 1; }
    .range-row span { min-width: 35px; font-size: 13px; }

    .grid-9 {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 1rem;
    }
    .pos-btn {
      padding: 8px 4px; font-size: 11px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; text-align: center; font-weight: 600;
      transition: all 0.2s;
    }
    .pos-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    .btn {
      padding: 10px 18px; border: none; border-radius: 10px; font-weight: 600;
      cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 6px;
      transition: all 0.2s; margin-top: 0.5rem;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--glow); }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }

    footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; border-top: 1px solid var(--border); margin-top: auto; }

    /* Hide file inputs */
    .hidden-file { display: none; }
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 12px; padding: 2rem;
      text-align: center; cursor: pointer; margin-bottom: 1rem; transition: 0.2s;
    }
    .upload-zone:hover { border-color: var(--accent); background: var(--glow); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <!-- Preview -->
    <div class="preview-panel">
      <div class="preview-card">
        <div class="preview-area" id="previewArea">
          <img id="previewImage" src="#" alt="Upload an image" style="display:none;" />
          <p id="placeholder" style="color:var(--muted);">Upload an image to start</p>
        </div>
      </div>
      <button id="downloadBtn" class="btn btn-primary" style="width:100%;" disabled>
        <i class="fa-solid fa-download"></i> Download Watermarked Image
      </button>
    </div>

    <!-- Design Panel -->
    <div class="design-panel">
      <!-- Tab: Text / Image -->
      <div class="tab-row" id="typeTabs">
        <div class="tab active" data-type="text">Text Watermark</div>
        <div class="tab" data-type="image">Image/Logo Watermark</div>
      </div>

      <!-- Dynamic Inputs -->
      <div id="dynamicInputs"></div>

      <!-- Common Settings -->
      <div class="section-title"><i class="fa-solid fa-sliders"></i> General</div>
      <div class="input-group">
        <label>Position (9‑point grid)</label>
        <div class="grid-9" id="positionGrid">
          <div class="pos-btn active" data-pos="top-left">↖ TL</div>
          <div class="pos-btn" data-pos="top-center">↑ TC</div>
          <div class="pos-btn" data-pos="top-right">↗ TR</div>
          <div class="pos-btn" data-pos="center-left">← CL</div>
          <div class="pos-btn" data-pos="center">◎ C</div>
          <div class="pos-btn" data-pos="center-right">→ CR</div>
          <div class="pos-btn" data-pos="bottom-left">↙ BL</div>
          <div class="pos-btn" data-pos="bottom-center">↓ BC</div>
          <div class="pos-btn" data-pos="bottom-right">↘ BR</div>
        </div>
      </div>
      <div class="input-group">
        <label>Offset X (px)</label>
        <div class="range-row">
          <input type="range" id="offsetX" min="-200" max="200" value="0">
          <span id="offsetXVal">0</span>
        </div>
      </div>
      <div class="input-group">
        <label>Offset Y (px)</label>
        <div class="range-row">
          <input type="range" id="offsetY" min="-200" max="200" value="0">
          <span id="offsetYVal">0</span>
        </div>
      </div>
      <div class="input-group">
        <label>Rotation (°)</label>
        <div class="range-row">
          <input type="range" id="rotation" min="0" max="360" value="0">
          <span id="rotationVal">0°</span>
        </div>
      </div>
      <div class="input-group">
        <label>Opacity</label>
        <div class="range-row">
          <input type="range" id="opacitySlider" min="10" max="100" value="50">
          <span id="opacityVal">50%</span>
        </div>
      </div>
      <div class="input-group">
        <label>Repeat / Tile</label>
        <select id="tileMode">
          <option value="none">None (single)</option>
          <option value="grid">Grid repeat</option>
        </select>
      </div>
      <button id="applyLiveBtn" class="btn btn-secondary" style="width:100%;"><i class="fa-solid fa-rotate"></i> Apply Live Preview</button>
    </div>
  </div>

  <footer>© 2026 PixelPress — Client‑side, private, 100% offline</footer>

  <script>
    (function() {
      // ---- Theme ----
      function syncTheme() {
        const saved = localStorage.getItem('pixelpress-theme');
        const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      }
      document.getElementById('themeToggle').addEventListener('click', () => {
        const curr = document.documentElement.getAttribute('data-theme');
        const next = curr === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pixelpress-theme', next);
      });

      // ---- State ----
      let baseImage = null;          // HTMLImageElement
      let watermarkType = 'text';    // 'text' or 'image'
      let watermarkImage = null;     // HTMLImageElement (for image watermark)
      let selectedPosition = 'bottom-right';
      let offsetX = 0, offsetY = 0, rotation = 0, opacity = 0.5;
      let tileMode = 'none';

      // ---- DOM Elements ----
      const previewArea = document.getElementById('previewArea');
      const previewImg = document.getElementById('previewImage');
      const placeholder = document.getElementById('placeholder');
      const downloadBtn = document.getElementById('downloadBtn');
      const dynamicInputs = document.getElementById('dynamicInputs');

      // ---- Upload main image ----
      function createUploadZone(accept, callback) {
        const zone = document.createElement('div');
        zone.className = 'upload-zone';
        zone.innerHTML = `<i class="fa-solid fa-cloud-upload" style="font-size:2rem;color:var(--accent);"></i><p>Click or drag & drop</p>`;
        zone.addEventListener('click', () => {
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = accept;
          input.onchange = (e) => { if (e.target.files[0]) callback(e.target.files[0]); };
          input.click();
        });
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; });
        zone.addEventListener('dragleave', e => { zone.style.borderColor = 'var(--border)'; });
        zone.addEventListener('drop', e => {
          e.preventDefault();
          zone.style.borderColor = 'var(--border)';
          if (e.dataTransfer.files[0]) callback(e.dataTransfer.files[0]);
        });
        return zone;
      }

      function loadMainImage(file) {
        if (!file.type.startsWith('image/')) return alert('Only image files allowed');
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            baseImage = img;
            previewImg.src = img.src;
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
            downloadBtn.disabled = false;
            applyLivePreview();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // Initial upload zone inside preview
      const initUploadZone = createUploadZone('image/*', loadMainImage);
      previewArea.appendChild(initUploadZone);

      // ---- Tab Switching ----
      const typeTabs = document.querySelectorAll('#typeTabs .tab');
      typeTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          typeTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          watermarkType = tab.dataset.type;
          renderDynamicInputs();
        });
      });

      // ---- Dynamic Inputs based on type ----
      function renderDynamicInputs() {
        let html = '';
        if (watermarkType === 'text') {
          html = `
            <div class="input-group">
              <label>Watermark Text</label>
              <input type="text" id="wmText" value="© PixelPress" />
            </div>
            <div class="input-group">
              <label>Font Family</label>
              <select id="wmFont">
                <option value="Arial">Arial</option>
                <option value="Verdana">Verdana</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Courier New">Courier New</option>
                <option value="Georgia">Georgia</option>
                <option value="Impact">Impact</option>
              </select>
            </div>
            <div class="input-group">
              <label>Font Size (px)</label>
              <div class="range-row">
                <input type="range" id="wmFontSize" min="10" max="200" value="60" />
                <span id="wmFontSizeVal">60</span>
              </div>
            </div>
            <div class="input-group">
              <label>Text Color</label>
              <input type="color" id="wmColor" value="#ffffff" />
            </div>
            <div class="input-group" style="display:flex; gap:8px;">
              <label><input type="checkbox" id="wmBold" /> Bold</label>
              <label><input type="checkbox" id="wmItalic" /> Italic</label>
            </div>
            <div class="input-group">
              <label>Shadow</label>
              <input type="color" id="wmShadowColor" value="#000000" />
              <div class="range-row">
                <input type="range" id="wmShadowBlur" min="0" max="20" value="5" />
                <span id="wmShadowBlurVal">5</span>
              </div>
            </div>
            <div class="input-group">
              <label>Outline</label>
              <input type="color" id="wmOutlineColor" value="#000000" />
              <div class="range-row">
                <input type="range" id="wmOutlineWidth" min="0" max="10" value="0" />
                <span id="wmOutlineWidthVal">0</span>
              </div>
            </div>
          `;
        } else {
          html = `
            <div class="input-group">
              <label>Upload Logo (PNG recommended)</label>
              <div id="logoUploadZone"></div>
              <input type="file" id="logoFileInput" accept="image/*" class="hidden-file" />
            </div>
            <div class="input-group">
              <label>Scale (%)</label>
              <div class="range-row">
                <input type="range" id="logoScale" min="10" max="200" value="100" />
                <span id="logoScaleVal">100%</span>
              </div>
            </div>
          `;
        }
        dynamicInputs.innerHTML = html;

        // Attach listeners
        if (watermarkType === 'text') {
          document.getElementById('wmText')?.addEventListener('input', applyLivePreview);
          document.getElementById('wmFont')?.addEventListener('change', applyLivePreview);
          document.getElementById('wmFontSize')?.addEventListener('input', function() {
            document.getElementById('wmFontSizeVal').textContent = this.value;
            applyLivePreview();
          });
          document.getElementById('wmColor')?.addEventListener('input', applyLivePreview);
          document.getElementById('wmBold')?.addEventListener('change', applyLivePreview);
          document.getElementById('wmItalic')?.addEventListener('change', applyLivePreview);
          document.getElementById('wmShadowColor')?.addEventListener('input', applyLivePreview);
          document.getElementById('wmShadowBlur')?.addEventListener('input', function() {
            document.getElementById('wmShadowBlurVal').textContent = this.value;
            applyLivePreview();
          });
          document.getElementById('wmOutlineColor')?.addEventListener('input', applyLivePreview);
          document.getElementById('wmOutlineWidth')?.addEventListener('input', function() {
            document.getElementById('wmOutlineWidthVal').textContent = this.value;
            applyLivePreview();
          });
        } else {
          // Image watermark upload
          const logoZone = document.getElementById('logoUploadZone');
          const newLogoZone = createUploadZone('image/*', (file) => {
            const reader = new FileReader();
            reader.onload = (e) => {
              const img = new Image();
              img.onload = () => {
                watermarkImage = img;
                applyLivePreview();
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
          });
          logoZone.appendChild(newLogoZone);

          document.getElementById('logoScale')?.addEventListener('input', function() {
            document.getElementById('logoScaleVal').textContent = this.value + '%';
            applyLivePreview();
          });
        }
      }

      // ---- Position Grid ----
      document.getElementById('positionGrid').addEventListener('click', (e) => {
        if (e.target.classList.contains('pos-btn')) {
          document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          selectedPosition = e.target.dataset.pos;
          applyLivePreview();
        }
      });

      // ---- Common Sliders ----
      document.getElementById('offsetX').addEventListener('input', function() {
        offsetX = parseInt(this.value);
        document.getElementById('offsetXVal').textContent = offsetX;
        applyLivePreview();
      });
      document.getElementById('offsetY').addEventListener('input', function() {
        offsetY = parseInt(this.value);
        document.getElementById('offsetYVal').textContent = offsetY;
        applyLivePreview();
      });
      document.getElementById('rotation').addEventListener('input', function() {
        rotation = parseInt(this.value);
        document.getElementById('rotationVal').textContent = rotation + '°';
        applyLivePreview();
      });
      document.getElementById('opacitySlider').addEventListener('input', function() {
        opacity = parseInt(this.value) / 100;
        document.getElementById('opacityVal').textContent = this.value + '%';
        applyLivePreview();
      });
      document.getElementById('tileMode').addEventListener('change', function() {
        tileMode = this.value;
        applyLivePreview();
      });

      // ---- Apply Live Preview (Canvas) ----
      function applyLivePreview() {
        if (!baseImage) return;

        const canvas = document.createElement('canvas');
        canvas.width = baseImage.width;
        canvas.height = baseImage.height;
        const ctx = canvas.getContext('2d');

        // Draw original
        ctx.drawImage(baseImage, 0, 0);

        // Calculate position for a single element (used as offset for tiling)
        const getPositionCoords = (elementWidth, elementHeight) => {
          const pad = 30;
          let x, y;
          const w = canvas.width;
          const h = canvas.height;
          switch (selectedPosition) {
            case 'top-left': x = pad; y = pad; break;
            case 'top-center': x = (w - elementWidth) / 2; y = pad; break;
            case 'top-right': x = w - elementWidth - pad; y = pad; break;
            case 'center-left': x = pad; y = (h - elementHeight) / 2; break;
            case 'center': x = (w - elementWidth) / 2; y = (h - elementHeight) / 2; break;
            case 'center-right': x = w - elementWidth - pad; y = (h - elementHeight) / 2; break;
            case 'bottom-left': x = pad; y = h - elementHeight - pad; break;
            case 'bottom-center': x = (w - elementWidth) / 2; y = h - elementHeight - pad; break;
            case 'bottom-right':
            default: x = w - elementWidth - pad; y = h - elementHeight - pad;
          }
          x += offsetX;
          y += offsetY;
          return { x, y };
        };

        // Helper: draw the watermark element on context
        const drawElement = (ctx, scale = 1) => {
          if (watermarkType === 'text') {
            const text = document.getElementById('wmText')?.value.trim() || '© PixelPress';
            const fontFamily = document.getElementById('wmFont')?.value || 'Arial';
            const fontSize = parseInt(document.getElementById('wmFontSize')?.value) || 60;
            const color = document.getElementById('wmColor')?.value || '#ffffff';
            const bold = document.getElementById('wmBold')?.checked;
            const italic = document.getElementById('wmItalic')?.checked;
            const shadowColor = document.getElementById('wmShadowColor')?.value || '#000';
            const shadowBlur = parseInt(document.getElementById('wmShadowBlur')?.value) || 5;
            const outlineColor = document.getElementById('wmOutlineColor')?.value || '#000';
            const outlineWidth = parseInt(document.getElementById('wmOutlineWidth')?.value) || 0;

            const style = `${italic ? 'italic ' : ''}${bold ? 'bold ' : ''}${fontSize * scale}px ${fontFamily}`;
            ctx.font = style;
            ctx.fillStyle = hexToRgba(color, opacity);
            ctx.textBaseline = 'top';
            ctx.shadowColor = hexToRgba(shadowColor, opacity);
            ctx.shadowBlur = shadowBlur;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            const metrics = ctx.measureText(text);
            const elementWidth = metrics.width;
            const elementHeight = fontSize * scale;

            return { elementWidth, elementHeight, draw: (x, y) => {
              if (outlineWidth > 0) {
                ctx.strokeStyle = hexToRgba(outlineColor, opacity);
                ctx.lineWidth = outlineWidth;
                ctx.strokeText(text, x, y);
              }
              ctx.fillText(text, x, y);
            }};
          } else {
            if (!watermarkImage) return null;
            const scalePercent = parseInt(document.getElementById('logoScale')?.value) || 100;
            const scaleFactor = (scalePercent / 100) * scale;
            const elementWidth = watermarkImage.width * scaleFactor;
            const elementHeight = watermarkImage.height * scaleFactor;
            return {
              elementWidth,
              elementHeight,
              draw: (x, y) => {
                ctx.globalAlpha = opacity;
                ctx.drawImage(watermarkImage, x, y, elementWidth, elementHeight);
                ctx.globalAlpha = 1;
              }
            };
          }
        };

        // Save context state and rotate around given point
        const applyRotation = (ctx, x, y, w, h) => {
          if (rotation !== 0) {
            const cx = x + w / 2;
            const cy = y + h / 2;
            ctx.translate(cx, cy);
            ctx.rotate(rotation * Math.PI / 180);
            ctx.translate(-cx, -cy);
          }
        };

        const element = drawElement(ctx, 1);
        if (!element) {
          previewImg.src = baseImage.src;
          return;
        }

        const { elementWidth, elementHeight, draw } = element;

        if (tileMode === 'grid') {
          const spacingX = elementWidth + 60;
          const spacingY = elementHeight + 60;
          for (let x = -elementWidth; x < canvas.width + elementWidth; x += spacingX) {
            for (let y = -elementHeight; y < canvas.height + elementHeight; y += spacingY) {
              ctx.save();
              applyRotation(ctx, x, y, elementWidth, elementHeight);
              draw(x, y);
              ctx.restore();
            }
          }
        } else {
          const { x, y } = getPositionCoords(elementWidth, elementHeight);
          ctx.save();
          applyRotation(ctx, x, y, elementWidth, elementHeight);
          draw(x, y);
          ctx.restore();
        }

        // Update preview
        const dataUrl = canvas.toDataURL('image/png');
        previewImg.src = dataUrl;

        // Store for download
        previewImg.dataset.watermarkedDataUrl = dataUrl;
      }

      // Helper
      function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }

      // ---- Download ----
      downloadBtn.addEventListener('click', () => {
        const dataUrl = previewImg.dataset.watermarkedDataUrl;
        if (!dataUrl) return;
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = `watermarked-${Date.now()}.png`;
        a.click();
      });

      // ---- Init ----
      syncTheme();
      renderDynamicInputs();
      // Apply live button (for manual refresh)
      document.getElementById('applyLiveBtn').addEventListener('click', applyLivePreview);
    })();
  </script>
</body>
</html>
