<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Watermark – PixelPress</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #0f172a; }
    .container { max-width: 900px; margin: 40px auto; padding: 20px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 2.5rem; background: linear-gradient(135deg,#ec4899,#7e22ce); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .step { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    .step h2 { margin-bottom: 15px; }
    .upload-zone { border: 3px dashed #94a3b8; border-radius: 16px; padding: 60px 20px; text-align: center; cursor: pointer; transition: 0.3s; }
    .upload-zone:hover { border-color: #ec4899; background: #fdf4ff; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; }
    .position-btns { display: flex; gap: 10px; margin-bottom: 20px; }
    .position-btn { flex:1; padding: 10px; border: 1px solid #cbd5e1; background: white; border-radius: 10px; cursor: pointer; text-align: center; }
    .position-btn.active { background: #ec4899; color: white; border-color: #ec4899; }
    button { padding: 14px 28px; background: #ec4899; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:hover { background: #db2777; }
    .preview-container { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .preview-box { flex: 1 1 200px; text-align: center; }
    .preview-box img { max-width: 100%; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    #processing { display: none; text-align: center; padding: 30px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #ec4899; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💧 Add Watermark</h1>
      <p>Protect your images with custom text</p>
    </div>

    <!-- Step 1: Upload -->
    <div class="step" id="upload-step">
      <h2>1. Upload Image</h2>
      <div class="upload-zone" id="dropZone">
        <p style="font-size:1.5rem; margin-bottom:10px;">📸 Click or Drag & Drop</p>
        <p>JPG, PNG, WEBP</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>

    <!-- Step 2: Settings -->
    <div class="step" id="settings-step" style="display:none;">
      <h2>2. Watermark Settings</h2>
      <div class="form-group">
        <label for="watermarkText">Watermark Text</label>
        <input type="text" id="watermarkText" value="© PixelPress" placeholder="Enter text">
      </div>
      <div class="form-group">
        <label>Position</label>
        <div class="position-btns">
          <div class="position-btn active" data-pos="top-left">Top Left</div>
          <div class="position-btn" data-pos="center">Center</div>
          <div class="position-btn" data-pos="bottom-right">Bottom Right</div>
        </div>
      </div>
      <div class="form-group">
        <label for="opacitySlider">Opacity: <span id="opacityValue">50%</span></label>
        <input type="range" id="opacitySlider" min="10" max="100" value="50">
      </div>
      <button id="applyBtn">Apply Watermark</button>
    </div>

    <!-- Processing -->
    <div class="step" id="processing">
      <div class="spinner"></div>
      <p>Adding watermark...</p>
    </div>

    <!-- Step 3: Result -->
    <div class="step" id="result-step" style="display:none;">
      <h2>3. Result</h2>
      <div class="preview-container">
        <div class="preview-box">
          <p><strong>Original</strong></p>
          <img id="originalPreview">
        </div>
        <div class="preview-box">
          <p><strong>Watermarked</strong></p>
          <img id="watermarkedPreview">
        </div>
      </div>
      <button id="downloadBtn" style="margin-top:20px;">📥 Download Watermarked Image</button>
    </div>
  </div>

  <script>
    (function() {
      const $ = id => document.getElementById(id);
      let baseImage = null;
      let selectedPosition = 'top-left';

      // Position buttons
      document.querySelectorAll('.position-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.position-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedPosition = btn.dataset.pos;
        });
      });

      // Opacity slider
      $('opacitySlider').addEventListener('input', e => {
        $('opacityValue').textContent = e.target.value + '%';
      });

      // Upload handling
      const dropZone = $('dropZone');
      const fileInput = $('fileInput');

      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#ec4899'; });
      dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#94a3b8'; });
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.style.borderColor = '#94a3b8';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) loadImage(file);
      });
      fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (file) loadImage(file);
      });

      function loadImage(file) {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            baseImage = img;
            $('originalPreview').src = img.src;
            $('upload-step').style.display = 'none';
            $('settings-step').style.display = 'block';
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // Apply watermark
      $('applyBtn').addEventListener('click', () => {
        if (!baseImage) return alert('Please upload an image first');
        const text = $('watermarkText').value.trim();
        if (!text) return alert('Please enter watermark text');

        $('settings-step').style.display = 'none';
        $('processing').style.display = 'block';

        setTimeout(() => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = baseImage.width;
            canvas.height = baseImage.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(baseImage, 0, 0);

            const fontSize = Math.max(20, Math.floor(baseImage.width / 20));
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.fillStyle = `rgba(255,255,255,${parseInt($('opacitySlider').value)/100})`;
            ctx.textBaseline = 'top';

            const textWidth = ctx.measureText(text).width;
            const textHeight = fontSize;
            const pad = 30;
            let x, y;
            if (selectedPosition === 'top-left') { x = pad; y = pad; }
            else if (selectedPosition === 'center') { x = (canvas.width - textWidth)/2; y = (canvas.height - textHeight)/2; }
            else { x = canvas.width - textWidth - pad; y = canvas.height - textHeight - pad; }

            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(text, x, y);

            canvas.toBlob(blob => {
              const url = URL.createObjectURL(blob);
              $('watermarkedPreview').src = url;
              $('processing').style.display = 'none';
              $('result-step').style.display = 'block';
              $('downloadBtn').onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = 'watermarked.png';
                a.click();
              };
            }, 'image/png');
          } catch(err) {
            alert('Failed to apply watermark');
            $('processing').style.display = 'none';
            $('settings-step').style.display = 'block';
          }
        }, 100);
      });
    })();
  </script>
</body>
</html>
