<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Watermark – PixelPress</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .watermark-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        .upload-zone {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-zone:hover {
            border-color: #3b82f6;
            background: #f8fafc;
        }
        .preview-img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .position-btn {
            padding: 10px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }
        .position-btn.active {
            border-color: #3b82f6;
            background: #eff6ff;
        }
    </style>
</head>
<body>
    <div class="watermark-container">
        <h1>💧 Add Watermark</h1>

        <!-- Upload Step -->
        <div id="upload-step" class="step active">
            <h2>1. Upload Image</h2>
            <div id="watermarkUploadZone" class="upload-zone">
                <p>📁 Drop image here or click to browse</p>
                <small>JPG, PNG, WEBP supported</small>
            </div>
            <input type="file" id="watermarkFileInput" accept="image/*" style="display: none;">
        </div>

        <!-- Settings Step -->
        <div id="settings-step" class="step">
            <h2>2. Watermark Settings</h2>
            
            <div style="margin-bottom: 20px;">
                <label>Watermark Text:</label><br>
                <input type="text" id="watermarkText" value="PixelPress" 
                       style="width: 100%; padding: 12px; font-size: 18px; border-radius: 8px;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div>
                    <label>Opacity: <span id="opacityValue">60%</span></label>
                    <input type="range" id="opacitySlider" min="10" max="100" value="60" style="width: 100%;">
                </div>
                <div>
                    <label>Font Size: <span id="fontSizeValue">60px</span></label>
                    <input type="range" id="fontSizeSlider" min="20" max="120" value="60" style="width: 100%;">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label>Color:</label><br>
                <input type="color" id="watermarkColor" value="#ffffff">
            </div>

            <div>
                <label>Position:</label><br><br>
                <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <button class="position-btn active" data-position="bottom-right">Bottom Right</button>
                    <button class="position-btn" data-position="top-left">Top Left</button>
                    <button class="position-btn" data-position="top-right">Top Right</button>
                    <button class="position-btn" data-position="center">Center</button>
                    <button class="position-btn" data-position="bottom-left">Bottom Left</button>
                </div>
            </div>

            <button id="applyWatermarkBtn" style="margin-top: 25px; padding: 14px 32px; font-size: 18px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer;">
                Apply Watermark →
            </button>
        </div>

        <!-- Processing Step -->
        <div id="processing-step" class="step">
            <h2>Processing...</h2>
            <p>Please wait while we add watermark.</p>
        </div>

        <!-- Result Step -->
        <div id="result-step" class="step">
            <h2>✅ Watermark Applied!</h2>
            <img id="watermarkedPreview" class="preview-img" alt="Watermarked Image">
            
            <div style="margin-top: 20px;">
                <button id="downloadBtn" style="padding: 14px 32px; font-size: 18px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;">
                    Download Image
                </button>
                <button onclick="location.reload()" style="padding: 14px 32px; font-size: 18px; background: #6b7280; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px;">
                    New Image
                </button>
            </div>
        </div>
    </div>

    <script src="../js/watermark.js"></script>
</body>
</html>
