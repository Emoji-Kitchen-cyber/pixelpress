<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Watermark – PixelPress</title>
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f9fafb;
            margin: 0;
            padding: 20px;
        }
        .watermark-container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #3b82f6;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .step {
            display: none;
            padding: 30px;
        }
        .step.active {
            display: block;
        }
        .upload-zone {
            border: 4px dashed #cbd5e1;
            border-radius: 16px;
            padding: 80px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-zone:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
        }
        .preview-img {
            max-width: 100%;
            max-height: 480px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            background: #f8fafc;
        }
        .position-btn {
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 15px;
        }
        .position-btn.active {
            border-color: #3b82f6;
            background: #eff6ff;
            color: #1e40af;
        }
        button#main-btn {
            padding: 16px 40px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="watermark-container">
        <div class="header">
            <h1>💧 Add Watermark to Image</h1>
        </div>

        <!-- Upload Step -->
        <div id="upload-step" class="step active">
            <h2 style="text-align:center;">Step 1: Upload Your Image</h2>
            <div id="watermarkUploadZone" class="upload-zone">
                <h3>📁 Drop Image Here</h3>
                <p>or click to browse from device</p>
                <small>JPG, PNG, WEBP supported | Max size recommended under 10MB</small>
            </div>
            <input type="file" id="watermarkFileInput" accept="image/*" style="display: none;">
        </div>

        <!-- Settings Step -->
        <div id="settings-step" class="step">
            <h2>Step 2: Customize Watermark</h2>
            
            <div style="margin: 20px 0;">
                <label><strong>Watermark Text:</strong></label><br>
                <input type="text" id="watermarkText" value="PixelPress" 
                       style="width: 100%; padding: 14px; font-size: 18px; border: 2px solid #e2e8f0; border-radius: 10px;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0;">
                <div>
                    <label><strong>Opacity:</strong> <span id="opacityValue">65%</span></label>
                    <input type="range" id="opacitySlider" min="20" max="100" value="65" style="width: 100%;">
                </div>
                <div>
                    <label><strong>Font Size:</strong> <span id="fontSizeValue">65px</span></label>
                    <input type="range" id="fontSizeSlider" min="25" max="140" value="65" style="width: 100%;">
                </div>
            </div>

            <div style="margin: 20px 0;">
                <label><strong>Color:</strong></label><br>
                <input type="color" id="watermarkColor" value="#ffffff" style="height: 50px; width: 80px; border: none; border-radius: 8px;">
            </div>

            <div style="margin: 25px 0;">
                <label><strong>Position:</strong></label><br><br>
                <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                    <button class="position-btn active" data-position="bottom-right">Bottom Right</button>
                    <button class="position-btn" data-position="top-left">Top Left</button>
                    <button class="position-btn" data-position="top-right">Top Right</button>
                    <button class="position-btn" data-position="center">Center</button>
                    <button class="position-btn" data-position="bottom-left">Bottom Left</button>
                </div>
            </div>

            <button id="applyWatermarkBtn" class="main-btn" style="background: #3b82f6; color: white; width: 100%;">
                Apply Watermark →
            </button>
        </div>

        <!-- Processing -->
        <div id="processing-step" class="step">
            <h2 style="text-align:center;">⏳ Processing...</h2>
            <p style="text-align:center;">Adding watermark to your image</p>
        </div>

        <!-- Result -->
        <div id="result-step" class="step">
            <h2 style="text-align:center; color: #10b981;">✅ Watermark Applied Successfully!</h2>
            <img id="watermarkedPreview" class="preview-img" alt="Watermarked Image">
            
            <div style="text-align:center; margin-top: 30px;">
                <button id="downloadBtn" style="background:#10b981; color:white; padding:16px 40px; font-size:18px; border:none; border-radius:12px; margin:10px;">
                    📥 Download Image
                </button>
                <button onclick="location.reload()" style="background:#6b7280; color:white; padding:16px 30px; font-size:18px; border:none; border-radius:12px; margin:10px;">
                    New Image
                </button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="../js/watermark.js"></script>
</body>
</html>
