<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter & Validator — PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght=700;800&family=JetBrains+Mono:wght=400;500&display=swap');
    :root {
      --bg: #f5f5f7; --card: #ffffff; --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f; --muted: #6e6e73; --accent: #ec4899; --accent2: #a78bfa;
    }
    [data-theme="dark"] {
      --bg: #09090e; --card: #15151e; --border: rgba(255, 255, 255, 0.08); --text: #e8e8f0; --muted: #86868b;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 30px; min-height: 100vh; }
    .layout-matrix { max-width: 1100px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 16px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
    h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } }
    textarea, pre { width: 100%; height: 400px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; outline: none; resize: none; overflow-y: auto; box-sizing: border-box; }
    pre { white-space: pre-wrap; margin: 0; background: #15151e; color: #a78bfa; }
    .status-bar { padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: 600; font-size: 14px; display: none; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    .actions-row { display: flex; gap: 10px; margin-top: 15px; }
    .btn { padding: 12px 20px; background: var(--text); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: var(--accent); color: white; }
  </style>
</head>
<body>
  <div class="layout-matrix">
    <a href="./index.html" style="color: var(--muted); font-size: 14px; text-decoration: none; display: inline-block; margin-bottom: 15px;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    <h1><span>JSON</span> Formatter & Validator</h1>

    <div class="workspace">
      <div>
        <div style="font-weight: 600; margin-bottom: 6px; font-size: 14px;">Raw Input String</div>
        <textarea id="jsonInput" placeholder="Paste your raw, unminified JSON payload here..."></textarea>
      </div>
      <div>
        <div style="font-weight: 600; margin-bottom: 6px; font-size: 14px;">Structured Output</div>
        <pre id="jsonOutput">Clean structural object tree output will show here...</pre>
      </div>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <div class="actions-row">
      <button class="btn" id="formatBtn"><i class="fa-solid fa-code"></i> Format & Validate</button>
      <button class="btn" id="minifyBtn" style="background:#6e6e73;">Minify String</button>
    </div>
  </div>

  <script src="./json-formatter.js"></script>
</body>
</html>
