<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Formatter & Validator - PixelPress</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.75);
      --card: #ffffff;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #ec4899;
      --accent2: #a78bfa;
      --glow: rgba(236, 72, 153, 0.1);
      --r: 16px;
      --fhead: 'Syne', sans-serif;
      --fbody: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --fmono: 'JetBrains Mono', monospace;
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(21, 21, 30, 0.7);
      --card: #15151e;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8e8f0;
      --muted: #86868b;
      --glow: rgba(236, 72, 153, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--fbody);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1rem, 5vw, 3rem); height: 64px;
      background: var(--surface); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      background: var(--card); border: 1px solid var(--border);
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); font-size: 1.1rem; cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); transform: scale(1.05); }

    .nav-logo {
      font-family: var(--fhead); font-weight: 800; font-size: 1.25rem;
      letter-spacing: -0.5px; text-transform: uppercase;
    }
    .nav-logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 2rem 20px 5rem;
    }

    .tool-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .tool-header h1 {
      font-family: var(--fhead);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
    }
    .tool-header p { color: var(--muted); font-size: 1.05rem; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
    }

    .editor-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 900px) {
      .editor-container { grid-template-columns: 1fr; }
    }

    textarea {
      width: 100%;
      min-height: 420px;
      padding: 18px;
      font-family: var(--fmono);
      font-size: 15px;
      line-height: 1.5;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      resize: vertical;
      tab-size: 2;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--glow);
      outline: none;
    }

    .output {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      min-height: 420px;
      font-family: var(--fmono);
      font-size: 15px;
      line-height: 1.5;
      white-space: pre;
      overflow: auto;
      color: var(--text);
    }

    .status {
      padding: 10px 16px;
      border-radius: 8px;
      margin: 12px 0;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #b91c1c; }

    .btn-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--glow);
    }

    .btn-secondary {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-left">
      <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <a href="./index.html" class="nav-logo">PIXEL<span>PRESS</span></a>
    </div>
    <button id="themeToggle" class="back-btn">🌓</button>
  </nav>

  <div class="main">
    <div class="tool-header">
      <h1>JSON Formatter & Validator</h1>
      <p>Format, validate and prettify JSON instantly</p>
    </div>

    <div class="card">
      <div class="editor-container">
        <div>
          <label style="display:block; margin-bottom:8px; font-weight:600;">Input JSON</label>
          <textarea id="inputJson" placeholder='{"name": "PixelPress", "version": "1.0"}'></textarea>
        </div>
        <div>
          <label style="display:block; margin-bottom:8px; font-weight:600;">Formatted Output</label>
          <div id="output" class="output"></div>
        </div>
      </div>

      <div id="status" class="status"></div>

      <div class="btn-group">
        <button onclick="formatJSON()" class="btn-primary">
          <i class="fa-solid fa-align-left"></i> Format JSON
        </button>
        <button onclick="validateJSON()" class="btn-primary">
          <i class="fa-solid fa-check-circle"></i> Validate Only
        </button>
        <button onclick="copyOutput()" class="btn-secondary">
          <i class="fa-solid fa-copy"></i> Copy
        </button>
        <button onclick="downloadJSON()" class="btn-secondary">
          <i class="fa-solid fa-download"></i> Download
        </button>
        <button onclick="clearAll()" class="btn-secondary">
          <i class="fa-solid fa-trash"></i> Clear
        </button>
      </div>
    </div>
  </div>

  <footer>© 2026 PixelPress — All processing happens in your browser</footer>

  <script>
    function syncTheme() {
      const saved = localStorage.getItem('pixelpress-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    }

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('pixelpress-theme', next);
    });

    function formatJSON() {
      const input = document.getElementById('inputJson').value.trim();
      const outputEl = document.getElementById('output');
      const statusEl = document.getElementById('status');

      if (!input) {
        statusEl.textContent = "Please enter JSON data";
        statusEl.className = "status error";
        return;
      }

      try {
        const parsed = JSON.parse(input);
        const formatted = JSON.stringify(parsed, null, 2);
        
        outputEl.textContent = formatted;
        statusEl.textContent = "✅ JSON formatted successfully";
        statusEl.className = "status success";
      } catch (e) {
        outputEl.textContent = "";
        statusEl.textContent = `❌ Invalid JSON: ${e.message}`;
        statusEl.className = "status error";
      }
    }

    function validateJSON() {
      const input = document.getElementById('inputJson').value.trim();
      const statusEl = document.getElementById('status');
      const outputEl = document.getElementById('output');

      if (!input) {
        statusEl.textContent = "Please enter JSON data";
        statusEl.className = "status error";
        return;
      }

      try {
        JSON.parse(input);
        statusEl.textContent = "✅ Valid JSON";
        statusEl.className = "status success";
        outputEl.textContent = "JSON is valid. Click 'Format JSON' to prettify.";
      } catch (e) {
        statusEl.textContent = `❌ Invalid JSON: ${e.message}`;
        statusEl.className = "status error";
        outputEl.textContent = "";
      }
    }

    function copyOutput() {
      const outputText = document.getElementById('output').textContent;
      if (!outputText) {
        alert("Nothing to copy");
        return;
      }
      navigator.clipboard.writeText(outputText).then(() => {
        alert("✅ Copied to clipboard!");
      });
    }

    function downloadJSON() {
      const outputText = document.getElementById('output').textContent;
      if (!outputText) {
        alert("Format JSON first");
        return;
      }
      const blob = new Blob([outputText], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `formatted-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearAll() {
      document.getElementById('inputJson').value = '';
      document.getElementById('output').textContent = '';
      document.getElementById('status').textContent = '';
    }

    // Auto format on Ctrl/Cmd + Enter
    document.getElementById('inputJson').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        formatJSON();
      }
    });

    // Initialize
    window.onload = () => {
      syncTheme();
      // Sample data
      setTimeout(() => {
        const sample = `{
  "name": "PixelPress",
  "version": "1.0",
  "tools": ["QR Generator", "Password Generator", "JSON Formatter"],
  "private": true
}`;
        document.getElementById('inputJson').value = sample;
        formatJSON();
      }, 300);
    };
  </script>
</body>
</html>
